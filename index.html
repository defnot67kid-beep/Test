    <style>

        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 20px;

        .progress-fill { background: linear-gradient(90deg, #f093fb, #f5576c); height: 100%; width: 0%; transition: width 0.3s ease; }

        .btn-autoplay.active { background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; }
        .empty-state { text-align: center; padding: 40px; color: rgba(255,255,255,0.6); }
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
            z-index: 10002; display: flex; align-items: center; justify-content: center;
        }
        .modal-content { background: rgba(20,20,40,0.95); backdrop-filter: blur(20px); border-radius: 32px; padding: 28px; width: 90%; max-width: 400px; border: 1px solid rgba(255,255,255,0.2); }
        .modal-content h3 { color: white; margin-bottom: 16px; }
        .referral-code-box { background: rgba(255,255,255,0.15); padding: 14px; border-radius: 20px; font-family: monospace; text-align: center; border: 2px dashed #f5576c; cursor: pointer; margin-bottom: 12px; color: white; }
        .graph-container { margin: 20px 0; height: 260px; }
        .share-buttons { display: flex; gap: 12px; margin-top: 12px; }
        .share-btn { background: rgba(255,255,255,0.15); padding: 10px; border-radius: 40px; flex: 1; text-align: center; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .share-btn:hover { background: rgba(255,255,255,0.25); }
        .stat-badge { flex: 1; text-align: center; }
        .stat-badge-label { font-size: 0.65rem; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 1px; }
        .stat-badge-value { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, #f093fb, #f5576c); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .timer-value { background: linear-gradient(135deg, #fbbf24, #f59e0b); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .small-btn { flex: 1; padding: 8px; border-radius: 40px; font-size: 0.7rem; font-weight: 600; border: none; cursor: pointer; background: rgba(255,255,255,0.15); color: white; }
        .error-text { color: #f87171; font-size: 0.75rem; }
        .qr-display-img { background: white; padding: 16px; border-radius: 20px; display: inline-block; margin: 10px 0; cursor: pointer; }

</head>
<body>
    <div class="signin-overlay" id="signinOverlay">
        <div class="signin-card" id="signinCard">
            <div style="font-size: 3.5rem;">🏆</div>
            <h2>ViewSwap</h2>

            <button class="google-signin-btn" id="signInBtn">🟢 Sign in with Google</button>

            </div>
            <button class="qr-signin-btn" id="qrSignInBtn">📷 Scan QR Code</button>
            <div style="margin-top: 20px;"><input type="text" id="referralCodeInput" placeholder="Enter Referral Code" style="color:#1a1a2e;"><button id="applyReferralBtn" class="btn-secondary" style="margin-top:0;">Apply Code</button></div>
        </div>
    </div>

    <div id="mainAppContent">
        <div class="container">
            <div class="header">
                <h1>🏆 ViewSwap</h1>
                <p>⚡ Earn 0.5/sec | 2.5% referral + 0.09% default referral</p>
            </div>
            <div id="pageContent"></div>
        </div>
        <div class="nav-wrapper">
            <div class="bottom-nav">
                <button class="nav-item active" data-page="home"><div class="nav-icon">🏠</div><div class="nav-label">Home</div></button>
                <button class="nav-item" data-page="campaign"><div class="nav-icon">📢</div><div class="nav-label">Campaigns</div></button>
                <button class="nav-item" data-page="rewards"><div class="nav-icon">🎁</div><div class="nav-label">Rewards</div></button>
                <button class="nav-item" data-page="account"><div class="nav-icon">👤</div><div class="nav-label">Profile</div></button>
                <button class="nav-item" data-page="refer"><div class="nav-icon">🤝</div><div class="nav-label">Refer</div></button>
                <!-- Red line removed completely -->
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "firebase/auth";
        import { getFirestore, doc, setDoc, getDoc, collection, query, getDocs, increment, arrayUnion, updateDoc, onSnapshot, where, orderBy, deleteDoc, runTransaction } from "firebase/firestore";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAupBkllyicDPD9O6CmX4mS4sF5z96mqxc",
            authDomain: "vertexpaste.firebaseapp.com",
            projectId: "vertexpaste",
            storageBucket: "vertexpaste.firebasestorage.app",
            messagingSenderId: "255275350380",
            appId: "1:255275350380:web:7be4e8add2cb5b04045b49"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });
        
        // REFERRAL SYSTEM - FIXED: 2.5% for personal referrer, 0.09% for default platform referrer (defnot67kid@gmail.com)
        const DEFAULT_REFERRAL_EMAIL = "defnot67kid@gmail.com";
        const DEFAULT_REFERRAL_PERCENT = 0.0009;   // 0.09%
        const USER_REFERRAL_PERCENT = 0.025;       // 2.5%
        
        let currentUser = null, userData = null, currentPage = 'home', allCampaigns = [];
        let activeWatchData = null, autoplayEnabled = true, youtubePlayer = null, watchInterval = null;
        let watchedHistory = [], unsubscribeCampaigns = null, unsubscribeReferralEarnings = null;
        let performanceChart = null;
        let isTabVisible = true;  // Auto-stop on different tab
        
        // Visibility API: pause video when tab hidden, resume when visible
        document.addEventListener('visibilitychange', () => {
            isTabVisible = !document.hidden;
            if (activeWatchData) {
                if (!isTabVisible && youtubePlayer && youtubePlayer.pauseVideo) {
                    youtubePlayer.pauseVideo();
                    activeWatchData.isPaused = true;
                } else if (isTabVisible && youtubePlayer && activeWatchData && activeWatchData.isPaused && !activeWatchData.completed && youtubePlayer.playVideo) {
                    youtubePlayer.playVideo();
                    activeWatchData.isPaused = false;
                }
            }
        });
        
        const EARNINGS_RATE = 0.5, BASE_URL = window.location.origin + window.location.pathname.replace(/\/[^/]*$/, '/');
        
        function showToast(msg, isErr=false) { const t=document.createElement('div'); t.className='toast'; if(isErr) t.style.background='rgba(239,68,68,0.9)'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(), 3000); }
        
        // Email auth handlers
        document.getElementById('showEmailAuthBtn')?.addEventListener('click',()=>{ document.getElementById('emailAuthPanel').style.display='block'; document.getElementById('showEmailAuthBtn').style.display='none'; });
        document.getElementById('backToGoogleBtn')?.addEventListener('click',()=>{ document.getElementById('emailAuthPanel').style.display='none'; document.getElementById('showEmailAuthBtn').style.display='flex'; });
        document.getElementById('emailSignInBtn')?.addEventListener('click', async()=>{ try { await signInWithEmailAndPassword(auth, document.getElementById('emailInput').value, document.getElementById('passwordInput').value); showToast('Signed in!'); } catch(e) { document.getElementById('authErrorMsg').innerText=e.message; } });
        document.getElementById('emailSignUpBtn')?.addEventListener('click', async()=>{ try { await createUserWithEmailAndPassword(auth, document.getElementById('emailInput').value, document.getElementById('passwordInput').value); showToast('Account created!'); } catch(e) { document.getElementById('authErrorMsg').innerText=e.message; } });
        
        async function getDefaultReferrerId() {
            try {
                const q = query(collection(db, 'viewswap_users'), where('email', '==', DEFAULT_REFERRAL_EMAIL));
                const snap = await getDocs(q);
                if (!snap.empty) return snap.docs[0].id;
                return null;
            } catch(e) { return null; }
        }
        
        async function processQRReferral(code) { 
            if(!currentUser || userData.referredBy) return; 
            const q=query(collection(db,'viewswap_users'), where('referralCode','==',code)); 
            const snap=await getDocs(q); 
            if(!snap.empty && snap.docs[0].id !== currentUser.uid) { 
                userData.referredBy = snap.docs[0].id; 
                await saveUserData(); 
                await updateDoc(doc(db,'viewswap_users',snap.docs[0].id), { referrals: arrayUnion(currentUser.uid) }); 
                await updateCredits(10); 
                showToast('🎉 Referral linked! +10 credits'); 
            } else showToast('Invalid code',true); 
        }
        
        async function loadUserData(uid) {
            const ref = doc(db, 'viewswap_users', uid);
            const snap = await getDoc(ref);
            if (snap.exists()) {
                userData = snap.data();
                userData.streak = userData.streak || { current: 0, lastClaim: null, highest: 0 };
                userData.watchedVideos = userData.watchedVideos || [];
                userData.referralEarnings = userData.referralEarnings || 0;
                userData.totalEarned = userData.totalEarned || 0;
                userData.likedCampaigns = userData.likedCampaigns || [];
                userData.subscribedChannels = userData.subscribedChannels || [];
                userData.earningsHistory = userData.earningsHistory || [];
                watchedHistory = userData.recentlyWatched || [];
                userData.defaultReferralEarnings = userData.defaultReferralEarnings || 0;
            } else {
                const defaultReferrerId = await getDefaultReferrerId();
                userData = { 
                    uid, email: currentUser.email, displayName: currentUser.displayName || currentUser.email, 
                    photoURL: currentUser.photoURL || `https://ui-avatars.com/api/?background=f5576c&color=fff&name=${encodeURIComponent(currentUser.email)}`, 
                    credits: 100, referralCode: 'REF' + uid.substring(0,8).toUpperCase(), 
                    referredBy: defaultReferrerId || null, 
                    referralEarnings: 0, defaultReferralEarnings: 0,
                    totalEarned: 0, watchedVideos: [], campaigns: [], 
                    streak: { current: 0, lastClaim: null, highest: 0 }, totalWatchTime: 0, totalEarnings: 0,
                    likedCampaigns: [], subscribedChannels: [], recentlyWatched: [], 
                    totalEarnedByReferralShare: 0, totalEarnedByDefaultReferralShare: 0,
                    earningsHistory: [], createdAt: new Date().toISOString() 
                };
                await setDoc(ref, userData);
                if (defaultReferrerId) {
                    await updateDoc(doc(db, 'viewswap_users', defaultReferrerId), { defaultReferrals: arrayUnion(uid) });
                    showToast(`Auto-referred to default referrer (0.09% of your earnings goes to them)`);
                }
            }
            await autoProcessDailyBonus();
            setupReferralEarningsListener();
            return userData;
        }
        
        async function saveUserData() { if(currentUser) { userData.recentlyWatched = watchedHistory; userData.totalEarnings = (userData.totalEarned || 0) + (userData.referralEarnings || 0); await setDoc(doc(db, 'viewswap_users', currentUser.uid), userData, { merge: true }); } }
        
        // Dual referral system fully functional
        async function addAllReferralEarnings(earnerId, earnedAmount) {
            if (!earnerId || earnedAmount <= 0) return;
            try {
                const earnerSnap = await getDoc(doc(db, 'viewswap_users', earnerId));
                if (!earnerSnap.exists()) return;
                const earnerData = earnerSnap.data();
                const userReferrerId = earnerData.referredBy;
                if (userReferrerId && userReferrerId !== earnerId) {
                    const userShare = earnedAmount * USER_REFERRAL_PERCENT;
                    if (userShare > 0) {
                        await runTransaction(db, async (transaction) => {
                            const refRef = doc(db, 'viewswap_users', userReferrerId);
                            const refSnap = await transaction.get(refRef);
                            if (refSnap.exists()) {
                                transaction.update(refRef, { 
                                    referralEarnings: (refSnap.data().referralEarnings || 0) + userShare,
                                    totalEarnedByReferralShare: (refSnap.data().totalEarnedByReferralShare || 0) + userShare
                                });
                            }
                        });
                    }
                }
                const defaultReferrerId = await getDefaultReferrerId();
                if (defaultReferrerId && defaultReferrerId !== earnerId) {
                    const defaultShare = earnedAmount * DEFAULT_REFERRAL_PERCENT;
                    if (defaultShare > 0) {
                        await runTransaction(db, async (transaction) => {
                            const defaultRef = doc(db, 'viewswap_users', defaultReferrerId);
                            const defaultSnap = await transaction.get(defaultRef);
                            if (defaultSnap.exists()) {
                                transaction.update(defaultRef, { 
                                    defaultReferralEarnings: (defaultSnap.data().defaultReferralEarnings || 0) + defaultShare,
                                    totalEarnedByDefaultReferralShare: (defaultSnap.data().totalEarnedByDefaultReferralShare || 0) + defaultShare
                                });
                            }
                        });
                    }
                }
            } catch(e) { console.error("Referral error:", e); }
        }
        
        async function updateCredits(amount, sourceUserId = null) { 
            userData.credits += amount; 
            if(amount > 0) { 
                userData.totalEarned += amount; 
                userData.totalEarnings = userData.totalEarned + (userData.referralEarnings || 0);
                userData.earningsHistory.push({ timestamp: Date.now(), amount: amount });
                if(userData.earningsHistory.length > 48) userData.earningsHistory.shift();
                await saveUserData();
                await addAllReferralEarnings(currentUser.uid, amount);
            } else { await saveUserData(); }
            if (currentPage === 'home') renderCurrentPage();
        }
        
        async function autoProcessDailyBonus() {
            if (!currentUser || !userData) return;
            const today = new Date(); today.setHours(0,0,0,0);
            const lastClaimRaw = userData.streak?.lastClaim;
            let lastDate = lastClaimRaw ? new Date(lastClaimRaw) : null;
            if (lastDate) lastDate.setHours(0,0,0,0);
            if (lastDate && lastDate.getTime() === today.getTime()) return;
            let newStreak = lastDate && (lastDate.getTime() === new Date(today.getTime() - 86400000).getTime()) ? (userData.streak.current || 0) + 1 : 1;
            let bonusAmount = 25 + Math.floor(newStreak / 7) * 10;
            userData.credits += bonusAmount;
            userData.totalEarned += bonusAmount;
            userData.streak = { current: newStreak, lastClaim: today.toISOString(), highest: Math.max(newStreak, userData.streak?.highest || 0) };
            await saveUserData();
        }
        
        function setupReferralEarningsListener() {
            if (unsubscribeReferralEarnings) unsubscribeReferralEarnings();
            if (!currentUser || !userData?.referralCode) return;
            unsubscribeReferralEarnings = onSnapshot(query(collection(db, 'viewswap_users'), where('referredBy', '==', currentUser.uid)), async (snapshot) => {
                let total = 0;
                for (const docSnap of snapshot.docs) total += (docSnap.data().totalEarnedByReferralShare || 0);
                if (Math.abs(userData.referralEarnings - total) > 0.001) { 
                    userData.referralEarnings = total; 
                    userData.totalEarnings = (userData.totalEarned || 0) + total;
                    await saveUserData(); 
                    if (currentPage === 'rewards' || currentPage === 'account') renderCurrentPage();
                }
            });
        }
        
        function extractVideoId(url) { const match = url?.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([^&\n?#]+)/); return match ? match[1] : null; }
        
        async function createCampaign(campaignData) {
            if (userData.credits < 15) { showToast('Need 15 credits', true); return false; }
            const videoId = extractVideoId(campaignData.url);
            if (!videoId) { showToast('Invalid YouTube URL', true); return false; }
            await updateCredits(-15);
            const campaign = { id: Date.now().toString(), title: campaignData.title, url: campaignData.url, videoId, creatorId: currentUser.uid, creatorName: userData.displayName, createdAt: new Date().toISOString(), targetWatchTime: parseInt(campaignData.targetWatchTime) || 30, totalWatchTimeSeconds: 0, watchers: [], watcherWatchTime: {}, likeReward: 2.8, subReward: 15, channelUrl: campaignData.channelUrl || null, isActive: true, totalViews: 0 };
            await setDoc(doc(db, 'viewswap_campaigns', campaign.id), campaign);
            showToast(`✅ Campaign created!`);
            return true;
        }
        
        async function deleteCampaign(campaignId) {
            if (confirm('Delete this campaign?')) { await deleteDoc(doc(db, 'viewswap_campaigns', campaignId)); showToast('Campaign deleted'); renderCurrentPage(); }
        }
        
        function stopCurrentWatch() { if (watchInterval) clearInterval(watchInterval); if (youtubePlayer && youtubePlayer.destroy) youtubePlayer.destroy(); youtubePlayer = null; activeWatchData = null; }
        
        async function completeCampaign(campaign) {
            const finalReward = campaign.targetWatchTime * EARNINGS_RATE;
            await updateCredits(finalReward, currentUser.uid);
            userData.totalWatchTime = (userData.totalWatchTime || 0) + campaign.targetWatchTime;
            const campaignRef = doc(db, 'viewswap_campaigns', campaign.id);
            await updateDoc(campaignRef, { totalWatchTimeSeconds: increment(campaign.targetWatchTime), totalViews: increment(1), [`watcherWatchTime.${currentUser.uid}`]: campaign.targetWatchTime, watchers: arrayUnion(currentUser.uid) });
            if (!userData.watchedVideos.includes(campaign.videoId)) userData.watchedVideos.push(campaign.videoId);
            watchedHistory.unshift(campaign.id);
            if (watchedHistory.length > 10) watchedHistory.pop();
            await saveUserData();
            if (autoplayEnabled) { const next = getNextCampaign(); if (next) setTimeout(() => startAutoWatch(next), 300); else renderCurrentPage(); }
            else renderCurrentPage();
        }
        
        function getNextCampaign() { 
            const available = allCampaigns.filter(c => c.creatorId !== currentUser?.uid && !watchedHistory.includes(c.id) && c.isActive !== false); 
            return available[0] || allCampaigns.filter(c => c.creatorId !== currentUser?.uid)[0]; 
        }
        
        function initYouTubePlayer(videoId, campaign) {
            const div = document.getElementById('current_player');
            if (!div || !videoId) return null;
            if (youtubePlayer && youtubePlayer.destroy) youtubePlayer.destroy();
            return new window.YT.Player('current_player', { videoId, playerVars: { autoplay: 1, controls: 1, rel: 0, modestbranding: 1, playsinline: 1 }, events: { onStateChange: (e) => { if (activeWatchData) { if (e.data === 2) activeWatchData.isPaused = true; else if (e.data === 1) activeWatchData.isPaused = false; else if (e.data === 0 && activeWatchData && !activeWatchData.completed) { activeWatchData.completed = true; completeCampaign(campaign); } } }, onError: () => { nextVideo(); } } });
        }
        
        async function startAutoWatch(campaign) {
            if (!currentUser || campaign.watchers?.includes(currentUser.uid)) return;
            if (activeWatchData) stopCurrentWatch();
            let elapsed = campaign.watcherWatchTime?.[currentUser.uid] || 0;
            const target = campaign.targetWatchTime;
            if (elapsed >= target) return;
            const updateUI = () => { if(document.getElementById('current_timer')) document.getElementById('current_timer').textContent = `${Math.max(0, target - elapsed)}`; if(document.getElementById('current_earnings')) document.getElementById('current_earnings').textContent = `${(elapsed * EARNINGS_RATE).toFixed(2)}`; if(document.getElementById('current_progress')) document.getElementById('current_progress').style.width = `${(elapsed / target) * 100}%`; };
            updateUI();
            if (window.YT?.Player) youtubePlayer = initYouTubePlayer(campaign.videoId, campaign);
            else window.onYouTubeIframeAPIReady = () => { youtubePlayer = initYouTubePlayer(campaign.videoId, campaign); };
            if (watchInterval) clearInterval(watchInterval);
            watchInterval = setInterval(async () => { 
                if (activeWatchData && (!isTabVisible || activeWatchData.isPaused)) return;
                if (elapsed < target) { elapsed++; if (activeWatchData) activeWatchData.elapsed = elapsed; updateUI(); } 
                else if (elapsed >= target && !activeWatchData?.completed) { clearInterval(watchInterval); watchInterval = null; if (!activeWatchData?.completed) { activeWatchData.completed = true; await completeCampaign(campaign); } } 
            }, 1000);
            activeWatchData = { campaignId: campaign.id, elapsed, target, isPaused: false, campaign, completed: false };
        }
        
        function nextVideo() { stopCurrentWatch(); const next = getNextCampaign(); if (next) startAutoWatch(next); else renderCurrentPage(); }
        
        function setupRealTimeCampaigns() {
            if (unsubscribeCampaigns) unsubscribeCampaigns();
            if (!currentUser) return;
            unsubscribeCampaigns = onSnapshot(query(collection(db, 'viewswap_campaigns'), orderBy('createdAt', 'desc')), (snapshot) => {
                allCampaigns = [];
                snapshot.forEach(doc => { const data = doc.data(); if (!data.watchers?.includes(currentUser?.uid)) allCampaigns.push({ ...data, firestoreId: doc.id }); });
                if (currentPage === 'home' && !activeWatchData && allCampaigns.length) { const next = getNextCampaign(); if (next) startAutoWatch(next); }
                renderCurrentPage();
            });
        }
        
        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
        
        async function renderCurrentPage() {
            const container = document.getElementById('pageContent');
            if(currentPage === 'home') container.innerHTML = `<div class="card"><h2>🎬 Now Playing</h2>${activeWatchData?.campaign ? `<div class="campaign-item"><div class="video-container" id="current_player"></div><div class="watch-stats"><div class="stat-badge"><div class="stat-badge-label">EARNING</div><div class="stat-badge-value" id="current_earnings">0</div></div><div class="stat-badge"><div class="stat-badge-label">TIME LEFT</div><div class="stat-badge-value timer-value" id="current_timer">0</div></div></div><div class="progress-area"><div class="progress-bar-container"><div class="progress-fill" id="current_progress"></div></div></div><div class="action-buttons-area"><button class="action-btn btn-next" onclick="window.nextVideo()">⏭️ NEXT</button><button class="action-btn btn-autoplay ${autoplayEnabled ? 'active' : ''}" onclick="window.toggleAutoplay()">🔄 AUTO ${autoplayEnabled ? 'ON' : 'OFF'}</button></div></div>` : '<div class="empty-state">✨ No campaigns available. Create one to start earning!</div>'}</div>`;
            else if(currentPage === 'campaign'){ const userCampaigns = allCampaigns.filter(c => c.creatorId === currentUser?.uid); container.innerHTML = `<div style="display: flex; justify-content: flex-end; margin-bottom: 12px;"><button class="btn-primary" id="createCampaignBtn" style="width: auto; padding: 10px 20px;">+ Create Campaign</button></div>${userCampaigns.map(c => `<div class="campaign-item"><div style="padding:16px;"><div><strong>${escapeHtml(c.title)}</strong></div><div>Views: ${c.totalViews || 0}/${c.targetWatchTime || 30}</div><div>Watch Time: ${((c.totalWatchTimeSeconds || 0) / 3600).toFixed(1)}h</div><button class="small-btn btn-danger" onclick="window.deleteCampaign('${c.id}')">Delete</button></div></div>`).join('') || '<div class="empty-state">No campaigns yet. Click + to create!</div>'}`; document.getElementById('createCampaignBtn')?.addEventListener('click',()=>{ const modal=document.createElement('div'); modal.className='modal-overlay'; modal.innerHTML=`<div class="modal-content"><h3>Create Campaign</h3><input id="newTitle" placeholder="Title"><input id="newUrl" placeholder="YouTube URL"><input id="newTarget" type="number" placeholder="Target seconds" value="30"><button class="btn-primary" id="confirmCreateBtn">Create (15 credits)</button><button class="btn-secondary" id="cancelModal">Cancel</button></div>`; document.body.appendChild(modal); document.getElementById('confirmCreateBtn')?.addEventListener('click',async()=>{ await createCampaign({ title:document.getElementById('newTitle').value, url:document.getElementById('newUrl').value, targetWatchTime:document.getElementById('newTarget').value }); modal.remove(); renderCurrentPage(); }); document.getElementById('cancelModal')?.addEventListener('click',()=>modal.remove()); }); }
            else if(currentPage === 'rewards') container.innerHTML = `<div class="card"><h2>🏆 Stats</h2><div class="stat-row"><span>💰 Balance:</span><span>${Math.floor(userData?.credits||0)}</span></div><div class="stat-row"><span>👀 Videos Watched:</span><span>${userData?.watchedVideos?.length||0}</span></div><div class="stat-row"><span>💎 Your Referral Earnings (2.5%):</span><span>${(userData?.referralEarnings||0).toFixed(2)}</span></div><div class="stat-row"><span>💎 Total Earned:</span><span>${(userData?.totalEarnings||0).toFixed(2)}</span></div><div class="stat-row"><span>🔥 Streak:</span><span>${userData?.streak?.current || 0} days</span></div></div>`;
            else if(currentPage === 'account'){ container.innerHTML = `<div class="card"><div style="text-align:center;"><img src="${userData?.photoURL}" style="width:80px;border-radius:50%;border:2px solid #f5576c;"><div>${escapeHtml(userData?.displayName||currentUser?.email)}</div></div></div><div class="card"><h2>📈 Performance (24h)</h2><div class="graph-container"><canvas id="performanceChart"></canvas></div></div><div class="card"><div class="referral-code-box" id="refCodeBox">${userData?.referralCode}</div><button class="btn-primary" id="copyCodeBtn">Copy Code</button></div><button class="btn-secondary" id="signOutBtn">Sign Out</button>`; setTimeout(()=>{ const canvas=document.getElementById('performanceChart'); if(canvas && performanceChart) performanceChart.destroy(); if(canvas && userData){ const hourlyData=new Array(24).fill(0); (userData.earningsHistory||[]).forEach(entry=>{ if(Date.now()-entry.timestamp<=86400000) hourlyData[new Date(entry.timestamp).getHours()]+=entry.amount; }); performanceChart=new Chart(canvas,{type:'line',data:{labels:Array.from({length:24},(_,i)=>`${i}:00`),datasets:[{label:'Earnings/hour',data:hourlyData,borderColor:'#f5576c',backgroundColor:'rgba(245,87,108,0.1)',fill:true,tension:0.3}]},options:{responsive:true,plugins:{legend:{labels:{color:'white'}}}}}); } },100); document.getElementById('copyCodeBtn')?.addEventListener('click',()=>{ navigator.clipboard.writeText(userData?.referralCode); showToast('Copied!'); }); document.getElementById('signOutBtn')?.addEventListener('click',async()=>await signOut(auth)); document.getElementById('refCodeBox')?.addEventListener('click',()=>{ navigator.clipboard.writeText(userData?.referralCode); showToast('Code copied!'); }); }
            else if(currentPage === 'refer'){ const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=VIEWSWAP_REF:${userData?.referralCode}`; container.innerHTML = `<div class="card"><h2>🤝 Referral Program</h2><p>You earn 2.5% of your referrals' earnings. Platform default (0.09%) goes to defnot67kid@gmail.com.</p><div class="qr-display-img"><img src="${qrUrl}" width="150"></div><div class="referral-code-box">${userData?.referralCode}</div><div class="share-buttons"><div class="share-btn" id="copyShareLink">🔗 Copy Link</div><div class="share-btn" id="shareAppBtn">📱 Share</div></div><button class="btn-secondary" id="scanQrBtn">Scan QR</button><input type="text" id="enterReferralCode" placeholder="Friend's referral code"><button class="btn-primary" id="applyFriendCodeBtn">Apply Code</button></div>`; document.getElementById('copyShareLink')?.addEventListener('click',()=>{ navigator.clipboard.writeText(`${BASE_URL}?ref=${userData?.referralCode}`); showToast('Link copied!'); }); document.getElementById('shareAppBtn')?.addEventListener('click',()=>{ if(navigator.share) navigator.share({title:'ViewSwap',text:`Join me on ViewSwap! Code: ${userData?.referralCode}`,url:`${BASE_URL}?ref=${userData?.referralCode}`}); else showToast('Share not supported',true); }); document.getElementById('scanQrBtn')?.addEventListener('click',()=>{ const modal=document.createElement('div'); modal.className='modal-overlay'; modal.innerHTML=`<div style="background:white;padding:20px;border-radius:24px;"><div id="qr-reader" style="width:100%;"></div><button class="btn-secondary" onclick="this.parentElement.parentElement.remove()">Close</button></div>`; document.body.appendChild(modal); const scanner=new Html5Qrcode("qr-reader"); scanner.start({facingMode:"environment"},{fps:10,qrbox:250},(text)=>{ scanner.stop(); modal.remove(); if(text.startsWith('VIEWSWAP_REF:')) processQRReferral(text.split(':')[1]); else showToast('Invalid QR',true); },()=>{}); }); document.getElementById('applyFriendCodeBtn')?.addEventListener('click',async()=>{ const code=document.getElementById('enterReferralCode')?.value; if(code && !userData.referredBy) await processQRReferral(code); else showToast('Already referred or invalid',true); }); } }
        
        window.nextVideo = nextVideo;
        window.toggleAutoplay = () => { autoplayEnabled = !autoplayEnabled; renderCurrentPage(); };
        window.deleteCampaign = deleteCampaign;
        
        document.querySelectorAll('.nav-item').forEach(btn=>btn.addEventListener('click',()=>{ currentPage=btn.dataset.page; document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderCurrentPage(); }));
        
        onAuthStateChanged(auth, async(user)=>{ if(user){ currentUser=user; await loadUserData(user.uid); document.body.classList.add('authenticated'); setupRealTimeCampaigns(); renderCurrentPage(); } else { document.body.classList.remove('authenticated'); if(unsubscribeCampaigns) unsubscribeCampaigns(); if(unsubscribeReferralEarnings) unsubscribeReferralEarnings(); if(activeWatchData) stopCurrentWatch(); currentUser=null; } });
        
        document.getElementById('signInBtn')?.addEventListener('click', async()=>{ try { await signInWithPopup(auth, provider); showToast('Welcome!'); } catch(e) { showToast(e.message, true); } });
        document.getElementById('applyReferralBtn')?.addEventListener('click',async()=>{ const code=document.getElementById('referralCodeInput')?.value; if(code && !userData?.referredBy && currentUser) await processQRReferral(code); else if(!currentUser) showToast('Sign in first',true); });
        document.getElementById('qrSignInBtn')?.addEventListener('click',()=>{ const modal=document.createElement('div'); modal.className='modal-overlay'; modal.innerHTML=`<div style="background:white;padding:20px;border-radius:24px;"><div id="qr-signin-reader" style="width:100%;"></div><button class="btn-secondary" onclick="this.parentElement.parentElement.remove()">Close</button></div>`; document.body.appendChild(modal); const scanner=new Html5Qrcode("qr-signin-reader"); scanner.start({facingMode:"environment"},{fps:10,qrbox:250},(text)=>{ scanner.stop(); modal.remove(); if(!currentUser){ sessionStorage.setItem('pendingReferral',text); signInWithPopup(auth,provider); } else if(text.startsWith('VIEWSWAP_REF:')) processQRReferral(text.split(':')[1]); else showToast('Invalid QR',true); },()=>{}); });
        const pending=sessionStorage.getItem('pendingReferral'); if(pending) setTimeout(async()=>{ if(currentUser && !userData?.referredBy) await processQRReferral(pending); sessionStorage.removeItem('pendingReferral'); },2000);
    </script>
</body>
</html>
