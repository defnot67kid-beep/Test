<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>ViewSwap Elite - Firebase Powered</title>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, where, getDocs, arrayUnion, arrayRemove, increment, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAupBkllyicDPD9O6CmX4mS4sF5z96mqxc",
            authDomain: "vertexpaste.firebaseapp.com",
            projectId: "vertexpaste",
            storageBucket: "vertexpaste.firebasestorage.app",
            messagingSenderId: "255275350380",
            appId: "1:255275350380:web:7be4e8add2cb5b04045b49"
        };
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();
        
        // Make available globally
        window.firebaseAuth = auth;
        window.firebaseDB = db;
        window.googleProvider = googleProvider;
        window.signInWithPopup = signInWithPopup;
        window.signOut = signOut;
        window.onAuthStateChanged = onAuthStateChanged;
        window.dbHelpers = { doc, setDoc, getDoc, updateDoc, collection, query, where, getDocs, arrayUnion, arrayRemove, increment, runTransaction };
        
        console.log('Firebase initialized successfully');
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --primary-light: #a78bfa;
            --primary-glow: rgba(139, 92, 246, 0.4);
            --secondary: #ec489a;
            --secondary-dark: #db2777;
            --success: #10b981;
            --success-dark: #059669;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --dark: #0a0a0a;
            --gray-900: #121212;
            --gray-800: #1e1e1e;
            --gray-700: #2d2d2d;
            --gray-600: #3a3a3a;
            --gray-500: #6b6b6b;
            --gray-400: #9ca3af;
            --gray-300: #d1d5db;
            --gray-200: #e5e7eb;
            --gray-100: #f3f4f6;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at 0% 0%, #1a1a2e 0%, #16213e 50%, #0f0f1a 100%);
            min-height: 100vh;
            padding-bottom: 85px;
            position: relative;
            color: var(--gray-100);
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(236, 72, 153, 0.15) 0%, transparent 50%),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: 0;
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(139, 92, 246, 0.3);
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            padding: 0 16px;
        }

        /* Auth Section */
        .auth-section {
            background: linear-gradient(135deg, rgba(30, 30, 40, 0.95) 0%, rgba(20, 20, 30, 0.95) 100%);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 32px 24px;
            margin: 20px 0;
            text-align: center;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 16px;
            border: 3px solid var(--primary);
            object-fit: cover;
        }

        .user-name {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .user-email {
            font-size: 0.8rem;
            color: var(--gray-400);
            margin-bottom: 16px;
        }

        .google-btn {
            background: linear-gradient(135deg, #4285f4, #34a853);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
        }

        .google-btn:active {
            transform: scale(0.96);
        }

        .signout-btn {
            background: linear-gradient(135deg, var(--danger), #dc2626);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }

        /* Glass Header */
        .header {
            padding: 20px 0 16px;
            text-align: center;
            position: sticky;
            top: 0;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 0 0 32px 32px;
            margin: -16px -16px 16px -16px;
            padding: 20px 16px;
            z-index: 100;
            border-bottom: 1px solid rgba(139, 92, 246, 0.3);
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, var(--primary-light) 50%, var(--secondary) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Premium Credit Card */
        .credit-card {
            background: linear-gradient(135deg, rgba(30, 30, 40, 0.95) 0%, rgba(20, 20, 30, 0.95) 100%);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .credit-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--warning));
        }

        .credit-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--gray-400);
            font-weight: 600;
        }

        .credit-amount {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 8px 0;
        }

        .daily-bonus {
            background: linear-gradient(135deg, var(--warning) 0%, #ea580c 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(18, 18, 27, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 8px 16px 20px;
            border-top: 1px solid rgba(139, 92, 246, 0.3);
            max-width: 500px;
            margin: 0 auto;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            padding: 8px 12px;
            border-radius: 40px;
            flex: 1;
            color: var(--gray-500);
        }

        .nav-item.active {
            color: white;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(236, 72, 153, 0.2));
        }

        .nav-icon {
            font-size: 1.5rem;
        }

        .nav-label {
            font-size: 0.65rem;
            font-weight: 600;
        }

        /* Cards */
        .card {
            background: rgba(25, 25, 35, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        .card h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            border-left: 3px solid var(--primary);
            padding-left: 12px;
        }

        /* Action Grid */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 10px;
            margin: 16px 0;
        }

        .action-card {
            background: rgba(45, 45, 55, 0.8);
            border: 2px solid rgba(139, 92, 246, 0.2);
            border-radius: 20px;
            padding: 12px 8px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
        }

        .action-card.selected {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
            transform: scale(1.02);
        }

        .action-emoji {
            font-size: 1.8rem;
        }

        .action-name {
            font-weight: 700;
            font-size: 0.7rem;
        }

        /* Campaign Items */
        .campaign-item {
            background: rgba(35, 35, 45, 0.8);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        .campaign-title {
            font-weight: 700;
            margin-bottom: 8px;
        }

        .action-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
        }

        .badge {
            background: rgba(139, 92, 246, 0.2);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
        }

        .progress-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            height: 6px;
            margin: 10px 0;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            height: 100%;
            border-radius: 20px;
            transition: width 0.5s;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), var(--success-dark));
            color: white;
        }

        input, select {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            background: rgba(35, 35, 45, 0.9);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 20px;
            color: white;
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            padding: 12px 20px;
            border-radius: 60px;
            z-index: 2000;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .hidden {
            display: none;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray-500);
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="app-container">
        <div class="header">
            <h1>⚡ ViewSwap Elite</h1>
        </div>

        <!-- Auth Section -->
        <div id="authSection" class="auth-section">
            <div id="unauthContent">
                <div style="font-size: 3rem; margin-bottom: 16px;">🔐</div>
                <h2 style="margin-bottom: 8px;">Welcome to ViewSwap</h2>
                <p style="color: var(--gray-400); margin-bottom: 24px;">Sign in to start earning and growing</p>
                <button class="google-btn" id="googleSignInBtn">
                    🚀 Sign in with Google
                </button>
            </div>
            <div id="authContent" class="hidden">
                <img id="userAvatar" class="user-avatar" src="" alt="Avatar">
                <div class="user-name" id="userName"></div>
                <div class="user-email" id="userEmail"></div>
                <button class="signout-btn" id="signOutBtn">Sign Out</button>
            </div>
        </div>

        <!-- Main App Content (Hidden until logged in) -->
        <div id="appContent" class="hidden">
            <div class="credit-card">
                <div class="credit-label">💰 TOTAL CREDITS</div>
                <div class="credit-amount" id="creditBalance">0</div>
                <button class="daily-bonus" id="dailyBonusBtn">🎁 Daily Bonus</button>
            </div>

            <div id="contentArea"></div>
        </div>

        <div class="bottom-nav" id="bottomNav" style="display: none;">
            <button class="nav-item active" data-page="home">
                <div class="nav-icon">🏠</div>
                <div class="nav-label">Home</div>
            </button>
            <button class="nav-item" data-page="campaign">
                <div class="nav-icon">📢</div>
                <div class="nav-label">Campaign</div>
            </button>
            <button class="nav-item" data-page="earn">
                <div class="nav-icon">👁️</div>
                <div class="nav-label">Earn</div>
            </button>
            <button class="nav-item" data-page="referral">
                <div class="nav-icon">🤝</div>
                <div class="nav-label">Refer</div>
            </button>
            <button class="nav-item" data-page="help">
                <div class="nav-icon">❓</div>
                <div class="nav-label">Help</div>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, where, getDocs, arrayUnion, increment, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAupBkllyicDPD9O6CmX4mS4sF5z96mqxc",
            authDomain: "vertexpaste.firebaseapp.com",
            projectId: "vertexpaste",
            storageBucket: "vertexpaste.firebasestorage.app",
            messagingSenderId: "255275350380",
            appId: "1:255275350380:web:7be4e8add2cb5b04045b49"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        
        // Action types configuration
        const ACTION_TYPES = {
            view: { name: 'Views', emoji: '👁️', baseCost: 1, reward: 1 },
            subscriber: { name: 'Subscribers', emoji: '🔔', baseCost: 5, reward: 5 },
            like: { name: 'Likes', emoji: '❤️', baseCost: 1, reward: 1 },
            comment: { name: 'Comments', emoji: '💬', baseCost: 3, reward: 3 },
            commentLike: { name: 'Comment Likes', emoji: '⭐', baseCost: 1, reward: 1 }
        };
        
        let currentUser = null;
        let userData = null;
        let currentPage = 'home';
        let selectedActions = new Set();
        let campaignTargets = { view: 0, subscriber: 0, like: 0, comment: 0, commentLike: 0 };
        
        // Helper Functions
        function showToast(message, duration = 2500) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = 'rgba(0,0,0,0.9)';
            toast.style.color = 'white';
            toast.style.padding = '12px 20px';
            toast.style.borderRadius = '60px';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), duration);
        }
        
        // Load/Save User Data to Firestore
        async function loadUserData(uid) {
            const userRef = doc(db, 'users', uid);
            const userSnap = await getDoc(userRef);
            
            if (userSnap.exists()) {
                userData = userSnap.data();
            } else {
                // Create new user
                userData = {
                    uid: uid,
                    email: currentUser.email,
                    displayName: currentUser.displayName,
                    photoURL: currentUser.photoURL,
                    credits: 500,
                    referralCode: 'REF' + uid.substring(0, 6).toUpperCase(),
                    referredBy: null,
                    referralEarnings: 0,
                    totalEarned: 0,
                    totalSpent: 0,
                    lastDailyBonus: null,
                    referrals: [],
                    campaigns: [],
                    createdAt: new Date().toISOString()
                };
                await setDoc(userRef, userData);
            }
            
            updateCreditDisplay();
            return userData;
        }
        
        async function saveUserData() {
            if (!currentUser) return;
            const userRef = doc(db, 'users', currentUser.uid);
            await setDoc(userRef, userData, { merge: true });
        }
        
        async function updateCredits(amount, reason = '') {
            if (!currentUser) return false;
            userData.credits += amount;
            if (amount > 0) userData.totalEarned += amount;
            if (amount < 0) userData.totalSpent += Math.abs(amount);
            
            await saveUserData();
            updateCreditDisplay();
            if (reason) showToast(reason);
            
            // Give commission to referrer
            if (amount > 0 && userData.referredBy) {
                const referrerRef = doc(db, 'users', userData.referredBy);
                const commission = amount * 0.05;
                await runTransaction(db, async (transaction) => {
                    const referrerSnap = await transaction.get(referrerRef);
                    if (referrerSnap.exists()) {
                        const referrerData = referrerSnap.data();
                        transaction.update(referrerRef, {
                            credits: (referrerData.credits || 0) + commission,
                            referralEarnings: (referrerData.referralEarnings || 0) + commission,
                            totalEarned: (referrerData.totalEarned || 0) + commission
                        });
                    }
                });
            }
            
            return true;
        }
        
        function updateCreditDisplay() {
            const balanceEl = document.getElementById('creditBalance');
            if (balanceEl) balanceEl.textContent = Math.floor(userData?.credits || 0);
        }
        
        // Daily Bonus
        async function claimDailyBonus() {
            if (!userData) return;
            const lastBonus = userData.lastDailyBonus ? new Date(userData.lastDailyBonus) : null;
            const today = new Date();
            
            if (lastBonus && lastBonus.getDate() === today.getDate() && 
                lastBonus.getMonth() === today.getMonth() && 
                lastBonus.getFullYear() === today.getFullYear()) {
                showToast('Already claimed today! Come back tomorrow.');
                return;
            }
            
            await updateCredits(75, '🎁 Daily bonus! +75 credits');
            userData.lastDailyBonus = today.toISOString();
            await saveUserData();
        }
        
        // Create Campaign
        async function createCampaign(title, url, targets) {
            let totalCost = 0;
            const actions = [];
            
            for (const [type, target] of Object.entries(targets)) {
                if (target > 0 && selectedActions.has(type)) {
                    const cost = target * ACTION_TYPES[type].baseCost;
                    totalCost += cost;
                    actions.push({ type, target, reward: ACTION_TYPES[type].reward, cost });
                }
            }
            
            if (totalCost === 0) {
                showToast('Select at least one action');
                return false;
            }
            
            if (userData.credits < totalCost) {
                showToast(`Need ${totalCost} credits!`);
                return false;
            }
            
            await updateCredits(-totalCost);
            
            const campaign = {
                id: Date.now(),
                title,
                url,
                actions,
                progress: Object.fromEntries(actions.map(a => [a.type, 0])),
                createdAt: new Date().toISOString(),
                completed: false
            };
            
            userData.campaigns.push(campaign);
            await saveUserData();
            showToast(`Campaign created! Spent ${totalCost} credits`);
            return true;
        }
        
        // Render Functions
        function renderHome() {
            return `
                <div class="card">
                    <h2>📊 Dashboard</h2>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                        <div class="stat-card" style="background: rgba(139,92,246,0.1); padding: 16px; border-radius: 20px; text-align: center;">
                            <div style="font-size: 1.5rem; font-weight: bold;">${userData?.campaigns?.length || 0}</div>
                            <div style="font-size: 0.7rem;">Campaigns</div>
                        </div>
                        <div class="stat-card" style="background: rgba(139,92,246,0.1); padding: 16px; border-radius: 20px; text-align: center;">
                            <div style="font-size: 1.5rem; font-weight: bold;">${userData?.totalEarned || 0}</div>
                            <div style="font-size: 0.7rem;">Earned</div>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <h2>🚀 Quick Actions</h2>
                    <button class="btn btn-primary" onclick="window.switchToCampaign()">Create Campaign</button>
                    <button class="btn btn-success" style="margin-top: 10px;" onclick="window.switchToEarn()">Earn Credits</button>
                </div>
            `;
        }
        
        function renderCampaign() {
            return `
                <div class="card">
                    <h2>🎯 Create Campaign</h2>
                    <input type="text" id="campaignTitle" placeholder="Campaign title">
                    <input type="url" id="campaignUrl" placeholder="YouTube URL">
                    <div class="action-grid" id="actionGrid">
                        ${Object.entries(ACTION_TYPES).map(([key, type]) => `
                            <div class="action-card" data-action="${key}" onclick="window.toggleAction('${key}')">
                                <div class="action-emoji">${type.emoji}</div>
                                <div class="action-name">${type.name}</div>
                                <div class="action-price">💰 ${type.baseCost}</div>
                            </div>
                        `).join('')}
                    </div>
                    <div id="targetControls"></div>
                    <div class="cost-display" style="background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 20px; padding: 16px; text-align: center; margin: 16px 0;">
                        <div style="font-size: 0.8rem;">Total Cost</div>
                        <div style="font-size: 2rem; font-weight: bold;" id="totalCost">0</div>
                    </div>
                    <button class="btn btn-primary" onclick="window.submitCampaign()">Launch Campaign</button>
                </div>
                <div class="card">
                    <h2>📊 Active Campaigns</h2>
                    ${userData?.campaigns?.filter(c => !c.completed).map(c => `
                        <div class="campaign-item">
                            <div class="campaign-title">${escapeHtml(c.title)}</div>
                            <div class="action-badges">
                                ${c.actions.map(a => `
                                    <span class="badge">${ACTION_TYPES[a.type].emoji} ${c.progress[a.type] || 0}/${a.target}</span>
                                `).join('')}
                            </div>
                            ${c.actions.map(a => `
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${((c.progress[a.type] || 0) / a.target) * 100}%"></div>
                                </div>
                            `).join('')}
                        </div>
                    `).join('') || '<div class="empty-state">No active campaigns</div>'}
                </div>
            `;
        }
        
        function renderEarn() {
            return `
                <div class="card">
                    <h2>👁️ Earn Credits</h2>
                    <p style="margin-bottom: 16px; color: var(--gray-400);">Complete actions to earn credits. Your referrer gets 5%!</p>
                    <div class="empty-state">Actions will appear when users create campaigns</div>
                </div>
            `;
        }
        
        function renderReferral() {
            return `
                <div class="card">
                    <h2>🤝 Referral Program</h2>
                    <div style="background: linear-gradient(135deg, var(--warning), #ea580c); border-radius: 20px; padding: 16px; text-align: center; margin-bottom: 16px;">
                        <div>🎁 5% Commission on referral earnings!</div>
                    </div>
                    <div style="background: rgba(139,92,246,0.1); border-radius: 20px; padding: 20px; text-align: center;">
                        <div style="font-size: 0.8rem;">Your Referral Code</div>
                        <div style="font-size: 1.5rem; font-weight: bold; font-family: monospace; margin: 12px 0;">${userData?.referralCode || ''}</div>
                        <button class="btn btn-primary" onclick="window.copyReferralCode()">📋 Copy Code</button>
                    </div>
                    <div class="card" style="margin-top: 16px;">
                        <h2>📊 Commission Stats</h2>
                        <div style="font-size: 2rem; font-weight: bold; color: var(--primary);">${(userData?.referralEarnings || 0).toFixed(2)}</div>
                        <div style="font-size: 0.7rem;">Credits from referrals</div>
                    </div>
                </div>
            `;
        }
        
        function renderHelp() {
            return `
                <div class="card">
                    <h2>❓ How It Works</h2>
                    <div style="line-height: 1.8;">
                        <p><strong>1. Sign in with Google</strong> - Secure authentication</p>
                        <p><strong>2. Earn Credits</strong> - Watch videos, get 5% for referrer</p>
                        <p><strong>3. Create Campaigns</strong> - Spend credits on views/subs/likes/comments</p>
                        <p><strong>4. Referral Commission</strong> - Earn 5% of all referral earnings!</p>
                    </div>
                </div>
            `;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        async function renderCurrentPage() {
            const container = document.getElementById('contentArea');
            if (!container) return;
            
            switch(currentPage) {
                case 'home': container.innerHTML = renderHome(); break;
                case 'campaign': container.innerHTML = renderCampaign(); break;
                case 'earn': container.innerHTML = renderEarn(); break;
                case 'referral': container.innerHTML = renderReferral(); break;
                case 'help': container.innerHTML = renderHelp(); break;
            }
        }
        
        // Campaign UI Helpers
        window.toggleAction = function(actionKey) {
            const el = document.querySelector(`.action-card[data-action="${actionKey}"]`);
            if (selectedActions.has(actionKey)) {
                selectedActions.delete(actionKey);
                el.classList.remove('selected');
            } else {
                selectedActions.add(actionKey);
                el.classList.add('selected');
                campaignTargets[actionKey] = 10;
            }
            updateTargetControls();
        };
        
        function updateTargetControls() {
            const container = document.getElementById('targetControls');
            if (!container) return;
            
            if (selectedActions.size === 0) {
                container.innerHTML = '<div class="empty-state">Select actions above</div>';
                document.getElementById('totalCost').textContent = '0';
                return;
            }
            
            container.innerHTML = Array.from(selectedActions).map(key => `
                <div style="margin: 12px 0;">
                    <label>${ACTION_TYPES[key].emoji} ${ACTION_TYPES[key].name} (${ACTION_TYPES[key].baseCost} credits)</label>
                    <input type="range" min="0" max="100" value="${campaignTargets[key]}" onchange="window.updateTarget('${key}', this.value)">
                    <div style="text-align: center; margin-top: 8px;">${campaignTargets[key]}</div>
                </div>
            `).join('');
            
            updateTotalCost();
        }
        
        window.updateTarget = function(key, value) {
            campaignTargets[key] = parseInt(value);
            updateTotalCost();
        };
        
        function updateTotalCost() {
            let total = 0;
            for (const [key, target] of Object.entries(campaignTargets)) {
                if (selectedActions.has(key)) {
                    total += target * ACTION_TYPES[key].baseCost;
                }
            }
            const costEl = document.getElementById('totalCost');
            if (costEl) costEl.textContent = total;
        }
        
        window.submitCampaign = async function() {
            const title = document.getElementById('campaignTitle')?.value;
            const url = document.getElementById('campaignUrl')?.value;
            if (!title || !url) {
                showToast('Enter title and URL');
                return;
            }
            
            const targets = {};
            for (const action of selectedActions) {
                targets[action] = campaignTargets[action];
            }
            
            await createCampaign(title, url, targets);
            document.getElementById('campaignTitle').value = '';
            document.getElementById('campaignUrl').value = '';
            selectedActions.clear();
            document.querySelectorAll('.action-card').forEach(c => c.classList.remove('selected'));
            campaignTargets = { view: 0, subscriber: 0, like: 0, comment: 0, commentLike: 0 };
            updateTargetControls();
            renderCurrentPage();
        };
        
        window.copyReferralCode = function() {
            navigator.clipboard.writeText(userData.referralCode);
            showToast('Referral code copied!');
        };
        
        window.switchToCampaign = function() {
            document.querySelector('[data-page="campaign"]').click();
        };
        
        window.switchToEarn = function() {
            document.querySelector('[data-page="earn"]').click();
        };
        
        // Navigation
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const page = btn.dataset.page;
                currentPage = page;
                document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                await renderCurrentPage();
            });
        });
        
        // Daily Bonus
        document.getElementById('dailyBonusBtn')?.addEventListener('click', async () => {
            await claimDailyBonus();
            await renderCurrentPage();
        });
        
        // Auth State Handler
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await loadUserData(user.uid);
                
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('appContent').classList.remove('hidden');
                document.getElementById('bottomNav').style.display = 'flex';
                
                document.getElementById('userAvatar').src = user.photoURL || '';
                document.getElementById('userName').textContent = user.displayName;
                document.getElementById('userEmail').textContent = user.email;
                document.getElementById('authContent').classList.remove('hidden');
                document.getElementById('unauthContent').classList.add('hidden');
                
                await renderCurrentPage();
            } else {
                document.getElementById('authSection').style.display = 'block';
                document.getElementById('appContent').classList.add('hidden');
                document.getElementById('bottomNav').style.display = 'none';
                document.getElementById('authContent').classList.add('hidden');
                document.getElementById('unauthContent').classList.remove('hidden');
                currentUser = null;
                userData = null;
            }
        });
        
        // Google Sign In
        document.getElementById('googleSignInBtn')?.addEventListener('click', async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                showToast(`Welcome ${result.user.displayName}!`);
            } catch (error) {
                console.error(error);
                showToast('Sign in failed: ' + error.message);
            }
        });
        
        // Sign Out
        document.getElementById('signOutBtn')?.addEventListener('click', async () => {
            await signOut(auth);
            showToast('Signed out successfully');
        });
        
        // Create particles
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.width = Math.random() * 4 + 2 + 'px';
            p.style.height = p.style.width;
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = Math.random() * 10 + 5 + 's';
            p.style.animationDelay = Math.random() * 5 + 's';
            document.getElementById('particles').appendChild(p);
        }
    </script>
</body>
</html>
