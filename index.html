<body>
    <div class="signin-overlay" id="signinOverlay">
        <div class="signin-card">
            <div style="font-size: 4rem;">🏆</div>
            <h2>ViewSwap</h2>
            <p>Earn Rewards • Complete Achievements • Daily Streaks</p>
            <button class="google-signin-btn" id="signInBtn">🟢 Sign in with Google</button>
        </div>
    </div>

    <div id="mainAppContent">
        <div class="bg-particles" id="particles"></div>
        <div class="container">
            <div class="header">
                <h1>🏆 ViewSwap</h1>
                <p>Rewards • Streaks • Achievements</p>
                <div class="online-badge" id="onlineCountBadge">👥 Loading...</div>
            </div>
            <div id="pageContent"></div>
        </div>
        <div class="bottom-nav">
            <button class="nav-item active" data-page="home"><div class="nav-icon">🏠</div><div class="nav-label">Home</div></button>
            <button class="nav-item" data-page="campaign"><div class="nav-icon">📢</div><div class="nav-label">Campaign</div></button>
            <button class="nav-item" data-page="rewards"><div class="nav-icon">🎁</div><div class="nav-label">Rewards</div></button>
            <button class="nav-item" data-page="account"><div class="nav-icon">👤</div><div class="nav-label">Account</div></button>
            <button class="nav-item" data-page="refer"><div class="nav-icon">🤝</div><div class="nav-label">Refer</div></button>
        </div>
    </div>

    <script type="module">
        const { initializeApp } = window.firebaseModules;
        const { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } = window.firebaseModules;
        const { getFirestore, doc, setDoc, getDoc, collection, query, getDocs, increment, runTransaction, arrayUnion, updateDoc, onSnapshot, serverTimestamp, where } = window.firebaseModules;
        
        const firebaseConfig = {
            apiKey: "AIzaSyAupBkllyicDPD9O6CmX4mS4sF5z96mqxc",
            authDomain: "vertexpaste.firebaseapp.com",
            projectId: "vertexpaste",
            storageBucket: "vertexpaste.firebasestorage.app",
            messagingSenderId: "255275350380",
            appId: "1:255275350380:web:7be4e8add2cb5b04045b49"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        
        let currentUser = null;
        let userData = null;
        let currentPage = 'home';
        let activeUsersCount = 0;
        
        const ACHIEVEMENTS = {
            streak1: { name: "🔥 1 Day Streak", desc: "Claim daily bonus for 1 day", icon: "🔥", reward: 50, requirement: 1 },
            streak3: { name: "⚡ 3 Day Streak", desc: "3 days in a row!", icon: "⚡", reward: 150, requirement: 3 },
            streak7: { name: "🌟 7 Day Streak", desc: "A full week!", icon: "🌟", reward: 350, requirement: 7 },
            streak30: { name: "👑 30 Day Master", desc: "30 day streak champion", icon: "👑", reward: 1500, requirement: 30 },
            campaign1: { name: "📢 First Campaign", desc: "Create your first campaign", icon: "📢", reward: 100, requirement: 1 },
            campaign5: { name: "🚀 Campaign Creator", desc: "Create 5 campaigns", icon: "🚀", reward: 300, requirement: 5 },
            campaign10: { name: "🎬 Master Creator", desc: "Create 10 campaigns", icon: "🎬", reward: 700, requirement: 10 },
            watcher10: { name: "👁️ Active Watcher", desc: "Watch 10 videos", icon: "👁️", reward: 100, requirement: 10 },
            watcher50: { name: "🎥 Video Enthusiast", desc: "Watch 50 videos", icon: "🎥", reward: 400, requirement: 50 },
            refer1: { name: "🤝 First Referral", desc: "Get your first referral", icon: "🤝", reward: 200, requirement: 1 },
            refer5: { name: "👥 Community Leader", desc: "Get 5 referrals", icon: "👥", reward: 800, requirement: 5 }
        };
        
        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
        
        function extractVideoId(url) {
            const regex = /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/;
            const match = url.match(regex);
            return match ? match[1] : null;
        }
        
        // Simulate advanced stats: likes deduct 0.67 per like on video for subs? actually per like = -0.67 coins for subs? as requirement: "auto detucts 0.67 per like on thier video for subs 3 coins and comment 5 coins"
        // We'll attach engagement simulation: each like on campaign (virtual) deducts 0.67 from creator's balance? But we transform into "creator gets penalized if viewers like too much? No — we display dynamic stats + watch time expand.
        // Implementation: for each campaign we store simulated "likes", "comments", "watchTimeSec" (avg watch duration). When user watches, we increment and adjust creator credits: -0.67 per like, +3 coins per sub? Actually requirement: "auto detucts 0.67 per like on thier video for subs 3 coins and comment 5 coins" — we'll display that inside expand.
        
        async function updateEngagement(campaignId, actionType, creatorId) {
            const campaignRef = doc(db, 'viewswap_campaigns', campaignId);
            const creatorRef = doc(db, 'viewswap_users', creatorId);
            await runTransaction(db, async (transaction) => {
                const campSnap = await transaction.get(campaignRef);
                if (!campSnap.exists()) return;
                const campData = campSnap.data();
                let newLikes = campData.likes || 0;
                let newComments = campData.comments || 0;
                let creditDelta = 0;
                if (actionType === 'like') {
                    newLikes += 1;
                    creditDelta = -0.67;   // deduct 0.67 coins from creator per like
                } else if (actionType === 'comment') {
                    newComments += 1;
                    creditDelta = -5;      // comment deducts 5 coins from creator
                } else if (actionType === 'sub') {
                    creditDelta = 3;        // sub adds 3 coins to creator
                }
                transaction.update(campaignRef, { likes: newLikes, comments: newComments });
                if (creditDelta !== 0) {
                    const creatorSnap = await transaction.get(creatorRef);
                    if (creatorSnap.exists()) {
                        let newCredits = (creatorSnap.data().credits || 0) + creditDelta;
                        if (newCredits < 0) newCredits = 0;
                        transaction.update(creatorRef, { credits: newCredits });
                        showToast(`${actionType === 'like' ? '👍 Like' : actionType === 'comment' ? '💬 Comment' : '🔔 Sub'} | Creator ${creditDelta > 0 ? '+' : ''}${creditDelta} coins`);
                    }
                }
            });
        }
        
        async function loadUserData(uid) {
            const ref = doc(db, 'viewswap_users', uid);
            const snap = await getDoc(ref);
            if (snap.exists()) {
                userData = snap.data();
                userData.achievements = userData.achievements || {};
                userData.streak = userData.streak || { current: 0, lastClaim: null, highest: 0 };
                userData.campaigns = userData.campaigns || [];
                userData.watchedVideos = userData.watchedVideos || [];
                userData.referrals = userData.referrals || [];
            } else {
                userData = {
                    uid, email: currentUser.email, displayName: currentUser.displayName,
                    photoURL: currentUser.photoURL, credits: 100,
                    referralCode: 'REF' + uid.substring(0,6).toUpperCase(),
                    referredBy: null, referralEarnings: 0, totalEarned: 0,
                    watchedVideos: [], campaigns: [],
                    achievements: {}, streak: { current: 0, lastClaim: null, highest: 0 },
                    lastDailyBonus: null, createdAt: new Date().toISOString()
                };
                await setDoc(ref, userData);
            }
            return userData;
        }
        
        async function saveUserData() {
            if(currentUser) await setDoc(doc(db, 'viewswap_users', currentUser.uid), userData, { merge: true });
        }
        
        async function updateCredits(amount) {
            userData.credits += amount;
            if(amount > 0) userData.totalEarned += amount;
            await saveUserData();
            return true;
        }
        
        async function checkAchievements() {
            let unlockedAny = false;
            const campaignCount = userData.campaigns?.length || 0;
            const watchedCount = userData.watchedVideos?.length || 0;
            const referralCount = userData.referrals?.length || 0;
            const streak = userData.streak?.current || 0;
            const checks = {
                streak1: streak >= 1, streak3: streak >= 3, streak7: streak >= 7, streak30: streak >= 30,
                campaign1: campaignCount >= 1, campaign5: campaignCount >= 5, campaign10: campaignCount >= 10,
                watcher10: watchedCount >= 10, watcher50: watchedCount >= 50,
                refer1: referralCount >= 1, refer5: referralCount >= 5
            };
            for (const [key, achieved] of Object.entries(checks)) {
                if (achieved && !userData.achievements[key]) {
                    userData.achievements[key] = { unlockedAt: new Date().toISOString(), claimed: false };
                    unlockedAny = true;
                    showToast(`🏆 ${ACHIEVEMENTS[key].name} +${ACHIEVEMENTS[key].reward} credits`);
                    await updateCredits(ACHIEVEMENTS[key].reward);
                }
            }
            if (unlockedAny) await saveUserData();
        }
        
        async function claimDailyBonus() {
            const lastClaim = userData.streak?.lastClaim ? new Date(userData.streak.lastClaim) : null;
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            let newStreak = 1;
            if (lastClaim) {
                if (lastClaim.toDateString() === yesterday.toDateString()) newStreak = (userData.streak.current || 0) + 1;
                else if (lastClaim.toDateString() === today.toDateString()) { showToast('Already claimed!'); return; }
                else newStreak = 1;
            }
            const bonusAmount = 50 + Math.floor(newStreak / 7) * 25;
            await updateCredits(bonusAmount);
            userData.streak = { current: newStreak, lastClaim: today.toISOString(), highest: Math.max(newStreak, userData.streak?.highest || 0) };
            userData.lastDailyBonus = today.toISOString();
            await saveUserData();
            await checkAchievements();
            showToast(`🎁 Daily: +${bonusAmount} credits | Streak: ${newStreak} days`);
            renderCurrentPage();
        }
        
        async function createCampaign(title, url) {
            const videoId = extractVideoId(url);
            if (!videoId) { showToast('Invalid YouTube URL'); return false; }
            if (userData.credits < 10) { showToast('Need 10 credits'); return false; }
            await updateCredits(-10);
            const campaign = {
                id: Date.now().toString(), title, url, videoId, creatorId: currentUser.uid,
                creatorName: userData.displayName, createdAt: new Date().toISOString(),
                views: 0, watchers: [], likes: 0, comments: 0, watchTimeSec: 0
            };
            userData.campaigns = userData.campaigns || [];
            userData.campaigns.push(campaign);
            await saveUserData();
            const campaignRef = doc(db, 'viewswap_campaigns', campaign.id);
            await setDoc(campaignRef, campaign);
            await checkAchievements();
            showToast(`✅ Campaign created! -10 credits`);
            renderCurrentPage();
        }
        
        async function watchCampaign(campaign) {
            if (userData.watchedVideos?.includes(campaign.videoId)) { showToast('Already watched'); return; }
            if (campaign.creatorId === currentUser.uid) { showToast("Can't watch own"); return; }
            window.open(campaign.url, '_blank');
            await updateCredits(5);
            userData.watchedVideos = userData.watchedVideos || [];
            userData.watchedVideos.push(campaign.videoId);
            await saveUserData();
            const campaignRef = doc(db, 'viewswap_campaigns', campaign.id);
            await updateDoc(campaignRef, { views: increment(1), watchers: arrayUnion(currentUser.uid), watchTimeSec: increment(45) });
            const creatorRef = doc(db, 'viewswap_users', campaign.creatorId);
            await runTransaction(db, async (transaction) => {
                const creatorSnap = await transaction.get(creatorRef);
                if (creatorSnap.exists()) transaction.update(creatorRef, { credits: increment(2), totalEarned: increment(2) });
            });
            await checkAchievements();
            renderCurrentPage();
        }
        
        window.watchCampaign = watchCampaign;
        window.toggleStats = (campId) => {
            const el = document.getElementById(`stats-${campId}`);
            if(el) el.classList.toggle('show');
        };
        window.likeVideo = (campaign) => updateEngagement(campaign.id, 'like', campaign.creatorId);
        window.commentVideo = (campaign) => updateEngagement(campaign.id, 'comment', campaign.creatorId);
        window.subscribeChannel = (campaign) => updateEngagement(campaign.id, 'sub', campaign.creatorId);
        
        async function renderHome() {
            const campaignsQuery = query(collection(db, 'viewswap_campaigns'));
            const snapshot = await getDocs(campaignsQuery);
            const allCampaigns = [];
            snapshot.forEach(doc => allCampaigns.push({ ...doc.data(), docId: doc.id }));
            const available = allCampaigns.filter(c => c.creatorId !== currentUser?.uid && !userData?.watchedVideos?.includes(c.videoId));
            return `
                <div class="streak-card">
                    <div>🔥 Current Streak</div>
                    <div class="streak-number">${userData?.streak?.current || 0} days</div>
                    <div>Highest: ${userData?.streak?.highest || 0} days</div>
                    <button class="daily-bonus-btn" id="dailyBonusBtn">🎁 Claim Daily Bonus</button>
                </div>
                <div class="card">
                    <h2>🎬 Watch & Earn (5 credits each)</h2>
                    ${available.length === 0 ? '<div class="empty-state">No videos available. Create a campaign!</div>' : 
                        available.map(c => `
                            <div class="campaign-item">
                                <div style="font-weight: bold;">${escapeHtml(c.title)}</div>
                                <div class="campaign-url">${escapeHtml(c.url)}</div>
                                <div class="badge" style="margin:6px 0">👁️ ${c.views || 0} views | ⏱️ ${Math.floor((c.watchTimeSec || 0)/60)} min watch</div>
                                <button class="btn-primary" onclick="window.watchCampaign(${JSON.stringify(c).replace(/"/g, '&quot;')})">▶️ Watch +5 coins</button>
                                <!-- Expandable YouTube stats: show views, watch time, like/comment/sub engagement costs -->
                                <div class="yt-expandable" onclick="window.toggleStats('${c.id}')">
                                    <div class="yt-expand-header">📊 YouTube Stats & Engagement <span>▼</span></div>
                                    <div id="stats-${c.id}" class="yt-stats-detail">
                                        <div class="yt-stat-item"><span>📈 Views:</span><span>${c.views || 0}</span></div>
                                        <div class="yt-stat-item"><span>⏱️ Watch time (total):</span><span>${Math.floor((c.watchTimeSec || 0)/60)} min</span></div>
                                        <div class="yt-stat-item"><span>👍 Likes:</span><span>${c.likes || 0} (costs creator 0.67 each)</span></div>
                                        <div class="yt-stat-item"><span>💬 Comments:</span><span>${c.comments || 0} (costs creator 5 coins)</span></div>
                                        <div class="engagement-badge">🔔 Subscribe: +3 coins to creator</div>
                                        <div style="display:flex; gap:8px; margin-top:8px;">
                                            <button class="badge" style="cursor:pointer;" onclick="event.stopPropagation(); window.likeVideo(${JSON.stringify(c).replace(/"/g, '&quot;')})">👍 Like (-0.67 creator)</button>
                                            <button class="badge" style="cursor:pointer;" onclick="event.stopPropagation(); window.commentVideo(${JSON.stringify(c).replace(/"/g, '&quot;')})">💬 Comment (-5 creator)</button>
                                            <button class="badge" style="cursor:pointer;" onclick="event.stopPropagation(); window.subscribeChannel(${JSON.stringify(c).replace(/"/g, '&quot;')})">🔔 Subscribe (+3 creator)</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `).join('')
                    }
                </div>
            `;
        }
        
        function renderCampaignPage() { return `<div class="card"><h2>📢 Create Campaign (10 credits)</h2><input id="campaignTitle" placeholder="Campaign title"><input id="campaignUrl" placeholder="YouTube video URL"><button class="btn-primary" id="createCampaignBtn">🚀 Launch</button></div><div class="card"><h2>📊 My Campaigns</h2><div id="myCampaignsList"></div></div>`; }
        async function renderMyCampaigns() {
            const container = document.getElementById('myCampaignsList');
            if(!container) return;
            const my = userData?.campaigns || [];
            if(my.length===0) container.innerHTML='<div class="empty-state">No campaigns yet</div>';
            else container.innerHTML = my.map(c => `<div class="campaign-item"><div><strong>${escapeHtml(c.title)}</strong></div><div class="campaign-url">${escapeHtml(c.url)}</div><div class="badge">👁️ ${c.views||0} views | ⏱️ ${Math.floor((c.watchTimeSec||0)/60)} min</div><div class="watchtime-progress">👍 Likes: ${c.likes||0} | 💬 Comments: ${c.comments||0}</div></div>`).join('');
        }
        
        function renderRewardsPage() {
            const streak = userData?.streak?.current||0, campCount=userData?.campaigns?.length||0, watched=userData?.watchedVideos?.length||0, referralCount=userData?.referrals?.length||0;
            return `<div class="streak-card"><div>🔥 Streak</div><div class="streak-number">${streak} days</div><div>🏆 Highest: ${userData?.streak?.highest||0}</div></div>
            <div class="card"><h2>🏆 Achievements</h2><div class="achievement-grid">${Object.entries(ACHIEVEMENTS).map(([key,ach])=>{
                let unlocked=false;
                if(key.includes('streak')) unlocked=streak>=ach.requirement;
                else if(key.includes('campaign')) unlocked=campCount>=ach.requirement;
                else if(key.includes('watcher')) unlocked=watched>=ach.requirement;
                else if(key.includes('refer')) unlocked=referralCount>=ach.requirement;
                return `<div class="achievement-card ${unlocked?'unlocked':''}"><div class="achievement-icon">${ach.icon}</div><div class="achievement-name">${ach.name}</div><div class="achievement-desc">${ach.desc}</div><div class="achievement-reward">+${ach.reward}</div>${!unlocked?'<div class="locked-badge">🔒 Locked</div>':'<div class="locked-badge" style="background:var(--success);">✓</div>'}</div>`;
            }).join('')}</div></div><div class="card"><h2>📊 Stats</h2><div class="stat-row"><span>📢 Campaigns:</span><span>${campCount}</span></div><div class="stat-row"><span>👀 Videos watched:</span><span>${watched}</span></div><div class="stat-row"><span>🤝 Referrals:</span><span>${referralCount}</span></div><div class="stat-row"><span>💰 Total Earned:</span><span>${Math.floor(userData?.totalEarned||0)}</span></div></div>`;
        }
        
        function renderAccountPage() { return `<div class="card"><div class="account-info"><img src="${currentUser?.photoURL}" class="account-avatar"><div style="font-weight:bold;">${escapeHtml(currentUser?.displayName)}</div><div>${currentUser?.email}</div></div></div><div class="card"><h2>💰 Credits</h2><div class="stat-row"><span>💎 Balance:</span><span style="font-size:1.8rem;color:var(--primary);">${Math.floor(userData?.credits||0)}</span></div><div class="stat-row"><span>🏆 Total Earned:</span><span>${Math.floor(userData?.totalEarned||0)}</span></div><div class="stat-row"><span>🔥 Streak:</span><span>${userData?.streak?.current||0} days</span></div><div class="stat-row"><span>🎬 Campaigns:</span><span>${userData?.campaigns?.length||0}</span></div><div class="stat-row"><span>👀 Watched:</span><span>${userData?.watchedVideos?.length||0}</span></div></div><div class="card"><h2>🔗 Referral</h2><div class="referral-code-box" id="refCode">${userData?.referralCode}</div><button class="btn-primary" id="copyRefBtn">📋 Copy</button></div><button class="signout-btn-lg" id="signOutBtnAccount">🚪 Sign Out</button>`; }
        function renderReferPage() { return `<div class="card"><h2>🤝 Referral</h2><div style="background:linear-gradient(135deg,var(--warning),#ea580c);border-radius:20px;padding:16px;text-align:center;">🎁 5% commission forever!</div><div class="referral-code-box" id="refLink">${userData?.referralCode}</div><button class="btn-primary" id="copyRefLink">📋 Copy Code</button><div class="stat-row"><span>💰 Commission Earned:</span><span style="color:gold;">${Math.floor(userData?.referralEarnings||0)}</span></div></div>`; }
        
        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
        
        async function renderCurrentPage() {
            const container = document.getElementById('pageContent');
            if(!container) return;
            if(currentPage==='home'){ container.innerHTML = await renderHome(); document.getElementById('dailyBonusBtn')?.addEventListener('click',claimDailyBonus); }
            else if(currentPage==='campaign'){ container.innerHTML = renderCampaignPage(); document.getElementById('createCampaignBtn')?.addEventListener('click',async()=>{ const title=document.getElementById('campaignTitle')?.value, url=document.getElementById('campaignUrl')?.value; if(title&&url) await createCampaign(title,url); else showToast('Title & URL required'); await renderMyCampaigns(); }); await renderMyCampaigns(); }
            else if(currentPage==='rewards') container.innerHTML = renderRewardsPage();
            else if(currentPage==='account'){ container.innerHTML = renderAccountPage(); document.getElementById('copyRefBtn')?.addEventListener('click',()=>{ navigator.clipboard.writeText(userData?.referralCode); showToast('Copied!'); }); document.getElementById('refCode')?.addEventListener('click',()=>navigator.clipboard.writeText(userData?.referralCode)); document.getElementById('signOutBtnAccount')?.addEventListener('click',async()=>await signOut(auth)); }
            else if(currentPage==='refer'){ container.innerHTML = renderReferPage(); document.getElementById('copyRefLink')?.addEventListener('click',()=>{ navigator.clipboard.writeText(userData?.referralCode); showToast('Referral code copied'); }); document.getElementById('refLink')?.addEventListener('click',()=>navigator.clipboard.writeText(userData?.referralCode)); }
        }
        
        document.querySelectorAll('.nav-item').forEach(btn=>btn.addEventListener('click',()=>{ currentPage=btn.dataset.page; document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderCurrentPage(); }));
        
        function initOnlineTracking() {
            const onlineQuery = query(collection(db, 'viewswap_online'), where('isOnline','==',true));
            onSnapshot(onlineQuery,(snap)=>{ activeUsersCount=snap.size; document.getElementById('onlineCountBadge').innerHTML=`👥 ${activeUsersCount} active`; });
            const statusRef=doc(db,'viewswap_online',currentUser?.uid);
            const update=async()=>{ if(currentUser) await setDoc(statusRef,{uid:currentUser.uid,isOnline:true,lastSeen:serverTimestamp()},{merge:true}); };
            update(); setInterval(update,30000); window.addEventListener('beforeunload',()=>setDoc(statusRef,{isOnline:false},{merge:true}));
        }
        
        onAuthStateChanged(auth, async(user)=>{
            if(user){ currentUser=user; await loadUserData(user.uid); document.body.classList.add('authenticated'); initOnlineTracking(); renderCurrentPage(); }
            else{ document.body.classList.remove('authenticated'); currentUser=null; userData=null; }
        });
        document.getElementById('signInBtn').addEventListener('click',()=>signInWithPopup(auth,provider));
        for(let i=0;i<40;i++){ const p=document.createElement('div'); p.className='particle'; p.style.width=Math.random()*5+2+'px'; p.style.height=p.style.width; p.style.left=Math.random()*100+'%'; p.style.animationDuration=Math.random()*15+8+'s'; p.style.animationDelay=Math.random()*10+'s'; document.getElementById('particles')?.appendChild(p); }
    </script>
</body>
</html>
