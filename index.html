<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        window.firebaseModules = {
            initializeApp, getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged,

    <style>

        .google-signin-btn, .qr-signin-btn {

        @keyframes float {

        .autoplay-toggle {

            justify-content: flex-end;
            align-items: center;
            gap: 10px;

            padding-top: 12px;

        .autoplay-toggle label {

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.3s;
            border-radius: 34px;
        }
        
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        
        input:checked + .toggle-slider {
            background-color: var(--primary);
        }
        
        input:checked + .toggle-slider:before {
            transform: translateX(26px);
        }
        
        .card {

            margin-bottom: 16px;

        .campaign-item {
            background: rgba(35, 35, 45, 0.8);

        .badge {
            background: rgba(139, 92, 246, 0.2);
            padding: 4px 10px;
            border-radius: 20px;

            display: inline-block;

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);

        .streak-card {

            margin-bottom: 16px;
            border: 1px solid var(--warning);
        }
        
        .streak-number { font-size: 2rem; font-weight: 800; color: var(--warning); }
        .daily-bonus-btn {
            background: linear-gradient(135deg, var(--warning), #ea580c);

            border: none;
            padding: 10px 20px;
            border-radius: 60px;

        .btn-primary {

            border: none;
            padding: 12px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;

        .referral-code-box {
            background: rgba(0,0,0,0.5);
            padding: 12px;
            border-radius: 16px;
            font-family: monospace;
            text-align: center;
            border: 2px dashed var(--primary);

        .stat-row {
            display: flex;
            justify-content: space-between;

</head>
<body>
    <div class="signin-overlay" id="signinOverlay">
        <div class="signin-card">
            <div style="font-size: 3.5rem;">🏆</div>
            <h2>ViewSwap</h2>
            <p>Premium Video Engagement</p>
            <button class="google-signin-btn" id="signInBtn">🟢 Sign in with Google</button>
            <button class="qr-signin-btn" id="qrSignInBtn">📷 Scan QR Code to Refer</button>
        </div>
    </div>

    <div id="mainAppContent">
        <div class="bg-particles" id="particles"></div>
        <div class="container">
            <div class="header">
                <h1>🎬 ViewSwap</h1>
                <p>Watch • Earn • Repeat</p>
                <div class="online-badge" id="onlineCountBadge">👥 Loading...</div>
                <div class="watch-counter" id="watchCounter">0/150</div>
            </div>
            <div id="pageContent"></div>
        </div>
        <div class="bottom-nav">
            <button class="nav-item active" data-page="home"><div class="nav-icon">🏠</div><div class="nav-label">Home</div></button>
            <button class="nav-item" data-page="campaign"><div class="nav-icon">📢</div><div class="nav-label">Create</div></button>
            <button class="nav-item" data-page="rewards"><div class="nav-icon">🎁</div><div class="nav-label">Rewards</div></button>
            <button class="nav-item" data-page="account"><div class="nav-icon">👤</div><div class="nav-label">Account</div></button>
            <button class="nav-item" data-page="refer"><div class="nav-icon">🤝</div><div class="nav-label">Refer</div></button>
        </div>
    </div>

    <script type="module">
        const { initializeApp } = window.firebaseModules;
        const { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } = window.firebaseModules;
        const { getFirestore, doc, setDoc, getDoc, collection, query, getDocs, increment, runTransaction, arrayUnion, updateDoc, onSnapshot, serverTimestamp, where, addDoc } = window.firebaseModules;
        
        const firebaseConfig = {
            apiKey: "AIzaSyAupBkllyicDPD9O6CmX4mS4sF5z96mqxc",
            authDomain: "vertexpaste.firebaseapp.com",
            projectId: "vertexpaste",
            storageBucket: "vertexpaste.firebasestorage.app",
            messagingSenderId: "255275350380",
            appId: "1:255275350380:web:7be4e8add2cb5b04045b49"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        
        let currentUser = null;
        let userData = null;
        let currentPage = 'home';
        let activeUsersCount = 0;
        let currentVideoIndex = 0;
        let availableCampaigns = [];
        let autoplayEnabled = false;
        let player = null;
        let watchStartTime = 0;
        let isWatching = false;
        
        // Hourly watch limit tracking
        let hourlyWatchCount = 0;
        let lastResetTime = Date.now();
        
        function updateWatchCounter() {
            const now = Date.now();
            if (now - lastResetTime >= 3600000) {
                hourlyWatchCount = 0;
                lastResetTime = now;
            }
            const counter = document.getElementById('watchCounter');
            if (counter) counter.textContent = `${hourlyWatchCount}/150`;
        }
        
        function canWatchVideo() {
            updateWatchCounter();
            return hourlyWatchCount < 150;
        }
        
        async function incrementWatchCount() {
            hourlyWatchCount++;
            updateWatchCounter();
            if (userData) {
                userData.watchCountThisHour = hourlyWatchCount;
                await saveUserData();
            }
        }
        
        onSnapshot(collection(db, 'viewswap_online'), (snap) => {
            activeUsersCount = snap.size;
            const badge = document.getElementById('onlineCountBadge');
            if (badge) badge.innerHTML = `👥 ${activeUsersCount} active`;
        });
        
        function showToast(msg, isWarning = false) {
            const t = document.createElement('div');
            t.className = 'toast';
            if (isWarning) t.style.background = 'rgba(239,68,68,0.95)';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
        
        function extractVideoId(url) {
            const regex = /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([^&\n?#]+)/;
            const match = url.match(regex);
            return match ? match[1] : null;
        }
        
        function isValidYoutubeUrl(url) {
            return url.includes('youtube.com') || url.includes('youtu.be');
        }
        
        function isValidChannelUrl(url) {
            return url.includes('youtube.com/@') || url.includes('youtube.com/channel/');
        }
        
        function generateQRCodeURL(data) {
            return `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(data)}`;
        }
        
        async function loadUserData(uid) {
            const ref = doc(db, 'viewswap_users', uid);
            const snap = await getDoc(ref);
            if (snap.exists()) {
                userData = snap.data();
                userData.achievements = userData.achievements || {};
                userData.streak = userData.streak || { current: 0, lastClaim: null, highest: 0 };
                userData.campaigns = userData.campaigns || [];
                userData.watchedVideos = userData.watchedVideos || [];
                userData.referrals = userData.referrals || [];
                userData.referralEarnings = userData.referralEarnings || 0;
                hourlyWatchCount = userData.watchCountThisHour || 0;
                lastResetTime = userData.lastWatchReset || Date.now();
                updateWatchCounter();
            } else {
                userData = {
                    uid, email: currentUser.email, displayName: currentUser.displayName,
                    photoURL: currentUser.photoURL, credits: 100,
                    referralCode: 'REF' + uid.substring(0,8).toUpperCase(),
                    referredBy: null, referralEarnings: 0, totalEarned: 0,
                    watchedVideos: [], campaigns: [],
                    achievements: {}, streak: { current: 0, lastClaim: null, highest: 0 },
                    watchCountThisHour: 0, lastWatchReset: Date.now(),
                    createdAt: new Date().toISOString()
                };
                await setDoc(ref, userData);
            }
            return userData;
        }
        
        async function saveUserData() {
            if(currentUser) {
                userData.lastWatchReset = lastResetTime;
                userData.watchCountThisHour = hourlyWatchCount;
                await setDoc(doc(db, 'viewswap_users', currentUser.uid), userData, { merge: true });
            }
        }
        
        async function updateCredits(amount, source = 'generic') {
            userData.credits = (userData.credits || 0) + amount;
            if(amount > 0) userData.totalEarned = (userData.totalEarned || 0) + amount;
            await saveUserData();
            return true;
        }
        
        async function createAdvancedCampaign(campaignData) {
            if (userData.credits < 15) {
                showToast('Need 15 credits to create campaign', true);
                return false;
            }
            
            if (!isValidYoutubeUrl(campaignData.videoUrl)) {
                showToast('Invalid YouTube video URL', true);
                return false;
            }
            
            const videoId = extractVideoId(campaignData.videoUrl);
            if (!videoId) {
                showToast('Could not extract video ID', true);
                return false;
            }
            
            const maxPossible = activeUsersCount || 10;
            const requestedViews = parseInt(campaignData.targetViews) || 0;
            const requestedWatchTime = parseInt(campaignData.targetWatchTime) || 0;
            const requestedLikes = parseInt(campaignData.targetLikes) || 0;
            const requestedSubs = parseInt(campaignData.targetSubs) || 0;
            
            if (requestedViews > maxPossible) showToast(`Max views cannot exceed ${maxPossible}`, true);
            if (requestedWatchTime < 5) showToast('Watch time must be at least 5 seconds', true);
            
            const totalCost = 15 + Math.floor(requestedViews * 0.5 + requestedWatchTime * 0.3 + requestedLikes * 0.8 + requestedSubs * 1.2);
            
            if (userData.credits < totalCost) {
                showToast(`Need ${totalCost} credits for this campaign`, true);
                return false;
            }
            
            await updateCredits(-totalCost, 'create_campaign');
            
            const campaign = {
                id: Date.now().toString(),
                title: campaignData.title,
                videoUrl: campaignData.videoUrl,
                videoId: videoId,
                channelUrl: campaignData.channelUrl || '',
                creatorId: currentUser.uid,
                creatorName: userData.displayName,
                createdAt: serverTimestamp(),
                targetViews: requestedViews,
                targetWatchTime: requestedWatchTime,
                targetLikes: requestedLikes,
                targetSubs: requestedSubs,
                currentViews: 0,
                currentWatchTime: 0,
                currentLikes: 0,
                currentSubs: 0,
                viewReward: 10,
                watchTimeRewardPerSec: 1.9,
                likeReward: 2.8,
                status: 'active'
            };
            
            const campaignRef = await addDoc(collection(db, 'advanced_campaigns'), campaign);
            campaign.firestoreId = campaignRef.id;
            
            userData.campaigns = userData.campaigns || [];
            userData.campaigns.push({ id: campaign.id, title: campaign.title });
            await saveUserData();
            
            showToast(`✅ Campaign created! Cost: ${totalCost} credits`);
            renderCurrentPage();
            return true;
        }
        
        async function watchVideoWithEngagement(campaign, videoElement) {
            if (!canWatchVideo()) {
                showToast('Hourly limit reached! Wait an hour to watch more videos.', true);
                return;
            }
            
            if (userData.watchedVideos?.includes(campaign.videoId)) {
                showToast('Already watched this video', true);
                return;
            }
            
            if (campaign.creatorId === currentUser.uid) {
                showToast("Can't watch your own video", true);
                return;
            }
            
            // Auto-subscribe if channel URL exists
            if (campaign.channelUrl && campaign.targetSubs > 0 && campaign.currentSubs < campaign.targetSubs) {
                window.open(campaign.channelUrl, '_blank');
                await updateDoc(doc(db, 'advanced_campaigns', campaign.firestoreId), {
                    currentSubs: increment(1)
                });
                showToast(`🔔 Auto-subscribed to channel!`);
            }
            
            const watchTimeRequired = Math.min(campaign.targetWatchTime || 30, 60);
            const earningsPerSecond = campaign.watchTimeRewardPerSec;
            const totalPotentialEarnings = Math.floor(watchTimeRequired * earningsPerSecond);
            
            showToast(`⏱️ Watch for ${watchTimeRequired}s to earn up to ${totalPotentialEarnings} credits!`);
            
            let timeWatched = 0;
            const watchInterval = setInterval(async () => {
                timeWatched++;
                if (timeWatched >= watchTimeRequired) {
                    clearInterval(watchInterval);
                    const earned = Math.floor(watchTimeRequired * earningsPerSecond);
                    await updateCredits(earned, 'watch');
                    
                    await updateDoc(doc(db, 'advanced_campaigns', campaign.firestoreId), {
                        currentViews: increment(1),
                        currentWatchTime: increment(watchTimeRequired)
                    });
                    
                    userData.watchedVideos = userData.watchedVideos || [];
                    userData.watchedVideos.push(campaign.videoId);
                    await incrementWatchCount();
                    await saveUserData();
                    
                    // Referral commission
                    if (userData.referredBy && earned > 0) {
                        const commission = Math.floor(earned * 0.05);
                        if (commission > 0) {
                            const uplineRef = doc(db, 'viewswap_users', userData.referredBy);
                            await runTransaction(db, async (transaction) => {
                                const uplineSnap = await transaction.get(uplineRef);
                                if (uplineSnap.exists()) {
                                    transaction.update(uplineRef, { referralEarnings: increment(commission), credits: increment(commission) });
                                }
                            });
                        }
                    }
                    
                    // Reward creator
                    const creatorRef = doc(db, 'viewswap_users', campaign.creatorId);
                    await runTransaction(db, async (transaction) => {
                        const creatorSnap = await transaction.get(creatorRef);
                        if (creatorSnap.exists()) {
                            const creatorEarn = Math.floor(earned * 0.1);
                            transaction.update(creatorRef, { credits: increment(creatorEarn), totalEarned: increment(creatorEarn) });
                        }
                    });
                    
                    showToast(`🎉 Earned ${earned} credits!`);
                    
                    if (autoplayEnabled && currentVideoIndex + 1 < availableCampaigns.length) {
                        currentVideoIndex++;
                        await loadVideoPlayer(availableCampaigns[currentVideoIndex]);
                    }
                    
                    renderCurrentPage();
                }
            }, 1000);
        }
        
        async function loadVideoPlayer(campaign) {
            const videoId = campaign.videoId;
            const container = document.getElementById('videoPlayerContainer');
            if (!container) return;
            
            const embedUrl = `https://www.youtube.com/embed/${videoId}?enablejsapi=1&autoplay=1`;
            container.innerHTML = `
                <div class="video-container">
                    <iframe id="youtube-player" src="${embedUrl}" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                </div>
                <div class="video-info">
                    <div class="video-title">${escapeHtml(campaign.title)}</div>
                    <div class="watch-details">
                        <span class="time-required">⏱️ Required: ${campaign.targetWatchTime || 30}s</span>
                        <span class="earnings-preview">💰 Earns: ${Math.floor((campaign.targetWatchTime || 30) * 1.9)} credits</span>
                    </div>
                    <button class="engage-btn" id="watchNowBtn">🎬 Watch & Earn</button>
                    <div class="autoplay-toggle">
                        <label>🎵 Auto-play next video</label>
                        <label class="toggle-switch">
                            <input type="checkbox" id="autoplayToggle" ${autoplayEnabled ? 'checked' : ''}>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                </div>
            `;
            
            document.getElementById('watchNowBtn')?.addEventListener('click', () => watchVideoWithEngagement(campaign));
            document.getElementById('autoplayToggle')?.addEventListener('change', (e) => {
                autoplayEnabled = e.target.checked;
                localStorage.setItem('autoplayEnabled', autoplayEnabled);
            });
        }
        
        async function renderHomeWithPlayer() {
            const campaignsQuery = query(collection(db, 'advanced_campaigns'));
            const snapshot = await getDocs(campaignsQuery);
            availableCampaigns = [];
            snapshot.forEach(doc => {
                const data = doc.data();
                if (data.creatorId !== currentUser?.uid && !userData?.watchedVideos?.includes(data.videoId)) {
                    availableCampaigns.push({ ...data, firestoreId: doc.id });
                }
            });
            
            if (availableCampaigns.length === 0) {
                return `
                    <div class="streak-card">
                        <div>🔥 Current Streak</div>
                        <div class="streak-number">${userData?.streak?.current || 0} days</div>
                        <button class="daily-bonus-btn" id="dailyBonusBtn">🎁 Claim Daily Bonus</button>
                    </div>
                    <div class="empty-state">No videos available. Create a campaign!</div>
                `;
            }
            
            if (!currentVideoIndex || currentVideoIndex >= availableCampaigns.length) currentVideoIndex = 0;
            const currentCampaign = availableCampaigns[currentVideoIndex];
            
            const videoHtml = `
                <div class="video-player-section" id="videoPlayerContainer">
                    <div class="video-container">
                        <iframe id="youtube-player" src="https://www.youtube.com/embed/${currentCampaign.videoId}?enablejsapi=1" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <div class="video-info">
                        <div class="video-title">${escapeHtml(currentCampaign.title)}</div>
                        <div class="watch-details">
                            <span class="time-required">⏱️ Required: ${currentCampaign.targetWatchTime || 30}s</span>
                            <span class="earnings-preview">💰 Earns: ${Math.floor((currentCampaign.targetWatchTime || 30) * 1.9)} credits</span>
                        </div>
                        <button class="engage-btn" id="watchNowBtn">🎬 Watch & Earn</button>
                        <div class="autoplay-toggle">
                            <label>🎵 Auto-play next video</label>
                            <label class="toggle-switch">
                                <input type="checkbox" id="autoplayToggle" ${autoplayEnabled ? 'checked' : ''}>
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                    </div>
                </div>
                <div class="streak-card">
                    <div>🔥 Current Streak</div>
                    <div class="streak-number">${userData?.streak?.current || 0} days</div>
                    <button class="daily-bonus-btn" id="dailyBonusBtn">🎁 Claim Daily Bonus</button>
                </div>
            `;
            
            setTimeout(() => {
                document.getElementById('watchNowBtn')?.addEventListener('click', () => watchVideoWithEngagement(currentCampaign));
                document.getElementById('autoplayToggle')?.addEventListener('change', (e) => {
                    autoplayEnabled = e.target.checked;
                    localStorage.setItem('autoplayEnabled', autoplayEnabled);
                });
                document.getElementById('dailyBonusBtn')?.addEventListener('click', claimDailyBonus);
            }, 100);
            
            return videoHtml;
        }
        
        function renderCampaignPage() {
            const maxPossible = activeUsersCount || 10;
            return `
                <div class="card">
                    <h2>📢 Create Campaign</h2>
                    <div class="campaign-form-group">
                        <label>Campaign Title *</label>
                        <input type="text" id="campTitle" placeholder="e.g., Epic Gaming Montage">
                    </div>
                    <div class="campaign-form-group">
                        <label>YouTube Video URL *</label>
                        <input type="text" id="campVideoUrl" placeholder="https://youtube.com/watch?v=...">
                    </div>
                    <div class="campaign-form-group">
                        <label>YouTube Channel URL (for auto-subscribe)</label>
                        <input type="text" id="campChannelUrl" placeholder="https://youtube.com/@channel">
                    </div>
                    <div class="campaign-form-group">
                        <label>🎯 Target Views (max ${maxPossible})</label>
                        <input type="number" id="campViews" min="0" max="${maxPossible}" value="5">
                    </div>
                    <div class="campaign-form-group">
                        <label>⏱️ Watch Time Required (seconds)</label>
                        <input type="number" id="campWatchTime" min="5" value="30">
                    </div>
                    <div class="campaign-form-group">
                        <label>❤️ Target Likes (max ${maxPossible})</label>
                        <input type="number" id="campLikes" min="0" max="${maxPossible}" value="3">
                    </div>
                    <div class="campaign-form-group">
                        <label>🔔 Target Subscribers (max ${maxPossible})</label>
                        <input type="number" id="campSubs" min="0" max="${maxPossible}" value="0">
                    </div>
                    <button class="btn-primary" id="createAdvancedBtn">🚀 Launch Campaign (15+ credits)</button>
                </div>
            `;
        }
        
        function renderRewardsPage() {
            return `
                <div class="card">
                    <h2>🏆 Achievements</h2>
                    <div class="achievement-grid">
                        <div class="achievement-card"><div class="achievement-icon">🎬</div><div class="achievement-name">First Campaign</div></div>
                        <div class="achievement-card"><div class="achievement-icon">⚡</div><div class="achievement-name">50 Watches</div></div>
                        <div class="achievement-card"><div class="achievement-icon">🤝</div><div class="achievement-name">Referral Master</div></div>
                        <div class="achievement-card"><div class="achievement-icon">🔥</div><div class="achievement-name">30 Day Streak</div></div>
                    </div>
                </div>
                <div class="card">
                    <h2>📊 Your Stats</h2>
                    <div class="stat-row"><span>💰 Credits:</span><span style="color:var(--gold);">${Math.floor(userData?.credits || 0)}</span></div>
                    <div class="stat-row"><span>🏆 Total Earned:</span><span>${Math.floor(userData?.totalEarned || 0)}</span></div>
                    <div class="stat-row"><span>📢 Campaigns:</span><span>${userData?.campaigns?.length || 0}</span></div>
                    <div class="stat-row"><span>👀 Videos Watched:</span><span>${userData?.watchedVideos?.length || 0}</span></div>
                    <div class="stat-row"><span>⏰ Hourly Watch Limit:</span><span>${hourlyWatchCount}/150</span></div>
                </div>
            `;
        }
        
        function renderAccountPage() {
            const qrUrl = generateQRCodeURL(`VIEWSWAP_REF:${userData?.referralCode}`);
            return `
                <div class="card">
                    <div class="account-info">
                        <img src="${currentUser?.photoURL}" class="account-avatar">
                        <div style="font-weight:bold; margin-top:10px;">${escapeHtml(currentUser?.displayName)}</div>
                    </div>
                </div>
                <div class="card">
                    <h2>🔗 Your QR Code</h2>
                    <div class="qr-code-display"><img src="${qrUrl}" width="120" height="120"></div>
                    <div class="referral-code-box">${userData?.referralCode}</div>
                    <button class="btn-primary" id="copyRefBtn">📋 Copy Code</button>
                </div>
                <button class="signout-btn-lg" id="signOutBtn">🚪 Sign Out</button>
            `;
        }
        
        function renderReferPage() {
            const qrUrl = generateQRCodeURL(`VIEWSWAP_REF:${userData?.referralCode}`);
            return `
                <div class="card">
                    <h2>🤝 Referral Program</h2>
                    <div style="background:linear-gradient(135deg,var(--warning),#ea580c);border-radius:20px;padding:12px;text-align:center;margin-bottom:12px;">🎁 5% commission on everything!</div>
                    <div class="qr-code-display"><img src="${qrUrl}" width="150" height="150"></div>
                    <div class="referral-code-box">${userData?.referralCode}</div>
                    <button class="btn-primary" id="copyRefLink">📋 Copy Code</button>
                    <div class="stat-row"><span>💰 Commission Earned:</span><span style="color:gold;">${Math.floor(userData?.referralEarnings || 0)} credits</span></div>
                </div>
            `;
        }
        
        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
        
        async function renderCurrentPage() {
            const container = document.getElementById('pageContent');
            if(!container) return;
            if(currentPage === 'home'){ container.innerHTML = await renderHomeWithPlayer(); }
            else if(currentPage === 'campaign'){ 
                container.innerHTML = renderCampaignPage(); 
                document.getElementById('createAdvancedBtn')?.addEventListener('click', async () => {
                    const title = document.getElementById('campTitle')?.value;
                    const videoUrl = document.getElementById('campVideoUrl')?.value;
                    const channelUrl = document.getElementById('campChannelUrl')?.value;
                    const targetViews = document.getElementById('campViews')?.value;
                    const targetWatchTime = document.getElementById('campWatchTime')?.value;
                    const targetLikes = document.getElementById('campLikes')?.value;
                    const targetSubs = document.getElementById('campSubs')?.value;
                    if(!title || !videoUrl) { showToast('Title and Video URL required', true); return; }
                    await createAdvancedCampaign({ title, videoUrl, channelUrl, targetViews: parseInt(targetViews)||0, targetWatchTime: parseInt(targetWatchTime)||30, targetLikes: parseInt(targetLikes)||0, targetSubs: parseInt(targetSubs)||0 });
                });
            }
            else if(currentPage === 'rewards') container.innerHTML = renderRewardsPage();
            else if(currentPage === 'account'){ 
                container.innerHTML = renderAccountPage(); 
                document.getElementById('copyRefBtn')?.addEventListener('click', () => { navigator.clipboard.writeText(userData?.referralCode); showToast('Copied!'); });
                document.getElementById('signOutBtn')?.addEventListener('click', async () => await signOut(auth));
            }
            else if(currentPage === 'refer'){ 
                container.innerHTML = renderReferPage(); 
                document.getElementById('copyRefLink')?.addEventListener('click', () => { navigator.clipboard.writeText(userData?.referralCode); showToast('Copied!'); });
            }
        }
        
        async function claimDailyBonus() {
            if(!userData) return;
            const lastClaim = userData.streak?.lastClaim ? new Date(userData.streak.lastClaim) : null;
            const today = new Date();
            let newStreak = 1;
            if(lastClaim) {
                const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
                if(lastClaim.toDateString() === yesterday.toDateString()) newStreak = (userData.streak.current || 0) + 1;
                else if(lastClaim.toDateString() === today.toDateString()) { showToast('Already claimed today!'); return; }
            }
            const bonus = 25 + Math.floor(newStreak / 7) * 10;
            await updateCredits(bonus, 'daily');
            userData.streak = { current: newStreak, lastClaim: today.toISOString(), highest: Math.max(newStreak, userData.streak?.highest || 0) };
            await saveUserData();
            showToast(`🎁 Daily: +${bonus} credits | Streak: ${newStreak}`);
            renderCurrentPage();
        }
        
        document.querySelectorAll('.nav-item').forEach(btn => btn.addEventListener('click', () => {
            currentPage = btn.dataset.page;
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCurrentPage();
        }));
        
        function initOnlineTracking() {
            const statusRef = doc(db, 'viewswap_online', currentUser?.uid);
            const update = async() => { if(currentUser) await setDoc(statusRef, { uid: currentUser.uid, isOnline: true, lastSeen: serverTimestamp() }, { merge: true }); };
            update();
            setInterval(update, 30000);
            window.addEventListener('beforeunload', () => setDoc(statusRef, { isOnline: false }, { merge: true }));
        }
        
        autoplayEnabled = localStorage.getItem('autoplayEnabled') === 'true';
        
        onAuthStateChanged(auth, async(user) => {
            if(user) {
                currentUser = user;
                await loadUserData(user.uid);
                document.body.classList.add('authenticated');
                initOnlineTracking();
                renderCurrentPage();
            } else {
                document.body.classList.remove('authenticated');
                currentUser = null;
                userData = null;
            }
        });
        
        document.getElementById('signInBtn').addEventListener('click', () => signInWithPopup(auth, provider));
        document.getElementById('qrSignInBtn').addEventListener('click', () => showToast('QR Scanner ready after login', false));
        
        setInterval(updateWatchCounter, 60000);
        
        for(let i=0;i<35;i++){ const p=document.createElement('div'); p.className='particle'; p.style.width=Math.random()*4+2+'px'; p.style.height=p.style.width; p.style.left=Math.random()*100+'%'; p.style.animationDuration=Math.random()*12+6+'s'; p.style.animationDelay=Math.random()*8+'s'; document.getElementById('particles')?.appendChild(p); }
    </script>
</body>
