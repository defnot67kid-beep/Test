<body>
    <div class="signin-overlay" id="signinOverlay">

    <div id="mainAppContent">

                <h1>🏆 ViewSwap</h1>

        <div class="nav-wrapper">

                <button class="nav-item active" data-page="home"><div class="nav-icon">🏠</div><div class="nav-label">Home</div></button>

    <script type="module">
        const { initializeApp } = window.firebaseModules;
        const { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } = window.firebaseModules;
        const { getFirestore, doc, setDoc, getDoc, collection, query, getDocs, increment, arrayUnion, updateDoc, onSnapshot, where, orderBy } = window.firebaseModules;
        
        const firebaseConfig = {
            apiKey: "AIzaSyAupBkllyicDPD9O6CmX4mS4sF5z96mqxc",
            authDomain: "vertexpaste.firebaseapp.com",
            projectId: "vertexpaste",
            storageBucket: "vertexpaste.firebasestorage.app",
            messagingSenderId: "255275350380",
            appId: "1:255275350380:web:7be4e8add2cb5b04045b49"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        
        let currentUser = null, userData = null, currentPage = 'home';
        let allCampaigns = [], activeWatchData = null, autoplayEnabled = true, youtubePlayer = null, watchInterval = null, watchedHistory = [];
        let unsubscribeCampaigns = null, unsubscribeReferralEarnings = null;
        let campaignChart = null;
        const EARNINGS_RATE = 0.5, REFERRAL_PERCENT = 0.025;
        
        // Referral logic: Give 2.5% to referrer when referred user earns ANY credits
        async function addReferralEarningsForEarner(earnerId, earnedAmount) {
            if (!earnerId || earnedAmount <= 0) return;
            const earnerRef = doc(db, 'viewswap_users', earnerId);
            const earnerSnap = await getDoc(earnerRef);
            if (!earnerSnap.exists()) return;
            const earnerData = earnerSnap.data();
            const referrerId = earnerData.referredBy;
            if (referrerId && referrerId !== earnerId) {
                const referralShare = earnedAmount * REFERRAL_PERCENT;
                if (referralShare > 0) {
                    const referrerRef = doc(db, 'viewswap_users', referrerId);
                    await updateDoc(referrerRef, {
                        referralEarnings: increment(referralShare),
                        totalEarnedByReferralShare: increment(referralShare)
                    });
                    showToast(`🎉 +${referralShare.toFixed(2)} credits from your referral!`, false);
                }
            }
            await updateDoc(earnerRef, { totalEarnedByReferralShare: increment(earnedAmount * REFERRAL_PERCENT) });
        }
        
        async function updateCredits(amount) { 
            if (!userData) return;
            userData.credits += amount; 
            if(amount > 0) { 
                userData.totalEarned += amount; 
                userData.totalEarnings = userData.totalEarned + (userData.referralEarnings || 0);
                await saveUserData();
                if (userData.referredBy) await addReferralEarningsForEarner(currentUser.uid, amount);
            } else await saveUserData();
            if (currentPage === 'home') renderCurrentPage();
        }
        
        async function loadUserData(uid) {
            const ref = doc(db, 'viewswap_users', uid);
            const snap = await getDoc(ref);
            if (snap.exists()) {
                userData = snap.data();
                userData.streak = userData.streak || { current: 0, lastClaim: null };
                userData.watchedVideos = userData.watchedVideos || [];
                userData.referralEarnings = userData.referralEarnings || 0;
                userData.totalEarned = userData.totalEarned || 0;
                userData.totalEarnings = (userData.totalEarned || 0) + (userData.referralEarnings || 0);
                userData.likedCampaigns = userData.likedCampaigns || [];
                userData.subscribedChannels = userData.subscribedChannels || [];
                userData.campaigns = userData.campaigns || [];
                userData.campaignPerformance = userData.campaignPerformance || { totalViews: 0, totalEarnedFromCampaigns: 0 };
                watchedHistory = userData.recentlyWatched || [];
            } else {
                userData = {
                    uid, email: currentUser.email, displayName: currentUser.displayName, photoURL: currentUser.photoURL, credits: 100,
                    referralCode: 'REF' + uid.substring(0,8).toUpperCase(), referredBy: null, referralEarnings: 0, totalEarned: 0,
                    watchedVideos: [], campaigns: [], streak: { current: 0, lastClaim: null }, totalWatchTime: 0, totalEarnings: 0,
                    likedCampaigns: [], subscribedChannels: [], recentlyWatched: [], totalEarnedByReferralShare: 0,
                    campaignPerformance: { totalViews: 0, totalEarnedFromCampaigns: 0 }
                };
                await setDoc(ref, userData);
            }
            if (userData.referredBy) setupReferralEarningsListener();
            return userData;
        }
        
        async function saveUserData() { if(currentUser) await setDoc(doc(db, 'viewswap_users', currentUser.uid), userData, { merge: true }); }
        
        function setupReferralEarningsListener() {
            if (unsubscribeReferralEarnings) unsubscribeReferralEarnings();
            if (!currentUser || !userData?.referralCode) return;
            const qRef = query(collection(db, 'viewswap_users'), where('referredBy', '==', currentUser.uid));
            unsubscribeReferralEarnings = onSnapshot(qRef, async (snap) => {
                let total = 0;
                for (const docSnap of snap.docs) total += (docSnap.data().totalEarnedByReferralShare || 0);
                if (userData.referralEarnings !== total) { userData.referralEarnings = total; await saveUserData(); if (['home','rewards','account'].includes(currentPage)) renderCurrentPage(); }
            });
        }
        
        function setupRealTimeCampaigns() {
            if (unsubscribeCampaigns) unsubscribeCampaigns();
            if (!currentUser) return;
            unsubscribeCampaigns = onSnapshot(query(collection(db, 'viewswap_campaigns'), orderBy('createdAt', 'desc')), (snap) => {
                allCampaigns = [];
                snap.forEach(doc => { const data = doc.data(); if (!data.watchers?.includes(currentUser?.uid)) allCampaigns.push({ ...data, firestoreId: doc.id }); });
                if (!activeWatchData && allCampaigns.length && currentPage === 'home') { const next = getNextCampaign(); if (next) startAutoWatch(next); }
                if (currentPage === 'home') renderCurrentPage();
            });
        }
        
        function getNextCampaign() { const avail = allCampaigns.filter(c => c.creatorId !== currentUser?.uid && !watchedHistory.includes(c.id)); return avail.length ? avail[0] : allCampaigns.filter(c => c.creatorId !== currentUser?.uid)[0]; }
        
        function extractVideoId(url) { const match = url?.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([^&\n?#]+)/); return match ? match[1] : null; }
        
        async function createAdvancedCampaign(data) {
            if (userData.credits < 15) { showToast('Need 15 credits', true); return false; }
            await updateCredits(-15);
            const campaign = { id: Date.now().toString(), title: data.title, url: data.url, videoId: extractVideoId(data.url), creatorId: currentUser.uid, creatorName: userData.displayName, createdAt: new Date().toISOString(), targetWatchTime: parseInt(data.targetWatchTime) || 30, watchers: [], watcherWatchTime: {}, likeReward: 2.8, subReward: 15, channelUrl: data.channelUrl || null };
            await setDoc(doc(db, 'viewswap_campaigns', campaign.id), campaign);
            userData.campaigns.push(campaign);
            await saveUserData();
            showToast(`✅ Campaign "${data.title}" created!`);
            return true;
        }
        
        async function completeCampaign(campaign) {
            const reward = campaign.targetWatchTime * EARNINGS_RATE;
            await updateCredits(reward);
            userData.totalWatchTime += campaign.targetWatchTime;
            userData.campaignPerformance.totalViews = (userData.campaignPerformance.totalViews || 0) + 1;
            userData.campaignPerformance.totalEarnedFromCampaigns = (userData.campaignPerformance.totalEarnedFromCampaigns || 0) + reward;
            await updateDoc(doc(db, 'viewswap_campaigns', campaign.id), { watchers: arrayUnion(currentUser.uid), [`watcherWatchTime.${currentUser.uid}`]: campaign.targetWatchTime });
            watchedHistory.unshift(campaign.id); if (watchedHistory.length > 10) watchedHistory.pop();
            await saveUserData();
            showToast(`✅ Earned ${reward.toFixed(2)} credits!`);
            if (autoplayEnabled) { const next = getNextCampaign(); if (next) setTimeout(() => startAutoWatch(next), 300); else renderCurrentPage(); } else renderCurrentPage();
        }
        
        function initYouTubePlayer(videoId, campaign) {
            if (youtubePlayer?.destroy) youtubePlayer.destroy();
            return new YT.Player('current_player', { videoId, playerVars: { autoplay: 1, controls: 1 }, events: { onReady: (e) => { e.target.playVideo(); if (activeWatchData) activeWatchData.isPaused = false; }, onStateChange: (e) => { if (activeWatchData) { if (e.data === 2) { activeWatchData.isPaused = true; showToast('⏸️ Paused - timer stopped', false); } else if (e.data === 1) { activeWatchData.isPaused = false; } else if (e.data === 0 && !activeWatchData.completed) { activeWatchData.completed = true; completeCampaign(campaign); } } }, onError: () => { showToast('Video error', true); nextVideo(); } } });
        }
        
        async function startAutoWatch(campaign) {
            if (!currentUser || campaign.watchers?.includes(currentUser.uid)) return;
            if (activeWatchData) stopCurrentWatch();
            let elapsed = campaign.watcherWatchTime?.[currentUser.uid] || 0, target = campaign.targetWatchTime;
            if (elapsed >= target) return;
            const updateUI = () => { let rem = Math.max(0, target - elapsed); document.getElementById('current_timer') && (document.getElementById('current_timer').innerText = Math.floor(rem)); document.getElementById('current_earnings') && (document.getElementById('current_earnings').innerText = (elapsed * EARNINGS_RATE).toFixed(2)); document.getElementById('current_progress') && (document.getElementById('current_progress').style.width = `${(elapsed / target) * 100}%`); };
            updateUI();
            if (window.YT?.Player) youtubePlayer = initYouTubePlayer(campaign.videoId, campaign); else window.onYouTubeIframeAPIReady = () => { youtubePlayer = initYouTubePlayer(campaign.videoId, campaign); };
            if (watchInterval) clearInterval(watchInterval);
            watchInterval = setInterval(async () => { if (activeWatchData?.isPaused) return; if (elapsed >= target) { clearInterval(watchInterval); if (!activeWatchData?.completed) { activeWatchData.completed = true; await completeCampaign(campaign); } } else { elapsed++; if (activeWatchData) activeWatchData.elapsed = elapsed; updateUI(); } }, 1000);
            activeWatchData = { campaignId: campaign.id, elapsed, target, isPaused: false, campaign, completed: false };
        }
        
        function stopCurrentWatch() { if (watchInterval) clearInterval(watchInterval); if (youtubePlayer?.destroy) youtubePlayer.destroy(); youtubePlayer = null; activeWatchData = null; }
        function nextVideo() { if (activeWatchData?.campaign) watchedHistory.unshift(activeWatchData.campaign.id); stopCurrentWatch(); const next = getNextCampaign(); if (next) startAutoWatch(next); else showToast('No videos left', true); }
        async function likeCampaign() { if (!activeWatchData?.campaign) return; const c = activeWatchData.campaign; if (userData.likedCampaigns?.includes(c.id)) { showToast('Already liked', true); return; } await updateCredits(c.likeReward); userData.likedCampaigns.push(c.id); await saveUserData(); showToast(`❤️ +${c.likeReward} credits`); renderCurrentPage(); }
        async function subscribeToChannel() { if (!activeWatchData?.campaign?.channelUrl) return; if (userData.subscribedChannels?.includes(activeWatchData.campaign.channelUrl)) { showToast('Already subscribed', true); return; } await updateCredits(activeWatchData.campaign.subReward || 15); userData.subscribedChannels.push(activeWatchData.campaign.channelUrl); await saveUserData(); window.open(activeWatchData.campaign.channelUrl, '_blank'); showToast(`🔔 +${activeWatchData.campaign.subReward || 15} credits`); }
        function toggleAutoplay() { autoplayEnabled = !autoplayEnabled; showToast(`Auto ${autoplayEnabled ? 'ON' : 'OFF'}`, false); renderCurrentPage(); }
        window.nextVideoWrapper = nextVideo; window.likeWrapper = likeCampaign; window.subscribeWrapper = subscribeToChannel; window.toggleAutoplayWrapper = toggleAutoplay;
        
        function renderCurrentCampaign() {
            if (!activeWatchData?.campaign) return `<div class="card"><div class="empty-state">✨ No active campaign. Create one or wait!</div></div>`;
            const c = activeWatchData.campaign, elapsed = activeWatchData.elapsed || 0, target = c.targetWatchTime;
            return `<div class="campaign-item"><div class="video-container" id="current_player"></div><div class="watch-stats"><div class="stat-badge"><div class="stat-badge-label">EARNING</div><div class="stat-badge-value" id="current_earnings">${(elapsed * EARNINGS_RATE).toFixed(2)}</div></div><div class="stat-badge"><div class="stat-badge-label">TIME LEFT</div><div class="stat-badge-value timer-value" id="current_timer">${Math.max(0, target - elapsed)}</div><div class="stat-badge-label">sec</div></div></div><div class="progress-area"><div class="progress-bar-container"><div class="progress-fill" id="current_progress" style="width: ${(elapsed / target) * 100}%"></div></div></div><div class="action-buttons-area"><button class="action-btn btn-next" onclick="window.nextVideoWrapper()">⏭️ NEXT</button><button class="action-btn btn-like" onclick="window.likeWrapper()" ${userData.likedCampaigns?.includes(c.id) ? 'disabled' : ''}>❤️ +${c.likeReward}</button>${c.channelUrl ? `<button class="action-btn btn-subscribe" onclick="window.subscribeWrapper()" ${userData.subscribedChannels?.includes(c.channelUrl) ? 'disabled' : ''}>🔔 +${c.subReward || 15}</button>` : ''}<button class="action-btn btn-autoplay ${autoplayEnabled ? 'active' : ''}" onclick="window.toggleAutoplayWrapper()">🔄 AUTO ${autoplayEnabled ? 'ON' : 'OFF'}</button></div></div>`;
        }
        
        async function renderHome() { if (!activeWatchData && allCampaigns.length) { const first = getNextCampaign(); if (first) setTimeout(() => startAutoWatch(first), 50); return `<div class="card"><div class="loading-spinner">🎬 Loading video...</div></div>`; } return `<div class="card"><h2>🎬 Now Playing</h2>${renderCurrentCampaign()}${(!activeWatchData && allCampaigns.length === 0) ? '<div class="empty-state">No campaigns. Create one!</div>' : ''}</div>`; }
        function renderCampaignPage() { return `<div class="card"><h2>🚀 Create Campaign</h2><div class="create-campaign-form"><div class="cost-badge">⚡ Cost: 15 credits</div><div class="form-group"><label>📌 Title</label><input id="campTitle" placeholder="Video title"></div><div class="form-group"><label>▶️ YouTube URL</label><input id="campUrl" placeholder="https://youtube.com/watch?v=..."></div><div class="form-group"><label>🔗 Channel URL (for subscribe reward)</label><input id="channelUrl" placeholder="https://youtube.com/@channel"></div><div class="form-group"><label>⏱️ Watch Time (seconds)</label><input id="targetWatchTime" type="number" value="30"></div><button class="btn-primary" id="createAdvancedBtn">✨ Create Campaign</button></div></div>`; }
        function renderRewardsPage() { return `<div class="card"><h2>🏆 Stats</h2><div class="stat-row"><span>💰 Balance:</span><span>${Math.floor(userData?.credits||0)}</span></div><div class="stat-row"><span>👀 Videos Watched:</span><span>${userData?.watchedVideos?.length||0}</span></div><div class="stat-row"><span>💎 Referral Earnings:</span><span>${(userData?.referralEarnings||0).toFixed(2)}</span></div><div class="stat-row"><span>💎 Total Earned:</span><span>${(userData?.totalEarnings||0).toFixed(2)}</span></div></div>`; }
        
        function renderAccountPage() { const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=VIEWSWAP_REF:${userData?.referralCode}`; setTimeout(() => { if (campaignChart) campaignChart.destroy(); const ctx = document.getElementById('campaignChart')?.getContext('2d'); if (ctx && userData?.campaignPerformance) campaignChart = new Chart(ctx, { type: 'bar', data: { labels: ['Total Views', 'Earnings from Campaigns'], datasets: [{ label: 'Performance', data: [userData.campaignPerformance.totalViews || 0, (userData.campaignPerformance.totalEarnedFromCampaigns || 0).toFixed(2)], backgroundColor: ['#8b5cf6', '#ec489a'] }] } }); }, 100); return `<div class="card"><div style="text-align:center;"><img src="${currentUser?.photoURL}" style="width:80px;border-radius:50%;"><div>${escapeHtml(currentUser?.displayName)}</div></div></div><div class="card"><h2>📈 Campaign Performance Graph</h2><div class="graph-container"><canvas id="campaignChart"></canvas></div></div><div class="card"><h2>🔗 Referral QR</h2><div class="qr-display-img" id="qrDisplay"><img src="${qrUrl}" width="100"></div><div class="referral-code-box" id="refCode">${userData?.referralCode}</div><button class="btn-primary" id="copyCodeBtn">Copy Code</button><button class="share-button" id="shareReferralBtn">📤 Share Link / App</button></div><button class="btn-secondary" id="signOutBtn">Sign Out</button>`; }
        
        function renderReferPage() { const shareLink = `https://viewswap.page.link/ref?code=${userData?.referralCode}`; return `<div class="card"><h2>🤝 Referral (2.5% of their earnings)</h2><div class="qr-display-img" id="qrDisplayRefer"><img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=VIEWSWAP_REF:${userData?.referralCode}" width="150"></div><div class="referral-code-box" id="refCodeRefer">${userData?.referralCode}</div><button class="btn-primary" id="copyReferBtn">Copy Code</button><button class="share-button" id="shareReferBtn">📱 Share Referral Link</button><button class="btn-secondary" id="scanQrBtn">Scan QR</button><div class="form-group" style="margin-top:16px;"><label>Enter referral code to claim bonus</label><input id="enterRefCode" placeholder="Friend's referral code"><button class="btn-primary" id="applyRefCodeBtn">Apply Code (+10 credits)</button></div></div>`; }
        
        async function processQRReferral(code) { if (!currentUser || userData.referredBy) return; const q = query(collection(db,'viewswap_users'), where('referralCode','==',code)); const snap = await getDocs(q); if (!snap.empty && snap.docs[0].id !== currentUser.uid) { userData.referredBy = snap.docs[0].id; await saveUserData(); await updateDoc(doc(db,'viewswap_users',snap.docs[0].id), { referrals: arrayUnion(currentUser.uid) }); await updateCredits(10); showToast('🎉 Referral linked! +10 credits. 2.5% forever!'); setupReferralEarningsListener(); } else showToast('Invalid code', true); }
        
        function escapeHtml(str) { return str?.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]) || ''; }
        function showToast(msg, isErr=false) { const t=document.createElement('div'); t.className='toast'; if(isErr) t.style.background='#ef4444'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(), 3000); }
        
        async function renderCurrentPage() {
            const container = document.getElementById('pageContent'); if(!container) return;
            if(currentPage === 'home') container.innerHTML = await renderHome();
            else if(currentPage === 'campaign'){ container.innerHTML = renderCampaignPage(); document.getElementById('createAdvancedBtn')?.addEventListener('click', async () => { const title=document.getElementById('campTitle')?.value, url=document.getElementById('campUrl')?.value; if(title&&url) await createAdvancedCampaign({ title, url, channelUrl: document.getElementById('channelUrl')?.value, targetWatchTime: document.getElementById('targetWatchTime')?.value }); else showToast('Title & URL required', true); }); }
            else if(currentPage === 'rewards') container.innerHTML = renderRewardsPage();
            else if(currentPage === 'account'){ container.innerHTML = renderAccountPage(); document.getElementById('qrDisplay')?.addEventListener('click',()=>{const m=document.createElement('div');m.className='fullscreen-qr';m.innerHTML=`<div style="background:#0f172a;padding:30px;border-radius:40px;"><img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=VIEWSWAP_REF:${userData?.referralCode}" width="250"><button class="close-qr" onclick="this.parentElement.parentElement.remove()">Close</button></div>`;document.body.appendChild(m);}); document.getElementById('copyCodeBtn')?.addEventListener('click',()=>{navigator.clipboard.writeText(userData?.referralCode);showToast('Copied!');}); document.getElementById('shareReferralBtn')?.addEventListener('click',()=>{if(navigator.share) navigator.share({title:'ViewSwap',text:`Join ViewSwap with my code: ${userData?.referralCode}`}); else showToast('Copy code manually', true);}); document.getElementById('signOutBtn')?.addEventListener('click',async()=>await signOut(auth)); }
            else if(currentPage === 'refer'){ container.innerHTML = renderReferPage(); document.getElementById('qrDisplayRefer')?.addEventListener('click',()=>{const m=document.createElement('div');m.className='fullscreen-qr';m.innerHTML=`<div style="background:#0f172a;padding:30px;border-radius:40px;"><img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=VIEWSWAP_REF:${userData?.referralCode}" width="250"><button class="close-qr" onclick="this.parentElement.parentElement.remove()">Close</button></div>`;document.body.appendChild(m);}); document.getElementById('copyReferBtn')?.addEventListener('click',()=>{navigator.clipboard.writeText(userData?.referralCode);showToast('Copied');}); document.getElementById('shareReferBtn')?.addEventListener('click',()=>{if(navigator.share) navigator.share({title:'ViewSwap Referral',text:`Use my code ${userData?.referralCode} on ViewSwap!`}); else showToast('Copy code', true);}); document.getElementById('scanQrBtn')?.addEventListener('click',()=>{const modal=document.createElement('div');modal.className='qr-modal';modal.innerHTML=`<div><div id="qr-reader-scanner" style="width:100%;"></div><button class="close-qr" id="closeScannerBtn">Close</button></div>`;document.body.appendChild(modal);const scanner=new Html5Qrcode("qr-reader-scanner");scanner.start({facingMode:"environment"},{fps:10,qrbox:250},(text)=>{scanner.stop();modal.remove();if(text.startsWith('VIEWSWAP_REF:'))processQRReferral(text.split(':')[1]);else showToast('Invalid QR',true);},()=>{});document.getElementById('closeScannerBtn').onclick=()=>{scanner.stop();modal.remove();};}); document.getElementById('applyRefCodeBtn')?.addEventListener('click',()=>{const code=document.getElementById('enterRefCode')?.value.trim(); if(code) processQRReferral(code); else showToast('Enter code', true);}); }
        }
        
        document.querySelectorAll('.nav-item').forEach(btn=>btn.addEventListener('click',()=>{ currentPage=btn.dataset.page; document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderCurrentPage(); }));
        onAuthStateChanged(auth, async(user)=>{ if(user){ currentUser=user; await loadUserData(user.uid); document.body.classList.add('authenticated'); setupRealTimeCampaigns(); renderCurrentPage(); } else { document.body.classList.remove('authenticated'); if(unsubscribeCampaigns) unsubscribeCampaigns(); if(unsubscribeReferralEarnings) unsubscribeReferralEarnings(); stopCurrentWatch(); } });
        document.getElementById('signInBtn')?.addEventListener('click',()=>signInWithPopup(auth,provider));
        document.getElementById('qrSignInBtn')?.addEventListener('click',()=>{ const modal=document.createElement('div');modal.className='qr-modal';modal.innerHTML=`<div><div id="qr-reader-scanner" style="width:100%;"></div><button class="close-qr" id="closeScannerBtn">Close</button></div>`;document.body.appendChild(modal);const scanner=new Html5Qrcode("qr-reader-scanner");scanner.start({facingMode:"environment"},{fps:10,qrbox:250},(text)=>{scanner.stop();modal.remove();if(!currentUser){sessionStorage.setItem('pendingReferral',text);signInWithPopup(auth,provider);}else if(text.startsWith('VIEWSWAP_REF:'))processQRReferral(text.split(':')[1]);else showToast('Invalid QR',true);},()=>{});document.getElementById('closeScannerBtn').onclick=()=>{scanner.stop();modal.remove();}; });
        document.getElementById('applyReferralBtn')?.addEventListener('click',async()=>{ const code=document.getElementById('signinReferralCode')?.value.trim(); if(code) { sessionStorage.setItem('pendingReferral',code); signInWithPopup(auth,provider); } else showToast('Enter code', true); });
        const pending=sessionStorage.getItem('pendingReferral'); if(pending) setTimeout(async()=>{ if(currentUser && !userData?.referredBy) await processQRReferral(pending); sessionStorage.removeItem('pendingReferral'); },2000);
    </script>
</body>
</html>
