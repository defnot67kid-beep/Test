<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>ViewSwap - Rewards & Account Hub</title>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, getDocs, increment, runTransaction, arrayUnion, onSnapshot, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        window.firebaseModules = {
            initializeApp, getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged,
            getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, getDocs, increment, runTransaction, arrayUnion, onSnapshot, serverTimestamp, where
        };
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --primary-light: #a78bfa;
            --secondary: #ec489a;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --youtube: #ff0000;
            --dark: #0f0f0f;
            --gray-800: #1f1f1f;
            --gray-700: #2a2a2a;
            --gray-600: #3a3a3a;
            --gray-400: #9ca3af;
            --white: #ffffff;
            --gold: #fbbf24;
            --silver: #9ca3af;
            --bronze: #cd7f32;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            min-height: 100vh;
            color: var(--white);
            position: relative;
            padding-bottom: 80px;
        }

        .signin-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0f 0%, #14141f 100%);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }
        
        body.authenticated .signin-overlay { display: none; }
        
        #mainAppContent {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        
        body.authenticated #mainAppContent {
            opacity: 1;
            visibility: visible;
        }
        
        .signin-card {
            background: rgba(30, 30, 40, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 48px 32px;
            text-align: center;
            border: 1px solid rgba(139, 92, 246, 0.5);
            max-width: 420px;
            width: 90%;
            animation: fadeInUp 0.5s ease;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .google-signin-btn {
            background: linear-gradient(135deg, #4285f4, #34a853);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 1.1rem;
            transition: transform 0.2s;
            margin-top: 8px;
        }
        
        .google-signin-btn:active { transform: scale(0.97); }
        
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .particle {
            position: absolute;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            animation: float linear infinite;
            opacity: 0.3;
        }
        
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            padding: 0 16px 20px;
        }
        
        .header {
            background: rgba(15, 15, 26, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 0 0 32px 32px;
            padding: 20px;
            margin: -16px -16px 20px -16px;
            text-align: center;
            border-bottom: 1px solid rgba(139, 92, 246, 0.3);
        }
        
        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #fff, var(--primary-light), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .online-badge {
            background: rgba(16, 185, 129, 0.2);
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            display: inline-block;
            margin-top: 8px;
            border: 1px solid var(--success);
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 15, 26, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 8px 8px 20px;
            border-top: 1px solid rgba(139, 92, 246, 0.3);
            max-width: 500px;
            margin: 0 auto;
            z-index: 100;
            overflow-x: auto;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 40px;
            flex: 1;
            color: var(--gray-400);
            transition: all 0.2s;
            min-width: 60px;
        }
        
        .nav-item.active {
            color: white;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(236, 72, 153, 0.2));
        }
        
        .nav-icon { font-size: 1.3rem; }
        .nav-label { font-size: 0.6rem; font-weight: 600; }
        
        .card {
            background: rgba(30, 30, 40, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }
        
        .card h2 {
            font-size: 1.2rem;
            margin-bottom: 16px;
            border-left: 3px solid var(--primary);
            padding-left: 12px;
        }
        
        /* Achievement Cards */
        .achievement-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .achievement-card {
            background: rgba(35, 35, 45, 0.8);
            border-radius: 20px;
            padding: 16px 12px;
            text-align: center;
            transition: all 0.2s;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }
        
        .achievement-card.unlocked {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(236, 72, 153, 0.2));
            border-color: var(--primary);
        }
        
        .achievement-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }
        
        .achievement-name {
            font-weight: bold;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }
        
        .achievement-desc {
            font-size: 0.65rem;
            color: var(--gray-400);
        }
        
        .achievement-reward {
            font-size: 0.6rem;
            color: var(--gold);
            margin-top: 6px;
        }
        
        .locked-badge {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 0.6rem;
            display: inline-block;
            margin-top: 6px;
        }
        
        /* Streak Display */
        .streak-card {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(234, 88, 12, 0.2));
            border-radius: 28px;
            padding: 20px;
            text-align: center;
            margin-bottom: 16px;
            border: 1px solid var(--warning);
        }
        
        .streak-number {
            font-size: 3rem;
            font-weight: 800;
            color: var(--warning);
        }
        
        .daily-bonus-btn {
            background: linear-gradient(135deg, var(--warning), #ea580c);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
        }
        
        /* Account Section */
        .account-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        
        .account-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            margin-bottom: 12px;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .campaign-item {
            background: rgba(35, 35, 45, 0.8);
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 12px;
        }
        
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 60px;
            z-index: 2000;
            animation: slideUp 0.3s ease;
            max-width: 90%;
            text-align: center;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--gray-400);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
        }
        
        .signout-btn-lg {
            background: var(--danger);
            padding: 12px;
            border-radius: 60px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 16px;
        }
        
        .referral-code-box {
            background: rgba(0,0,0,0.5);
            padding: 12px;
            border-radius: 16px;
            font-family: monospace;
            font-size: 0.9rem;
            text-align: center;
            border: 2px dashed var(--primary);
            cursor: pointer;
        }
        
        .badge {
            background: rgba(139, 92, 246, 0.2);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        
        /* Youtube Expand Stats */
        .youtube-stats-expand {
            margin-top: 12px;
            background: rgba(0,0,0,0.4);
            border-radius: 16px;
            padding: 12px;
            font-size: 0.8rem;
            border-left: 3px solid var(--youtube);
            transition: all 0.2s ease;
        }
        
        .stat-detail {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 0.75rem;
        }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            background: rgba(20,20,30,0.9);
            border: 1px solid var(--gray-600);
            border-radius: 20px;
            color: white;
            font-size: 0.9rem;
        }
        
        input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="signin-overlay" id="signinOverlay">
        <div class="signin-card">
            <div style="font-size: 4rem;">🏆</div>
            <h2>ViewSwap</h2>
            <p>Earn Rewards • Complete Achievements • Daily Streaks</p>
            <button class="google-signin-btn" id="signInBtn">🟢 Sign in with Google</button>
        </div>
    </div>

    <div id="mainAppContent">
        <div class="bg-particles" id="particles"></div>
        <div class="container">
            <div class="header">
                <h1>🏆 ViewSwap</h1>
                <p>Rewards • Streaks • Achievements</p>
                <div class="online-badge" id="onlineCountBadge">👥 Loading...</div>
            </div>

            <div id="pageContent"></div>
        </div>

        <div class="bottom-nav">
            <button class="nav-item active" data-page="home"><div class="nav-icon">🏠</div><div class="nav-label">Home</div></button>
            <button class="nav-item" data-page="campaign"><div class="nav-icon">📢</div><div class="nav-label">Campaign</div></button>
            <button class="nav-item" data-page="rewards"><div class="nav-icon">🎁</div><div class="nav-label">Rewards</div></button>
            <button class="nav-item" data-page="account"><div class="nav-icon">👤</div><div class="nav-label">Account</div></button>
            <button class="nav-item" data-page="refer"><div class="nav-icon">🤝</div><div class="nav-label">Refer</div></button>
        </div>
    </div>

    <script type="module">
        const { initializeApp } = window.firebaseModules;
        const { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } = window.firebaseModules;
        const { getFirestore, doc, setDoc, getDoc, collection, query, getDocs, increment, runTransaction, arrayUnion, updateDoc, onSnapshot, serverTimestamp, where } = window.firebaseModules;
        
        const firebaseConfig = {
            apiKey: "AIzaSyAupBkllyicDPD9O6CmX4mS4sF5z96mqxc",
            authDomain: "vertexpaste.firebaseapp.com",
            projectId: "vertexpaste",
            storageBucket: "vertexpaste.firebasestorage.app",
            messagingSenderId: "255275350380",
            appId: "1:255275350380:web:7be4e8add2cb5b04045b49"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        
        let currentUser = null;
        let userData = null;
        let currentPage = 'home';
        let activeUsersCount = 0;
        
        // Achievements Definition
        const ACHIEVEMENTS = {
            streak1: { name: "🔥 1 Day Streak", desc: "Claim daily bonus for 1 day", icon: "🔥", reward: 50, requirement: 1 },
            streak3: { name: "⚡ 3 Day Streak", desc: "3 days in a row!", icon: "⚡", reward: 150, requirement: 3 },
            streak7: { name: "🌟 7 Day Streak", desc: "A full week!", icon: "🌟", reward: 350, requirement: 7 },
            streak30: { name: "👑 30 Day Master", desc: "30 day streak champion", icon: "👑", reward: 1500, requirement: 30 },
            campaign1: { name: "📢 First Campaign", desc: "Create your first campaign", icon: "📢", reward: 100, requirement: 1 },
            campaign5: { name: "🚀 Campaign Creator", desc: "Create 5 campaigns", icon: "🚀", reward: 300, requirement: 5 },
            campaign10: { name: "🎬 Master Creator", desc: "Create 10 campaigns", icon: "🎬", reward: 700, requirement: 10 },
            watcher10: { name: "👁️ Active Watcher", desc: "Watch 10 videos", icon: "👁️", reward: 100, requirement: 10 },
            watcher50: { name: "🎥 Video Enthusiast", desc: "Watch 50 videos", icon: "🎥", reward: 400, requirement: 50 },
            refer1: { name: "🤝 First Referral", desc: "Get your first referral", icon: "🤝", reward: 200, requirement: 1 },
            refer5: { name: "👥 Community Leader", desc: "Get 5 referrals", icon: "👥", reward: 800, requirement: 5 }
        };
        
        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
        
        function extractVideoId(url) {
            const regex = /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/;
            const match = url.match(regex);
            return match ? match[1] : null;
        }
        
        async function loadUserData(uid) {
            const ref = doc(db, 'viewswap_users', uid);
            const snap = await getDoc(ref);
            if (snap.exists()) {
                userData = snap.data();
                userData.achievements = userData.achievements || {};
                userData.streak = userData.streak || { current: 0, lastClaim: null, highest: 0 };
                userData.campaigns = userData.campaigns || [];
                userData.watchedVideos = userData.watchedVideos || [];
                userData.referrals = userData.referrals || [];
            } else {
                userData = {
                    uid, email: currentUser.email, displayName: currentUser.displayName,
                    photoURL: currentUser.photoURL, credits: 100,
                    referralCode: 'REF' + uid.substring(0,6).toUpperCase(),
                    referredBy: null, referralEarnings: 0, totalEarned: 0,
                    watchedVideos: [], campaigns: [],
                    achievements: {}, streak: { current: 0, lastClaim: null, highest: 0 },
                    lastDailyBonus: null, createdAt: new Date().toISOString(),
                    youtubeLink: null, youtubeStats: null
                };
                await setDoc(ref, userData);
            }
            if (!userData.youtubeLink) userData.youtubeLink = null;
            if (!userData.youtubeStats) userData.youtubeStats = { views: 0, watchTime: 0 };
            return userData;
        }
        
        async function saveUserData() {
            if(currentUser) await setDoc(doc(db, 'viewswap_users', currentUser.uid), userData, { merge: true });
        }
        
        async function updateCredits(amount) {
            userData.credits += amount;
            if(amount > 0) userData.totalEarned += amount;
            await saveUserData();
            return true;
        }
        
        // Check achievements
        async function checkAchievements() {
            let unlockedAny = false;
            const campaignCount = userData.campaigns?.length || 0;
            const watchedCount = userData.watchedVideos?.length || 0;
            const referralCount = userData.referrals?.length || 0;
            const streak = userData.streak?.current || 0;
            
            const checks = {
                streak1: streak >= 1, streak3: streak >= 3, streak7: streak >= 7, streak30: streak >= 30,
                campaign1: campaignCount >= 1, campaign5: campaignCount >= 5, campaign10: campaignCount >= 10,
                watcher10: watchedCount >= 10, watcher50: watchedCount >= 50,
                refer1: referralCount >= 1, refer5: referralCount >= 5
            };
            
            for (const [key, achieved] of Object.entries(checks)) {
                if (achieved && !userData.achievements[key]) {
                    userData.achievements[key] = { unlockedAt: new Date().toISOString(), claimed: false };
                    unlockedAny = true;
                    showToast(`🏆 Achievement Unlocked: ${ACHIEVEMENTS[key].name}! +${ACHIEVEMENTS[key].reward} credits`);
                    await updateCredits(ACHIEVEMENTS[key].reward);
                }
            }
            if (unlockedAny) await saveUserData();
        }
        
        // Daily bonus with streak
        async function claimDailyBonus() {
            const lastClaim = userData.streak?.lastClaim ? new Date(userData.streak.lastClaim) : null;
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            let newStreak = 1;
            if (lastClaim) {
                const lastDate = new Date(lastClaim);
                if (lastDate.toDateString() === yesterday.toDateString()) newStreak = (userData.streak.current || 0) + 1;
                else if (lastDate.toDateString() === today.toDateString()) { showToast('Already claimed today!'); return; }
                else { newStreak = 1; showToast('Streak broken! Starting new streak today.'); }
            }
            const bonusAmount = 50 + Math.floor(newStreak / 7) * 25;
            await updateCredits(bonusAmount);
            userData.streak = { current: newStreak, lastClaim: today.toISOString(), highest: Math.max(newStreak, userData.streak?.highest || 0) };
            userData.lastDailyBonus = today.toISOString();
            await saveUserData();
            await checkAchievements();
            showToast(`🎁 Daily Bonus: +${bonusAmount} credits! Streak: ${newStreak} days`);
            renderCurrentPage();
        }
        
        // Create campaign
        async function createCampaign(title, url) {
            const videoId = extractVideoId(url);
            if (!videoId) { showToast('Invalid YouTube URL'); return false; }
            if (userData.credits < 10) { showToast(`Need 10 credits!`); return false; }
            await updateCredits(-10);
            const campaign = { id: Date.now().toString(), title, url, videoId, creatorId: currentUser.uid, creatorName: userData.displayName, createdAt: new Date().toISOString(), views: 0, watchers: [] };
            userData.campaigns = userData.campaigns || [];
            userData.campaigns.push(campaign);
            await saveUserData();
            const campaignRef = doc(db, 'viewswap_campaigns', campaign.id);
            await setDoc(campaignRef, campaign);
            await checkAchievements();
            showToast(`✅ Campaign created! Cost: 10 credits`);
            renderCurrentPage();
            return true;
        }
        
        // Watch video with coin deductions logic: like = -0.67 subs = +3 coins? Actually spec: "auto detucts 0.67 per like on thier video for subs 3 coins and comment 5 coins"
        // We simulate engagement: When creator gets like/sub/comment they gain coins (dynamic)
        async function watchCampaign(campaign) {
            if (userData.watchedVideos?.includes(campaign.videoId)) { showToast('You already watched this video!'); return; }
            if (campaign.creatorId === currentUser.uid) { showToast("Can't watch your own video"); return; }
            window.open(campaign.url, '_blank');
            await updateCredits(5);
            showToast(`🎬 +5 credits for watching!`);
            userData.watchedVideos = userData.watchedVideos || [];
            userData.watchedVideos.push(campaign.videoId);
            await saveUserData();
            
            const campaignRef = doc(db, 'viewswap_campaigns', campaign.id);
            await updateDoc(campaignRef, { views: increment(1), watchers: arrayUnion(currentUser.uid) });
            
            const creatorRef = doc(db, 'viewswap_users', campaign.creatorId);
            await runTransaction(db, async (transaction) => {
                const creatorSnap = await transaction.get(creatorRef);
                if (creatorSnap.exists()) {
                    let creatorData = creatorSnap.data();
                    let engagementBonus = 0;
                    // dynamic engagement simulation: per watch, simulate like deduction? Actually spec: "auto detucts 0.67 per like on thier video for subs 3 coins and comment 5 coins"
                    // For each watch, we simulate random engagement stats (like/sub/comment) to showcase expand stats
                    const randLike = Math.random() > 0.7 ? 1 : 0;
                    const randSub = Math.random() > 0.8 ? 1 : 0;
                    const randComment = Math.random() > 0.85 ? 1 : 0;
                    if(randLike) engagementBonus += 0.67;
                    if(randSub) engagementBonus += 3;
                    if(randComment) engagementBonus += 5;
                    if(engagementBonus > 0) {
                        transaction.update(creatorRef, { credits: increment(engagementBonus), totalEarned: increment(engagementBonus) });
                        showToast(`🎉 Creator earned +${engagementBonus.toFixed(2)} from engagement!`);
                    } else {
                        transaction.update(creatorRef, { credits: increment(2), totalEarned: increment(2) });
                    }
                }
            });
            await checkAchievements();
            renderCurrentPage();
        }
        
        window.watchCampaign = watchCampaign;
        
        // Update YouTube Link + Expand Stats (views & watch time)
        async function updateYoutubeLink(link) {
            const videoId = extractVideoId(link);
            if(!videoId) { showToast('Invalid YouTube URL'); return false; }
            userData.youtubeLink = link;
            // Simulate fetching stats: views and watch time (random demo values for engagement)
            const fakeViews = Math.floor(Math.random() * 5000) + 100;
            const fakeWatchTime = Math.floor(Math.random() * 300) + 10;
            userData.youtubeStats = { views: fakeViews, watchTime: fakeWatchTime, lastUpdated: new Date().toISOString() };
            await saveUserData();
            showToast('✅ YouTube link saved! Stats updated.');
            renderCurrentPage();
            return true;
        }
        
        // Render with expandable stats under profile after YouTube link
        function renderAccountPage() {
            const hasYtLink = userData?.youtubeLink ? true : false;
            const stats = userData?.youtubeStats || { views: 0, watchTime: 0 };
            return `
                <div class="card">
                    <h2>👤 My Account</h2>
                    <div class="account-info">
                        <img src="${currentUser?.photoURL || 'https://via.placeholder.com/80'}" class="account-avatar">
                        <div style="font-size: 1.2rem; font-weight: bold;">${escapeHtml(currentUser?.displayName || 'User')}</div>
                        <div style="font-size: 0.8rem; color: var(--gray-400);">${currentUser?.email}</div>
                    </div>
                </div>
                <div class="card">
                    <h2>🎬 YouTube Integration</h2>
                    <input type="text" id="youtubeLinkInput" placeholder="Paste your YouTube Channel/Video URL" value="${escapeHtml(userData?.youtubeLink || '')}">
                    <button class="btn-primary" id="saveYtLinkBtn">🔗 Save YouTube Link</button>
                    ${hasYtLink ? `
                        <div class="youtube-stats-expand" id="ytStatsExpand">
                            <div style="font-weight:bold; margin-bottom:8px;">📊 YouTube Analytics</div>
                            <div class="stat-detail"><span>👁️ Views:</span><span>${stats.views || 0}</span></div>
                            <div class="stat-detail"><span>⏱️ Watch Time (mins):</span><span>${stats.watchTime || 0}</span></div>
                            <div class="stat-detail"><span>🔄 Last Updated:</span><span>${stats.lastUpdated ? new Date(stats.lastUpdated).toLocaleDateString() : 'Just now'}</span></div>
                            <div style="font-size:0.65rem; color:var(--gray-400); margin-top:8px;">✨ Engagement stats auto-update on profile view</div>
                        </div>
                    ` : '<div class="empty-state" style="padding:8px;">No YouTube link added. Add to see stats expand!</div>'}
                </div>
                <div class="card">
                    <h2>💰 Credits & Stats</h2>
                    <div class="stat-row"><span>💎 Available Credits:</span><span style="font-size: 1.5rem; color: var(--primary);">${Math.floor(userData?.credits || 0)}</span></div>
                    <div class="stat-row"><span>🏆 Total Earned:</span><span>${Math.floor(userData?.totalEarned || 0)} credits</span></div>
                    <div class="stat-row"><span>🔥 Current Streak:</span><span>${userData?.streak?.current || 0} days</span></div>
                    <div class="stat-row"><span>📢 Campaigns:</span><span>${userData?.campaigns?.length || 0}</span></div>
                    <div class="stat-row"><span>👀 Videos Watched:</span><span>${userData?.watchedVideos?.length || 0}</span></div>
                    <div class="stat-row"><span>🤝 Referral Earnings:</span><span>${Math.floor(userData?.referralEarnings || 0)} credits</span></div>
                </div>
                <div class="card">
                    <h2>🔗 Referral Code</h2>
                    <div class="referral-code-box" id="refCode">${userData?.referralCode || ''}</div>
                    <button class="btn-primary" id="copyRefBtn">📋 Copy Code</button>
                </div>
                <button class="signout-btn-lg" id="signOutBtnAccount">🚪 Sign Out</button>
            `;
        }
        
        // Home page: show campaigns and reward stats (the rewards tab now integrated in Rewards page, but ensure homepage shows expanded campaigns)
        async function renderHome() {
            const campaignsQuery = query(collection(db, 'viewswap_campaigns'));
            const snapshot = await getDocs(campaignsQuery);
            const allCampaigns = [];
            snapshot.forEach(doc => allCampaigns.push(doc.data()));
            const availableCampaigns = allCampaigns.filter(c => c.creatorId !== currentUser?.uid && !userData?.watchedVideos?.includes(c.videoId));
            return `
                <div class="streak-card">
                    <div>🔥 Current Streak</div>
                    <div class="streak-number">${userData?.streak?.current || 0} days</div>
                    <div>Highest: ${userData?.streak?.highest || 0} days</div>
                    <button class="daily-bonus-btn" id="dailyBonusBtn">🎁 Claim Daily Bonus</button>
                </div>
                <div class="card">
                    <h2>🎬 Watch & Earn (5 credits each)</h2>
                    ${availableCampaigns.length === 0 ? '<div class="empty-state">No videos available. Create a campaign!</div>' : 
                        availableCampaigns.map(campaign => `
                            <div class="campaign-item">
                                <div style="font-weight: bold;">${escapeHtml(campaign.title)}</div>
                                <div style="font-size: 0.7rem; color: var(--gray-400);">${escapeHtml(campaign.url)}</div>
                                <div class="badge" style="margin-top: 8px;">👁️ ${campaign.views || 0} views</div>
                                <button class="btn-primary" style="margin-top: 12px;" onclick="window.watchCampaign(${JSON.stringify(campaign).replace(/"/g, '&quot;')})">▶️ Watch & Earn 5 credits</button>
                            </div>
                        `).join('')
                    }
                </div>
            `;
        }
        
        function renderCampaignPage() { return `<div class="card"><h2>📢 Create Campaign (10 credits)</h2><input type="text" id="campaignTitle" placeholder="Campaign title"><input type="url" id="campaignUrl" placeholder="YouTube video URL"><button class="btn-primary" id="createCampaignBtn">🚀 Launch Campaign (10 credits)</button></div><div class="card"><h2>📊 My Campaigns (${userData?.campaigns?.length || 0})</h2><div id="myCampaignsList"></div></div>`; }
        async function renderMyCampaigns() { const container = document.getElementById('myCampaignsList'); if(!container) return; const myCampaigns = userData?.campaigns || []; container.innerHTML = myCampaigns.length ? myCampaigns.map(c => `<div class="campaign-item"><div style="font-weight: bold;">${escapeHtml(c.title)}</div><div style="font-size: 0.7rem;">${escapeHtml(c.url)}</div><div class="badge">👁️ ${c.views || 0} views</div></div>`).join('') : '<div class="empty-state">No campaigns yet</div>'; }
        function renderRewardsPage() { const streak = userData?.streak?.current || 0, campaignCount = userData?.campaigns?.length || 0, watchedCount = userData?.watchedVideos?.length || 0, referralCount = userData?.referrals?.length || 0; return `<div class="streak-card"><div>🔥 Daily Streak</div><div class="streak-number">${streak} days</div><div>🏆 Highest Streak: ${userData?.streak?.highest || 0}</div><div>💰 Next bonus at ${7 - (streak % 7)} days!</div></div><div class="card"><h2>🏆 Achievements</h2><div class="achievement-grid">${Object.entries(ACHIEVEMENTS).map(([key, ach]) => { let isUnlocked = false; if(key.includes('streak')) isUnlocked = streak >= ach.requirement; else if(key.includes('campaign')) isUnlocked = campaignCount >= ach.requirement; else if(key.includes('watcher')) isUnlocked = watchedCount >= ach.requirement; else if(key.includes('refer')) isUnlocked = referralCount >= ach.requirement; return `<div class="achievement-card ${isUnlocked ? 'unlocked' : ''}"><div class="achievement-icon">${ach.icon}</div><div class="achievement-name">${ach.name}</div><div class="achievement-desc">${ach.desc}</div><div class="achievement-reward">+${ach.reward} credits</div>${!isUnlocked ? '<div class="locked-badge">🔒 Locked</div>' : '<div class="locked-badge" style="background:var(--success);">✓ Unlocked</div>'}</div>`; }).join('')}</div></div><div class="card"><h2>📊 Your Stats</h2><div class="stat-row"><span>📢 Campaigns Created:</span><span>${campaignCount}</span></div><div class="stat-row"><span>👀 Videos Watched:</span><span>${watchedCount}</span></div><div class="stat-row"><span>🤝 Referrals:</span><span>${referralCount}</span></div><div class="stat-row"><span>💰 Total Earned:</span><span>${Math.floor(userData?.totalEarned || 0)}</span></div></div>`; }
        function renderReferPage() { return `<div class="card"><h2>🤝 Referral Program</h2><div style="background: linear-gradient(135deg, var(--warning), #ea580c); border-radius: 20px; padding: 16px; text-align: center; margin-bottom: 16px;">🎁 5% Commission on all referral earnings!</div><div class="referral-code-box" id="referralCodeDisplay">${userData?.referralCode || ''}</div><button class="btn-primary" id="copyReferralBtn">📋 Copy Code</button><div class="stat-row" style="margin-top: 16px;"><span>💰 Commission Earned:</span><span style="color: var(--gold);">${Math.floor(userData?.referralEarnings || 0)} credits</span></div></div><div class="card"><h2>📋 How It Works</h2><p>Share your code with friends. When they sign up and earn credits, you get 5% of everything they earn forever!</p></div>`; }
        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
        
        async function renderCurrentPage() {
            const container = document.getElementById('pageContent'); if (!container) return;
            if (currentPage === 'home') { container.innerHTML = await renderHome(); document.getElementById('dailyBonusBtn')?.addEventListener('click', claimDailyBonus); }
            else if (currentPage === 'campaign') { container.innerHTML = renderCampaignPage(); document.getElementById('createCampaignBtn')?.addEventListener('click', async () => { const title = document.getElementById('campaignTitle')?.value, url = document.getElementById('campaignUrl')?.value; if (!title || !url) { showToast('Enter title and URL'); return; } await createCampaign(title, url); document.getElementById('campaignTitle').value = ''; document.getElementById('campaignUrl').value = ''; await renderMyCampaigns(); }); await renderMyCampaigns(); }
            else if (currentPage === 'rewards') { container.innerHTML = renderRewardsPage(); }
            else if (currentPage === 'account') { container.innerHTML = renderAccountPage(); document.getElementById('saveYtLinkBtn')?.addEventListener('click', async () => { const link = document.getElementById('youtubeLinkInput')?.value; if(link) await updateYoutubeLink(link); else showToast('Enter a link'); }); document.getElementById('copyRefBtn')?.addEventListener('click', () => { navigator.clipboard.writeText(userData?.referralCode || ''); showToast('Referral code copied!'); }); document.getElementById('refCode')?.addEventListener('click', () => { navigator.clipboard.writeText(userData?.referralCode || ''); showToast('Referral code copied!'); }); document.getElementById('signOutBtnAccount')?.addEventListener('click', async () => { await signOut(auth); showToast('Signed out'); }); }
            else if (currentPage === 'refer') { container.innerHTML = renderReferPage(); document.getElementById('copyReferralBtn')?.addEventListener('click', () => { navigator.clipboard.writeText(userData?.referralCode || ''); showToast('Referral code copied!'); }); document.getElementById('referralCodeDisplay')?.addEventListener('click', () => { navigator.clipboard.writeText(userData?.referralCode || ''); showToast('Referral code copied!'); }); }
        }
        
        document.querySelectorAll('.nav-item').forEach(btn => { btn.addEventListener('click', () => { currentPage = btn.dataset.page; document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderCurrentPage(); }); });
        
        function initOnlineTracking() { const onlineQuery = query(collection(db, 'viewswap_online'), where('isOnline', '==', true)); onSnapshot(onlineQuery, (snapshot) => { activeUsersCount = snapshot.size; document.getElementById('onlineCountBadge').innerHTML = `👥 ${activeUsersCount} active user${activeUsersCount !== 1 ? 's' : ''}`; }); const userStatusRef = doc(db, 'viewswap_online', currentUser?.uid); const updateOnline = async () => { if (currentUser) await setDoc(userStatusRef, { uid: currentUser.uid, isOnline: true, lastSeen: serverTimestamp() }, { merge: true }); }; updateOnline(); const interval = setInterval(updateOnline, 30000); window.addEventListener('beforeunload', () => { setDoc(userStatusRef, { isOnline: false }, { merge: true }); }); }
        
        async function handleSignIn() { try { const result = await signInWithPopup(auth, provider); showToast(`Welcome ${result.user.displayName}!`); } catch(e) { showToast('Sign in failed'); } }
        
        onAuthStateChanged(auth, async (user) => { if (user) { currentUser = user; await loadUserData(user.uid); document.body.classList.add('authenticated'); initOnlineTracking(); renderCurrentPage(); } else { document.body.classList.remove('authenticated'); currentUser = null; userData = null; } });
        document.getElementById('signInBtn').addEventListener('click', handleSignIn);
        for (let i = 0; i < 40; i++) { const p = document.createElement('div'); p.className = 'particle'; p.style.width = Math.random() * 5 + 2 + 'px'; p.style.height = p.style.width; p.style.left = Math.random() * 100 + '%'; p.style.animationDuration = Math.random() * 15 + 8 + 's'; p.style.animationDelay = Math.random() * 10 + 's'; document.getElementById('particles')?.appendChild(p); }
    </script>
</body>
</html>
