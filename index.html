<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>ViewSwap - Watch & Earn</title>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, where, getDocs, increment, runTransaction, arrayUnion, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        window.firebaseModules = {
            initializeApp, getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged,
            getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, where, getDocs, increment, runTransaction, arrayUnion, deleteDoc
        };
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --primary-light: #a78bfa;
            --secondary: #ec489a;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --youtube: #ff0000;
            --dark: #0f0f0f;
            --gray-800: #1f1f1f;
            --gray-700: #2a2a2a;
            --gray-600: #3a3a3a;
            --gray-400: #9ca3af;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            min-height: 100vh;
            color: var(--white);
            position: relative;
            padding-bottom: 80px;
        }

        /* SIGN-IN OVERLAY - HIDES EVERYTHING UNTIL SIGN-IN */
        .signin-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0f 0%, #14141f 100%);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            transition: all 0.4s ease;
        }
        
        body.authenticated .signin-overlay {
            display: none;
        }
        
        #mainAppContent {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        
        body.authenticated #mainAppContent {
            opacity: 1;
            visibility: visible;
        }
        
        .signin-card {
            background: rgba(30, 30, 40, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 48px 32px;
            text-align: center;
            border: 1px solid rgba(139, 92, 246, 0.5);
            max-width: 420px;
            width: 90%;
            animation: fadeInUp 0.5s ease;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .google-signin-btn {
            background: linear-gradient(135deg, #4285f4, #34a853);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 1.1rem;
            transition: transform 0.2s;
            margin-top: 8px;
        }
        
        .google-signin-btn:active { transform: scale(0.97); }
        
        .status-badge {
            margin-top: 20px;
            padding: 10px;
            border-radius: 40px;
            font-size: 0.8rem;
            background: rgba(255,255,255,0.1);
        }
        
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .particle {
            position: absolute;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            animation: float linear infinite;
            opacity: 0.3;
        }
        
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            padding: 0 16px 20px;
        }
        
        .header {
            background: rgba(15, 15, 26, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 0 0 32px 32px;
            padding: 20px;
            margin: -16px -16px 20px -16px;
            text-align: center;
            border-bottom: 1px solid rgba(139, 92, 246, 0.3);
        }
        
        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #fff, var(--primary-light), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .credit-card {
            background: linear-gradient(135deg, rgba(30, 30, 40, 0.95), rgba(20, 20, 30, 0.95));
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid rgba(139, 92, 246, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .credit-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--warning));
        }
        
        .credit-amount {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-light), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 8px 0;
        }
        
        .daily-bonus {
            background: linear-gradient(135deg, var(--warning), #ea580c);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8rem;
        }
        
        .user-card {
            background: rgba(30, 30, 40, 0.9);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid var(--primary);
        }
        
        .signout-btn {
            background: var(--danger);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            border: none;
            color: white;
            cursor: pointer;
            margin-left: auto;
        }
        
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 15, 26, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 8px 16px 20px;
            border-top: 1px solid rgba(139, 92, 246, 0.3);
            max-width: 500px;
            margin: 0 auto;
            z-index: 100;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 40px;
            flex: 1;
            color: var(--gray-400);
            transition: all 0.2s;
        }
        
        .nav-item.active {
            color: white;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(236, 72, 153, 0.2));
        }
        
        .nav-icon { font-size: 1.5rem; }
        .nav-label { font-size: 0.65rem; font-weight: 600; }
        
        /* Cards */
        .card {
            background: rgba(30, 30, 40, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }
        
        .card h2 {
            font-size: 1.2rem;
            margin-bottom: 16px;
            border-left: 3px solid var(--primary);
            padding-left: 12px;
        }
        
        .campaign-item {
            background: rgba(35, 35, 45, 0.8);
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 12px;
        }
        
        .campaign-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 6px;
        }
        
        .campaign-url {
            font-size: 0.7rem;
            color: var(--primary-light);
            word-break: break-all;
            margin-bottom: 10px;
        }
        
        .campaign-reward {
            background: rgba(16, 185, 129, 0.2);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-bottom: 10px;
        }
        
        .watch-btn {
            background: linear-gradient(135deg, var(--youtube), #cc0000);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.85rem;
            transition: transform 0.2s;
        }
        
        .watch-btn:active { transform: scale(0.97); }
        .watch-btn.watched { background: var(--success); opacity: 0.7; cursor: default; }
        
        .badge-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 10px 0;
        }
        
        .badge {
            background: rgba(139, 92, 246, 0.2);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        
        .progress-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 6px;
            margin: 8px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s;
        }
        
        input, textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            background: rgba(35, 35, 45, 0.9);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 20px;
            color: white;
            font-size: 0.9rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        
        .btn-primary:active { transform: scale(0.97); }
        
        .referral-code-box {
            background: rgba(0,0,0,0.5);
            padding: 14px;
            border-radius: 16px;
            font-family: monospace;
            font-size: 1rem;
            text-align: center;
            margin: 12px 0;
            border: 2px dashed var(--primary);
            cursor: pointer;
        }
        
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 60px;
            z-index: 2000;
            animation: slideUp 0.3s ease;
            max-width: 90%;
            text-align: center;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--gray-400);
        }
        
        /* Chatbot Styles */
        .chat-container {
            background: rgba(25, 25, 35, 0.95);
            border-radius: 24px;
            overflow: hidden;
            margin-top: 8px;
        }
        
        .chat-messages {
            height: 320px;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
        }
        
        .message.bot { align-self: flex-start; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        
        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            flex-shrink: 0;
        }
        
        .message.user .message-avatar {
            background: var(--youtube);
        }
        
        .message-bubble {
            background: rgba(45, 45, 55, 0.9);
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 0.85rem;
            line-height: 1.4;
        }
        
        .message.user .message-bubble {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }
        
        .chat-input-area {
            display: flex;
            padding: 12px;
            background: rgba(20, 20, 28, 0.9);
            border-top: 1px solid rgba(139, 92, 246, 0.2);
            gap: 10px;
        }
        
        .chat-input {
            flex: 1;
            margin: 0;
            padding: 12px;
            font-size: 0.85rem;
        }
        
        .chat-send-btn {
            background: var(--primary);
            border: none;
            border-radius: 40px;
            padding: 0 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 12px;
        }
        
        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: var(--gray-400);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- SIGN-IN OVERLAY -->
    <div class="signin-overlay" id="signinOverlay">
        <div class="signin-card">
            <div style="font-size: 4rem;">🎬</div>
            <h2>ViewSwap</h2>
            <p>Watch YouTube Videos • Earn Credits • Get Real Views</p>
            <button class="google-signin-btn" id="signInBtn">
                🟢 Sign in with Google
            </button>
            <div class="status-badge">🔐 Sign in to start watching and earning</div>
        </div>
    </div>

    <!-- MAIN APP CONTENT -->
    <div id="mainAppContent">
        <div class="bg-particles" id="particles"></div>
        <div class="container">
            <div class="header">
                <h1>🎬 ViewSwap</h1>
                <p>Watch • Earn • Get Views</p>
            </div>

            <!-- User & Credits Bar -->
            <div class="credit-card">
                <div class="credit-label">💰 YOUR CREDITS</div>
                <div class="credit-amount" id="creditBalance">0</div>
                <button class="daily-bonus" id="dailyBonusBtn">🎁 Daily Bonus (+50)</button>
            </div>

            <div class="user-card">
                <div class="user-info">
                    <img id="userAvatar" class="user-avatar" src="">
                    <div style="flex: 1;">
                        <div id="userName" style="font-weight: bold;"></div>
                        <div id="userEmail" style="font-size: 0.7rem; color: var(--gray-400);"></div>
                    </div>
                    <button class="signout-btn" id="signOutBtn">Sign Out</button>
                </div>
            </div>

            <!-- Dynamic Page Content -->
            <div id="pageContent"></div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <button class="nav-item active" data-page="home">
                <div class="nav-icon">🏠</div>
                <div class="nav-label">Home</div>
            </button>
            <button class="nav-item" data-page="campaign">
                <div class="nav-icon">📢</div>
                <div class="nav-label">Campaign</div>
            </button>
            <button class="nav-item" data-page="refer">
                <div class="nav-icon">🤝</div>
                <div class="nav-label">Refer</div>
            </button>
            <button class="nav-item" data-page="help">
                <div class="nav-icon">💬</div>
                <div class="nav-label">Help</div>
            </button>
        </div>
    </div>

    <script type="module">
        const { initializeApp } = window.firebaseModules;
        const { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } = window.firebaseModules;
        const { getFirestore, doc, setDoc, getDoc, collection, query, getDocs, increment, runTransaction, arrayUnion, updateDoc } = window.firebaseModules;
        
        const firebaseConfig = {
            apiKey: "AIzaSyAupBkllyicDPD9O6CmX4mS4sF5z96mqxc",
            authDomain: "vertexpaste.firebaseapp.com",
            projectId: "vertexpaste",
            storageBucket: "vertexpaste.firebasestorage.app",
            messagingSenderId: "255275350380",
            appId: "1:255275350380:web:7be4e8add2cb5b04045b49"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        
        let currentUser = null;
        let userData = null;
        let currentPage = 'home';
        
        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
        
        function extractVideoId(url) {
            const regex = /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/;
            const match = url.match(regex);
            return match ? match[1] : null;
        }
        
        function openYouTube(url) {
            window.open(url, '_blank');
        }
        
        async function loadUserData(uid) {
            const ref = doc(db, 'users', uid);
            const snap = await getDoc(ref);
            if (snap.exists()) {
                userData = snap.data();
            } else {
                userData = {
                    uid, email: currentUser.email, displayName: currentUser.displayName,
                    photoURL: currentUser.photoURL, credits: 100,
                    referralCode: 'REF' + uid.substring(0,6).toUpperCase(),
                    referredBy: null, referralEarnings: 0, totalEarned: 0,
                    watchedVideos: [], campaigns: [],
                    lastDailyBonus: null, createdAt: new Date().toISOString()
                };
                await setDoc(ref, userData);
            }
            document.getElementById('creditBalance').innerText = Math.floor(userData.credits);
            return userData;
        }
        
        async function saveUserData() {
            if(currentUser) await setDoc(doc(db, 'users', currentUser.uid), userData, { merge: true });
            document.getElementById('creditBalance').innerText = Math.floor(userData.credits);
        }
        
        async function updateCredits(amount) {
            userData.credits += amount;
            if(amount > 0) userData.totalEarned += amount;
            await saveUserData();
            return true;
        }
        
        async function claimDailyBonus() {
            const last = userData.lastDailyBonus ? new Date(userData.lastDailyBonus) : null;
            const today = new Date();
            if(last && last.toDateString() === today.toDateString()) {
                showToast('Already claimed today!');
                return;
            }
            await updateCredits(50);
            userData.lastDailyBonus = today.toISOString();
            await saveUserData();
            showToast('🎁 Daily bonus +50 credits!');
            renderCurrentPage();
        }
        
        async function createCampaign(title, url, rewardPerView) {
            const videoId = extractVideoId(url);
            if (!videoId) { showToast('Invalid YouTube URL'); return false; }
            if (rewardPerView < 1 || rewardPerView > 100) { showToast('Reward must be 1-100 credits'); return false; }
            if (userData.campaigns?.some(c => c.videoId === videoId)) { showToast('Campaign exists for this video'); return false; }
            
            const campaign = {
                id: Date.now().toString(),
                title, url, videoId, rewardPerView,
                creatorId: currentUser.uid, creatorName: userData.displayName,
                createdAt: new Date().toISOString(), views: 0, watchers: []
            };
            
            userData.campaigns = userData.campaigns || [];
            userData.campaigns.push(campaign);
            await saveUserData();
            
            const campaignRef = doc(db, 'campaigns', campaign.id);
            await setDoc(campaignRef, campaign);
            
            showToast(`✅ Campaign created! Reward: ${rewardPerView} credits per view`);
            renderCurrentPage();
            return true;
        }
        
        async function watchCampaign(campaign) {
            if (userData.watchedVideos?.includes(campaign.videoId)) {
                showToast('You already watched this video!');
                return;
            }
            if (campaign.creatorId === currentUser.uid) {
                showToast("Can't watch your own video");
                return;
            }
            
            openYouTube(campaign.url);
            
            const reward = campaign.rewardPerView;
            await updateCredits(reward);
            showToast(`🎬 +${reward} credits! Video owner gets +1`);
            
            userData.watchedVideos = userData.watchedVideos || [];
            userData.watchedVideos.push(campaign.videoId);
            await saveUserData();
            
            const campaignRef = doc(db, 'campaigns', campaign.id);
            await updateDoc(campaignRef, { views: increment(1), watchers: arrayUnion(currentUser.uid) });
            
            const creatorRef = doc(db, 'users', campaign.creatorId);
            await runTransaction(db, async (transaction) => {
                const creatorSnap = await transaction.get(creatorRef);
                if (creatorSnap.exists()) {
                    transaction.update(creatorRef, { credits: increment(1), totalEarned: increment(1) });
                }
            });
            
            renderCurrentPage();
        }
        
        window.watchCampaign = watchCampaign;
        
        async function renderHome() {
            const campaignsQuery = query(collection(db, 'campaigns'));
            const snapshot = await getDocs(campaignsQuery);
            const allCampaigns = [];
            snapshot.forEach(doc => allCampaigns.push(doc.data()));
            
            const availableCampaigns = allCampaigns.filter(c => 
                c.creatorId !== currentUser?.uid && 
                !userData?.watchedVideos?.includes(c.videoId)
            );
            
            if (availableCampaigns.length === 0) {
                return `<div class="card"><h2>🎬 Videos to Watch</h2><div class="empty-state">No videos available. Create a campaign to get views!</div></div>`;
            }
            
            return `
                <div class="card">
                    <h2>🎬 Watch & Earn Credits</h2>
                    ${availableCampaigns.map(campaign => `
                        <div class="campaign-item">
                            <div class="campaign-title">${escapeHtml(campaign.title)}</div>
                            <div class="campaign-url">${escapeHtml(campaign.url)}</div>
                            <div class="campaign-reward">💰 ${campaign.rewardPerView} credits per watch</div>
                            <div class="badge-group">
                                <span class="badge">👁️ ${campaign.views || 0} views</span>
                                <span class="badge">👤 ${escapeHtml(campaign.creatorName || 'User')}</span>
                            </div>
                            <button class="watch-btn" onclick="window.watchCampaign(${JSON.stringify(campaign).replace(/"/g, '&quot;')})">
                                ▶️ Watch on YouTube
                            </button>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        function renderCampaignPage() {
            return `
                <div class="card">
                    <h2>📢 Create a Campaign</h2>
                    <p style="font-size: 0.7rem; margin-bottom: 12px; color: var(--gray-400);">Add your YouTube video to get views from other users</p>
                    <input type="text" id="campaignTitle" placeholder="Campaign title">
                    <input type="url" id="campaignUrl" placeholder="YouTube video URL">
                    <input type="number" id="rewardAmount" placeholder="Reward per view (credits)" value="5" min="1" max="100">
                    <button class="btn-primary" id="createCampaignBtn">🚀 Launch Campaign</button>
                </div>
                <div class="card">
                    <h2>📊 My Campaigns</h2>
                    <div id="myCampaignsList"></div>
                </div>
            `;
        }
        
        async function renderMyCampaigns() {
            const container = document.getElementById('myCampaignsList');
            if (!container) return;
            
            const myCampaigns = userData?.campaigns || [];
            if (myCampaigns.length === 0) {
                container.innerHTML = '<div class="empty-state">You haven\'t created any campaigns yet</div>';
                return;
            }
            
            container.innerHTML = myCampaigns.map(campaign => `
                <div class="campaign-item">
                    <div class="campaign-title">${escapeHtml(campaign.title)}</div>
                    <div class="campaign-url">${escapeHtml(campaign.url)}</div>
                    <div class="campaign-reward">💎 ${campaign.rewardPerView} credits per view</div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${Math.min((campaign.views || 0) * 2, 100)}%"></div></div>
                    <div class="badge-group">
                        <span class="badge">👁️ ${campaign.views || 0} views</span>
                        <span class="badge">👥 ${campaign.watchers?.length || 0} watchers</span>
                    </div>
                </div>
            `).join('');
        }
        
        function renderReferPage() {
            return `
                <div class="card">
                    <h2>🤝 Referral Program</h2>
                    <div style="background: linear-gradient(135deg, var(--warning), #ea580c); border-radius: 20px; padding: 16px; text-align: center; margin-bottom: 16px;">
                        🎁 5% Commission on all referral earnings!
                    </div>
                    <div style="background: rgba(139,92,246,0.1); border-radius: 20px; padding: 20px; text-align: center;">
                        <div style="font-size: 0.7rem; color: var(--gray-400);">Your Referral Code</div>
                        <div class="referral-code-box" id="referralCodeDisplay">${userData?.referralCode || ''}</div>
                        <button class="btn-primary" id="copyReferralBtn">📋 Copy Code</button>
                    </div>
                    <div style="background: rgba(139,92,246,0.1); border-radius: 20px; padding: 20px; text-align: center; margin-top: 12px;">
                        <div style="font-size: 0.7rem; color: var(--gray-400);">Commission Earned</div>
                        <div style="font-size: 2rem; font-weight: bold; color: var(--primary);">${(userData?.referralEarnings || 0).toFixed(2)}</div>
                        <div style="font-size: 0.7rem;">credits from referrals</div>
                    </div>
                </div>
                <div class="card">
                    <h2>📋 How to Refer</h2>
                    <p style="line-height: 1.6;">Share your referral code with friends. When they sign up and earn credits, you get 5% of everything they earn! The more they earn, the more you get!</p>
                </div>
            `;
        }
        
        // Advanced Chatbot for Help Page
        function renderHelpPage() {
            return `
                <div class="card">
                    <h2>💬 ViewSwap Assistant</h2>
                    <p style="font-size: 0.75rem; margin-bottom: 12px; color: var(--gray-400);">Ask me anything about ViewSwap!</p>
                    <div class="chat-container">
                        <div class="chat-messages" id="chatMessages">
                            <div class="message bot">
                                <div class="message-avatar">🤖</div>
                                <div class="message-bubble">Hi! I'm your ViewSwap assistant. Ask me about:<br>• How to earn credits<br>• Creating campaigns<br>• Watching videos<br>• Referral program<br>• Daily bonuses</div>
                            </div>
                        </div>
                        <div class="chat-input-area">
                            <input type="text" class="chat-input" id="chatInput" placeholder="Type your question..." onkeypress="if(event.key==='Enter') sendChatMessage()">
                            <button class="chat-send-btn" onclick="sendChatMessage()">Send</button>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <h2>❓ Quick Answers</h2>
                    <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                        <button class="badge" style="cursor: pointer;" onclick="quickQuestion('how to earn')">💰 How to earn?</button>
                        <button class="badge" style="cursor: pointer;" onclick="quickQuestion('create campaign')">📢 Create campaign</button>
                        <button class="badge" style="cursor: pointer;" onclick="quickQuestion('watch videos')">👀 Watch videos</button>
                        <button class="badge" style="cursor: pointer;" onclick="quickQuestion('referral')">🤝 Referral program</button>
                        <button class="badge" style="cursor: pointer;" onclick="quickQuestion('daily bonus')">🎁 Daily bonus</button>
                    </div>
                </div>
            `;
        }
        
        // Chatbot intelligence
        window.sendChatMessage = function() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;
            
            addChatMessage(message, 'user');
            input.value = '';
            
            setTimeout(() => {
                const response = getBotResponse(message.toLowerCase());
                addChatMessage(response, 'bot');
            }, 500);
        };
        
        window.quickQuestion = function(question) {
            addChatMessage(question, 'user');
            setTimeout(() => {
                const response = getBotResponse(question.toLowerCase());
                addChatMessage(response, 'bot');
            }, 300);
        };
        
        function getBotResponse(question) {
            if (question.includes('earn') || question.includes('credit')) {
                return "💰 You earn credits by watching other users' videos! Each video gives you the reward amount set by the creator. You also get a +50 credit daily bonus. Referrals give you 5% commission!";
            }
            if (question.includes('create') || question.includes('campaign')) {
                return "📢 Go to the Campaign tab, enter your YouTube video URL, set a reward per view (1-100 credits), and launch! Other users will watch your video and you earn 1 credit per view plus engagement!";
            }
            if (question.includes('watch') || question.includes('view')) {
                return "👀 On the Home tab, you'll see all available videos. Click 'Watch on YouTube' - it opens YouTube in a new tab. After watching, you automatically earn credits! Each video can only be watched once.";
            }
            if (question.includes('refer') || question.includes('referral')) {
                return "🤝 Share your unique referral code with friends. When they sign up and earn credits, you get 5% of everything they earn forever! The more active your referrals, the more you earn!";
            }
            if (question.includes('daily') || question.includes('bonus')) {
                return "🎁 Every day you can claim a free +50 credit bonus! Just click the 'Daily Bonus' button at the top of the app. Resets every 24 hours.";
            }
            if (question.includes('how') || question.includes('start')) {
                return "🚀 To get started: 1) Watch videos on Home to earn credits 2) Create your own campaign in Campaign tab 3) Share your referral code to earn commissions! Simple as that!";
            }
            return "💡 Here are some things you can ask: 'how to earn credits', 'create campaign', 'watch videos', 'referral program', 'daily bonus'. Try one!";
        }
        
        function addChatMessage(text, sender) {
            const container = document.getElementById('chatMessages');
            if (!container) return;
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            messageDiv.innerHTML = `
                <div class="message-avatar">${sender === 'bot' ? '🤖' : '👤'}</div>
                <div class="message-bubble">${escapeHtml(text)}</div>
            `;
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        async function renderCurrentPage() {
            const container = document.getElementById('pageContent');
            if (!container) return;
            
            if (currentPage === 'home') {
                container.innerHTML = await renderHome();
            } else if (currentPage === 'campaign') {
                container.innerHTML = renderCampaignPage();
                document.getElementById('createCampaignBtn')?.addEventListener('click', async () => {
                    const title = document.getElementById('campaignTitle')?.value;
                    const url = document.getElementById('campaignUrl')?.value;
                    const reward = parseInt(document.getElementById('rewardAmount')?.value);
                    if (!title || !url) { showToast('Enter title and URL'); return; }
                    await createCampaign(title, url, reward);
                    document.getElementById('campaignTitle').value = '';
                    document.getElementById('campaignUrl').value = '';
                    await renderMyCampaigns();
                });
                await renderMyCampaigns();
            } else if (currentPage === 'refer') {
                container.innerHTML = renderReferPage();
                document.getElementById('copyReferralBtn')?.addEventListener('click', () => {
                    navigator.clipboard.writeText(userData?.referralCode || '');
                    showToast('Referral code copied!');
                });
                document.getElementById('referralCodeDisplay')?.addEventListener('click', () => {
                    navigator.clipboard.writeText(userData?.referralCode || '');
                    showToast('Referral code copied!');
                });
            } else if (currentPage === 'help') {
                container.innerHTML = renderHelpPage();
            }
        }
        
        // Navigation
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', () => {
                currentPage = btn.dataset.page;
                document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderCurrentPage();
            });
        });
        
        // Auth
        async function handleSignIn() {
            try {
                const result = await signInWithPopup(auth, provider);
                showToast(`Welcome ${result.user.displayName}!`);
            } catch(e) { showToast('Sign in failed'); }
        }
        
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await loadUserData(user.uid);
                document.getElementById('userAvatar').src = user.photoURL || 'https://via.placeholder.com/50';
                document.getElementById('userName').textContent = user.displayName || 'User';
                document.getElementById('userEmail').textContent = user.email;
                document.body.classList.add('authenticated');
                renderCurrentPage();
            } else {
                document.body.classList.remove('authenticated');
                currentUser = null;
                userData = null;
            }
        });
        
        document.getElementById('signInBtn').addEventListener('click', handleSignIn);
        document.getElementById('signOutBtn').addEventListener('click', async () => { await signOut(auth); showToast('Signed out'); });
        document.getElementById('dailyBonusBtn').addEventListener('click', async () => { if (userData) await claimDailyBonus(); });
        
        // Particles
        for (let i = 0; i < 40; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.width = Math.random() * 5 + 2 + 'px';
            p.style.height = p.style.width;
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = Math.random() * 15 + 8 + 's';
            p.style.animationDelay = Math.random() * 10 + 's';
            document.getElementById('particles')?.appendChild(p);
        }
    </script>
</body>
</html>
