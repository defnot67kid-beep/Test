<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>ViewSwap — Premium Video Rewards</title>
    
    <!-- External Libraries -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div style="display: none;" id="temp-player"></div>
    
    <!-- Sign In Overlay -->
    <div class="signin-overlay" id="signinOverlay">
        <div class="signin-card" id="signinCard">
            <div style="font-size: 3.5rem;">🏆</div>
            <h2>ViewSwap</h2>
            <p>Watch Videos • Earn Credits • 2.5% referral + 0.09% platform fee</p>
            <button class="google-signin-btn" id="signInBtn">🟢 Sign in with Google</button>
            <div style="margin: 12px 0 8px; font-weight: 600; color:white;">OR</div>
            <button class="email-signin-btn" id="showEmailAuthBtn">✉️ Sign in with Email</button>
            <div id="emailAuthPanel" style="display: none; margin-top: 16px;">
                <input type="email" id="emailInput" placeholder="Email" class="auth-input">
                <input type="password" id="passwordInput" placeholder="Password" class="auth-input">
                <div id="authErrorMsg" class="error-text"></div>
                <button id="emailSignInBtn" class="btn-primary">Sign In</button>
                <button id="emailSignUpBtn" class="btn-secondary">Create Account</button>
                <div class="toggle-auth" id="backToGoogleBtn">← Back</div>
            </div>
            <button class="qr-signin-btn" id="qrSignInBtn">📷 Scan QR Code</button>
            <div style="margin-top: 20px;">
                <input type="text" id="referralCodeInput" placeholder="Enter Referral Code" style="color:#1a1a2e;">
                <button id="applyReferralBtn" class="btn-secondary" style="margin-top:0;">Apply Code</button>
            </div>
        </div>
    </div>

    <!-- Main App Content -->
    <div id="mainAppContent">
        <div class="container">
            <div class="header">
                <h1>🏆 ViewSwap</h1>
                <p>⚡ Viewers earn 0.5/sec | Campaigns cost 0.19/sec</p>
            </div>
            <div id="pageContent"></div>
        </div>
        <div class="nav-wrapper">
            <div class="bottom-nav">
                <button class="nav-item active" data-page="home"><div class="nav-icon">🏠</div><div class="nav-label">Home</div></button>
                <button class="nav-item" data-page="campaign"><div class="nav-icon">📢</div><div class="nav-label">Campaigns</div></button>
                <button class="nav-item" data-page="rewards"><div class="nav-icon">🏆</div><div class="nav-label">Achievements</div></button>
                <button class="nav-item" data-page="account"><div class="nav-icon">👤</div><div class="nav-label">Profile</div></button>
                <button class="nav-item" data-page="refer"><div class="nav-icon">🤝</div><div class="nav-label">Refer</div></button>
                <button class="nav-item admin-only" data-page="admin" style="display: none;"><div class="nav-icon">👑</div><div class="nav-label">Admin</div></button>
            </div>
        </div>
    </div>

    <div id="notificationContainer"></div>

    <script type="module" src="script.js"></script>
</body>
</html>
