<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>ViewSwap — Advanced Campaign Builder</title>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, getDocs, increment, runTransaction, arrayUnion, onSnapshot, serverTimestamp, where, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        window.firebaseModules = {
            initializeApp, getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged,
            getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, getDocs, increment, runTransaction, arrayUnion, onSnapshot, serverTimestamp, where, addDoc, deleteDoc
        };
    </script>
    
    <!-- QR Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --primary-light: #a78bfa;
            --secondary: #ec489a;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #0f0f0f;
            --gray-800: #1f1f1f;
            --gray-700: #2a2a2a;
            --gray-600: #3a3a3a;
            --gray-400: #9ca3af;
            --white: #ffffff;
            --gold: #fbbf24;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            min-height: 100vh;
            color: var(--white);
            position: relative;
            padding-bottom: 80px;
        }

        .signin-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0f 0%, #14141f 100%);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }
        
        body.authenticated .signin-overlay { display: none; }
        
        #mainAppContent {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        
        body.authenticated #mainAppContent {
            opacity: 1;
            visibility: visible;
        }
        
        .signin-card {
            background: rgba(30, 30, 40, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 48px 32px;
            text-align: center;
            border: 1px solid rgba(139, 92, 246, 0.5);
            max-width: 420px;
            width: 90%;
            animation: fadeInUp 0.5s ease;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .google-signin-btn, .qr-signin-btn {
            background: linear-gradient(135deg, #4285f4, #34a853);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            transition: transform 0.2s;
            margin-top: 12px;
            width: 100%;
            justify-content: center;
        }
        
        .qr-signin-btn {
            background: linear-gradient(135deg, #8b5cf6, #ec489a);
        }
        
        .google-signin-btn:active, .qr-signin-btn:active { transform: scale(0.97); }
        
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .particle {
            position: absolute;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            animation: float linear infinite;
            opacity: 0.3;
        }
        
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            padding: 0 16px 20px;
        }
        
        .header {
            background: rgba(15, 15, 26, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 0 0 32px 32px;
            padding: 20px;
            margin: -16px -16px 20px -16px;
            text-align: center;
            border-bottom: 1px solid rgba(139, 92, 246, 0.3);
        }
        
        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #fff, var(--primary-light), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .online-badge {
            background: rgba(16, 185, 129, 0.2);
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.7rem;

            margin-top: 8px;
            border: 1px solid var(--success);
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 15, 26, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 8px 8px 20px;
            border-top: 1px solid rgba(139, 92, 246, 0.3);
            max-width: 500px;
            margin: 0 auto;
            z-index: 100;
            overflow-x: auto;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 40px;
            flex: 1;
            color: var(--gray-400);
            transition: all 0.2s;
            min-width: 60px;
        }
        
        .nav-item.active {
            color: white;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(236, 72, 153, 0.2));
        }
        
        .nav-icon { font-size: 1.3rem; }
        .nav-label { font-size: 0.6rem; font-weight: 600; }
        
        .card {
            background: rgba(30, 30, 40, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }
        
        .card h2 {
            font-size: 1.2rem;
            margin-bottom: 16px;
            border-left: 3px solid var(--primary);
            padding-left: 12px;
        }
        
        .campaign-form-group {
            margin-bottom: 16px;
        }
        
        .campaign-form-group label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 6px;
            color: var(--gray-400);
        }
        
        .campaign-form-group input, .campaign-form-group textarea {
            width: 100%;
            padding: 12px;
            background: rgba(20,20,30,0.8);
            border: 1px solid rgba(139,92,246,0.4);

        }
        
        .campaign-form-group textarea {
            resize: vertical;
            min-height: 60px;
        }
        
        .premium-badge {
            background: linear-gradient(135deg, var(--gold), #f59e0b);
            color: #000;
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 20px;

            font-weight: bold;
        }
        
        .info-tooltip {
            font-size: 0.7rem;
            color: var(--primary-light);
            margin-top: 4px;
        }
        
        .achievement-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .achievement-card {
            background: rgba(35, 35, 45, 0.8);
            border-radius: 20px;
            padding: 14px 10px;
            text-align: center;
            transition: all 0.2s;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }
        
        .achievement-card.unlocked {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(236, 72, 153, 0.2));
            border-color: var(--primary);
        }
        
        .streak-card {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(234, 88, 12, 0.2));
            border-radius: 28px;
            padding: 20px;
            text-align: center;
            margin-bottom: 16px;
            border: 1px solid var(--warning);
        }
        
        .streak-number { font-size: 2.5rem; font-weight: 800; color: var(--warning); }
        .daily-bonus-btn {
            background: linear-gradient(135deg, var(--warning), #ea580c);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 12px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, var(--gray-700), var(--gray-600));
            color: white;
            border: none;
            padding: 10px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }
        
        .campaign-item {
            background: rgba(35, 35, 45, 0.8);
            border-radius: 18px;
            padding: 14px;
            margin-bottom: 12px;
        }
        
        .badge {
            background: rgba(139, 92, 246, 0.2);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            display: inline-block;
        }
        
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            padding: 10px 18px;
            border-radius: 60px;
            z-index: 2000;
            animation: slideUp 0.3s ease;
            max-width: 90%;
            text-align: center;
            font-size: 0.85rem;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        .empty-state { text-align: center; padding: 30px; color: var(--gray-400); }
        
        .qr-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 10001;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        
        .close-qr {
            background: var(--danger);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            margin-top: 24px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .referral-code-box {
            background: rgba(0,0,0,0.5);
            padding: 12px;
            border-radius: 16px;
            font-family: monospace;
            text-align: center;
            border: 2px dashed var(--primary);
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .account-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid var(--primary);
        }
        
        .account-info {
            text-align: center;
        }
        
        .signout-btn-lg {
            background: var(--danger);
            padding: 12px;
            border-radius: 60px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 16px;
        }
        
        .qr-code-display {
            background: white;
            padding: 20px;
            border-radius: 20px;
            display: inline-block;
            margin: 10px 0;
        }

</head>
<body>
    <div class="signin-overlay" id="signinOverlay">
        <div class="signin-card">
            <div style="font-size: 3.5rem;">🏆</div>
            <h2>ViewSwap</h2>
            <p>Advanced Campaign Builder</p>
            <button class="google-signin-btn" id="signInBtn">🟢 Sign in with Google</button>
            <button class="qr-signin-btn" id="qrSignInBtn">📷 Scan QR Code to Refer</button>
        </div>
    </div>

    <div id="mainAppContent">
        <div class="bg-particles" id="particles"></div>
        <div class="container">
            <div class="header">
                <h1>🎬 ViewSwap</h1>
                <p>Smart Campaign Analytics</p>
                <div class="online-badge" id="onlineCountBadge">👥 Loading...</div>
            </div>
            <div id="pageContent"></div>
        </div>
        <div class="bottom-nav">
            <button class="nav-item active" data-page="home"><div class="nav-icon">🏠</div><div class="nav-label">Home</div></button>
            <button class="nav-item" data-page="campaign"><div class="nav-icon">📢</div><div class="nav-label">Create</div></button>
            <button class="nav-item" data-page="rewards"><div class="nav-icon">🎁</div><div class="nav-label">Rewards</div></button>
            <button class="nav-item" data-page="account"><div class="nav-icon">👤</div><div class="nav-label">Account</div></button>
            <button class="nav-item" data-page="refer"><div class="nav-icon">🤝</div><div class="nav-label">Refer</div></button>
        </div>
    </div>

    <script type="module">
        const { initializeApp } = window.firebaseModules;
        const { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } = window.firebaseModules;
        const { getFirestore, doc, setDoc, getDoc, collection, query, getDocs, increment, runTransaction, arrayUnion, updateDoc, onSnapshot, serverTimestamp, where, addDoc, deleteDoc } = window.firebaseModules;
        
        const firebaseConfig = {
            apiKey: "AIzaSyAupBkllyicDPD9O6CmX4mS4sF5z96mqxc",
            authDomain: "vertexpaste.firebaseapp.com",
            projectId: "vertexpaste",
            storageBucket: "vertexpaste.firebasestorage.app",
            messagingSenderId: "255275350380",
            appId: "1:255275350380:web:7be4e8add2cb5b04045b49"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        
        let currentUser = null;
        let userData = null;
        let currentPage = 'home';
        let activeUsersCount = 0;
        
        // Track online users count
        onSnapshot(collection(db, 'viewswap_online'), (snap) => {
            activeUsersCount = snap.size;
            const badge = document.getElementById('onlineCountBadge');
            if (badge) badge.innerHTML = `👥 ${activeUsersCount} active`;
        });
        
        function showToast(msg, isWarning = false) {
            const t = document.createElement('div');
            t.className = 'toast';
            if (isWarning) t.style.background = 'rgba(239,68,68,0.95)';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
        
        function extractVideoId(url) {
            const regex = /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/;
            const match = url.match(regex);
            return match ? match[1] : null;
        }
        
        function isValidYoutubeUrl(url) {
            return url.includes('youtube.com') || url.includes('youtu.be');
        }
        
        function isValidChannelUrl(url) {
            return url.includes('youtube.com/@') || url.includes('youtube.com/channel/');
        }
        
        function generateQRCodeURL(data) {
            return `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(data)}`;
        }
        
        async function loadUserData(uid) {
            const ref = doc(db, 'viewswap_users', uid);
            const snap = await getDoc(ref);
            if (snap.exists()) {
                userData = snap.data();
                userData.achievements = userData.achievements || {};
                userData.streak = userData.streak || { current: 0, lastClaim: null, highest: 0 };
                userData.campaigns = userData.campaigns || [];
                userData.watchedVideos = userData.watchedVideos || [];
                userData.referrals = userData.referrals || [];
                userData.referralEarnings = userData.referralEarnings || 0;
            } else {
                userData = {
                    uid, email: currentUser.email, displayName: currentUser.displayName,
                    photoURL: currentUser.photoURL, credits: 100,
                    referralCode: 'REF' + uid.substring(0,8).toUpperCase(),
                    referredBy: null, referralEarnings: 0, totalEarned: 0,
                    watchedVideos: [], campaigns: [],
                    achievements: {}, streak: { current: 0, lastClaim: null, highest: 0 },
                    createdAt: new Date().toISOString()
                };
                await setDoc(ref, userData);
            }
            return userData;
        }
        
        async function saveUserData() {
            if(currentUser) await setDoc(doc(db, 'viewswap_users', currentUser.uid), userData, { merge: true });
        }
        
        async function updateCredits(amount, source = 'generic') {
            userData.credits = (userData.credits || 0) + amount;
            if(amount > 0) userData.totalEarned = (userData.totalEarned || 0) + amount;
            await saveUserData();
            return true;
        }
        
        // ADVANCED CAMPAIGN CREATION
        async function createAdvancedCampaign(campaignData) {
            if (userData.credits < 15) {
                showToast('Need 15 credits to create campaign', true);
                return false;
            }
            
            // Validate YouTube URL
            if (!isValidYoutubeUrl(campaignData.videoUrl)) {
                showToast('Invalid YouTube video URL', true);
                return false;
            }
            
            const videoId = extractVideoId(campaignData.videoUrl);
            if (!videoId) {
                showToast('Could not extract video ID', true);
                return false;
            }
            
            // Validate max values based on active users
            const maxPossible = activeUsersCount || 10;
            const requestedViews = parseInt(campaignData.targetViews) || 0;
            const requestedWatchTime = parseInt(campaignData.targetWatchTime) || 0;
            const requestedLikes = parseInt(campaignData.targetLikes) || 0;
            const requestedSubs = parseInt(campaignData.targetSubs) || 0;
            
            if (requestedViews > maxPossible) {
                showToast(`Max views cannot exceed ${maxPossible} (active users)`, true);
                return false;
            }
            if (requestedLikes > maxPossible) {
                showToast(`Max likes cannot exceed ${maxPossible}`, true);
                return false;
            }
            if (requestedSubs > maxPossible) {
                showToast(`Max subscribers cannot exceed ${maxPossible}`, true);
                return false;
            }
            
            // Validate channel URL if subscribe requested
            let channelUrl = campaignData.channelUrl || '';
            if (requestedSubs > 0 && !isValidChannelUrl(channelUrl) && !channelUrl.includes('youtube.com')) {
                showToast('Subscribe feature requires a valid YouTube channel URL', true);
                return false;
            }
            
            // Calculate cost (hidden formula)
            const baseCost = 15;
            const viewsCost = requestedViews * 0.5;
            const watchTimeCost = requestedWatchTime * 0.3;
            const likesCost = requestedLikes * 0.8;
            const subsCost = requestedSubs * 1.2;
            const commentsCost = (campaignData.customComments?.length > 0 ? 10 : 0);
            const totalCost = Math.floor(baseCost + viewsCost + watchTimeCost + likesCost + subsCost + commentsCost);
            
            if (userData.credits < totalCost) {
                showToast(`Need ${totalCost} credits for this campaign`, true);
                return false;
            }
            
            // Deduct credits
            await updateCredits(-totalCost, 'create_campaign');
            
            // Create campaign object
            const campaign = {
                id: Date.now().toString(),
                title: campaignData.title,
                videoUrl: campaignData.videoUrl,
                videoId: videoId,
                channelUrl: channelUrl,
                creatorId: currentUser.uid,
                creatorName: userData.displayName,
                createdAt: serverTimestamp(),
                // Targets
                targetViews: requestedViews,
                targetWatchTime: requestedWatchTime,
                targetLikes: requestedLikes,
                targetSubs: requestedSubs,
                customComments: campaignData.customComments || [],
                commentCountTarget: parseInt(campaignData.commentCountTarget) || 0,
                // Current stats
                currentViews: 0,
                currentWatchTime: 0,
                currentLikes: 0,
                currentSubs: 0,
                currentComments: 0,
                // Reward multipliers (hidden from UI)
                viewReward: 10,
                watchTimeRewardPerSec: 1.9,
                likeReward: 2.8,
                status: 'active'
            };
            
            // Save to Firestore
            const campaignRef = await addDoc(collection(db, 'advanced_campaigns'), campaign);
            campaign.firestoreId = campaignRef.id;
            
            userData.campaigns = userData.campaigns || [];
            userData.campaigns.push({ id: campaign.id, title: campaign.title, createdAt: new Date().toISOString() });
            await saveUserData();
            
            showToast(`✅ Campaign "${campaignData.title}" created! Cost: ${totalCost} credits`);
            renderCurrentPage();
            return true;
        }
        
        // Watch campaign with advanced rewards
        async function engageWithCampaign(campaign) {
            if (userData.watchedVideos?.includes(campaign.videoId)) {
                showToast('Already engaged with this campaign', true);
                return;
            }
            
            if (campaign.creatorId === currentUser.uid) {
                showToast("Can't engage with your own campaign", true);
                return;
            }
            
            // Open YouTube content
            window.open(campaign.videoUrl, '_blank');
            
            // Random reward multipliers (special events - hidden)
            const eventMultiplier = Math.random() > 0.9 ? 2 : 1;
            
            // Calculate earnings based on campaign targets
            let totalEarned = 0;
            
            // Views reward
            if (campaign.currentViews < campaign.targetViews) {
                const viewReward = Math.floor(campaign.viewReward * eventMultiplier);
                totalEarned += viewReward;
                await updateDoc(doc(db, 'advanced_campaigns', campaign.firestoreId), {
                    currentViews: increment(1)
                });
            }
            
            // Watch time reward (simulate 5-30 sec watch)
            const watchSeconds = Math.floor(Math.random() * 25) + 5;
            const watchReward = Math.floor(watchSeconds * campaign.watchTimeRewardPerSec * eventMultiplier);
            totalEarned += watchReward;
            await updateDoc(doc(db, 'advanced_campaigns', campaign.firestoreId), {
                currentWatchTime: increment(watchSeconds)
            });
            
            // Like reward (random chance to like)
            if (Math.random() > 0.6 && campaign.currentLikes < campaign.targetLikes) {
                const likeReward = Math.floor(campaign.likeReward * eventMultiplier);
                totalEarned += likeReward;
                await updateDoc(doc(db, 'advanced_campaigns', campaign.firestoreId), {
                    currentLikes: increment(1)
                });
            }
            
            // Subscribe reward (if channel URL exists)
            if (campaign.channelUrl && campaign.currentSubs < campaign.targetSubs && Math.random() > 0.7) {
                const subReward = Math.floor(5 * eventMultiplier);
                totalEarned += subReward;
                await updateDoc(doc(db, 'advanced_campaigns', campaign.firestoreId), {
                    currentSubs: increment(1)
                });
                showToast(`🔔 Subscribed! +${subReward} credits`);
            }
            
            // Comment reward (premium feature)
            if (campaign.customComments?.length > 0 && campaign.currentComments < campaign.commentCountTarget && Math.random() > 0.8) {
                const commentReward = Math.floor(8 * eventMultiplier);
                totalEarned += commentReward;
                await updateDoc(doc(db, 'advanced_campaigns', campaign.firestoreId), {
                    currentComments: increment(1)
                });
            }
            
            // Add to watched list and update credits
            userData.watchedVideos = userData.watchedVideos || [];
            userData.watchedVideos.push(campaign.videoId);
            await updateCredits(totalEarned, 'engagement');
            
            // Referral commission
            if (userData.referredBy && totalEarned > 0) {
                const commission = Math.floor(totalEarned * 0.05);
                if (commission > 0) {
                    const uplineRef = doc(db, 'viewswap_users', userData.referredBy);
                    await runTransaction(db, async (transaction) => {
                        const uplineSnap = await transaction.get(uplineRef);
                        if (uplineSnap.exists()) {
                            transaction.update(uplineRef, { 
                                referralEarnings: increment(commission),
                                credits: increment(commission)
                            });
                        }
                    });
                }
            }
            
            // Reward creator (10% of earnings)
            const creatorRef = doc(db, 'viewswap_users', campaign.creatorId);
            await runTransaction(db, async (transaction) => {
                const creatorSnap = await transaction.get(creatorRef);
                if (creatorSnap.exists()) {
                    const creatorEarn = Math.floor(totalEarned * 0.1);
                    transaction.update(creatorRef, { credits: increment(creatorEarn), totalEarned: increment(creatorEarn) });
                }
            });
            
            await saveUserData();
            showToast(`🎉 Earned ${totalEarned} credits! ${eventMultiplier > 1 ? '⭐ EVENT BONUS!' : ''}`);
            renderCurrentPage();
        }
        
        window.engageWithCampaign = engageWithCampaign;
        
        // Render functions
        async function renderHome() {
            const campaignsQuery = query(collection(db, 'advanced_campaigns'));
            const snapshot = await getDocs(campaignsQuery);
            const allCampaigns = [];
            snapshot.forEach(doc => allCampaigns.push({ ...doc.data(), firestoreId: doc.id }));
            const available = allCampaigns.filter(c => c.creatorId !== currentUser?.uid && !userData?.watchedVideos?.includes(c.videoId));
            
            return `
                <div class="streak-card">
                    <div>🔥 Current Streak</div>
                    <div class="streak-number">${userData?.streak?.current || 0} days</div>
                    <button class="daily-bonus-btn" id="dailyBonusBtn">🎁 Claim Daily Bonus</button>
                </div>
                <div class="card">
                    <h2>🎬 Active Campaigns</h2>
                    ${available.length === 0 ? '<div class="empty-state">No active campaigns. Create one!</div>' : 
                        available.map(c => `
                            <div class="campaign-item">
                                <div style="font-weight: bold;">${escapeHtml(c.title)}</div>
                                <div class="badge">👁️ ${c.currentViews || 0}/${c.targetViews} views</div>
                                <div class="badge">⏱️ ${Math.floor(c.currentWatchTime || 0)}/${c.targetWatchTime}s</div>
                                <div class="badge">❤️ ${c.currentLikes || 0}/${c.targetLikes} likes</div>
                                ${c.targetSubs > 0 ? `<div class="badge">🔔 ${c.currentSubs || 0}/${c.targetSubs} subs</div>` : ''}
                                <button class="btn-primary" onclick="window.engageWithCampaign(${JSON.stringify(c).replace(/"/g, '&quot;')})">🎬 Engage & Earn</button>
                            </div>
                        `).join('')
                    }
                </div>
            `;
        }
        
        function renderCampaignPage() {
            const maxPossible = activeUsersCount || 10;
            return `
                <div class="card">
                    <h2>📢 Create Advanced Campaign <span style="font-size:0.7rem;">(15+ credits)</span></h2>
                    <div class="campaign-form-group">
                        <label>Campaign Title *</label>
                        <input type="text" id="campTitle" placeholder="e.g., Epic Gaming Montage">
                    </div>
                    <div class="campaign-form-group">
                        <label>YouTube Video URL *</label>
                        <input type="text" id="campVideoUrl" placeholder="https://youtube.com/watch?v=...">
                        <div class="info-tooltip">🎥 YouTube videos, shorts, or live streams</div>
                    </div>
                    <div class="campaign-form-group">
                        <label>🎯 Target Views (max ${maxPossible})</label>
                        <input type="number" id="campViews" min="0" max="${maxPossible}" value="5">
                    </div>
                    <div class="campaign-form-group">
                        <label>⏱️ Target Watch Time (seconds)</label>
                        <input type="number" id="campWatchTime" min="0" value="30">
                        <div class="info-tooltip">Cannot exceed video length (auto-limited)</div>
                    </div>
                    <div class="campaign-form-group">
                        <label>❤️ Target Likes (max ${maxPossible})</label>
                        <input type="number" id="campLikes" min="0" max="${maxPossible}" value="3">
                    </div>
                    <div class="campaign-form-group">
                        <label>🔔 Subscribe Target (requires channel URL) <span class="premium-badge">Premium</span></label>
                        <input type="number" id="campSubs" min="0" max="${maxPossible}" value="0">
                        <input type="text" id="campChannelUrl" placeholder="YouTube channel URL (if subscribing)">
                    </div>
                    <div class="campaign-form-group">
                        <label>💬 Custom Comments (one per line) <span class="premium-badge">Premium</span></label>
                        <textarea id="campComments" rows="2" placeholder="Great video!&#10;Awesome content!&#10;Keep it up!"></textarea>
                    </div>
                    <div class="campaign-form-group">
                        <label>📝 Comment Count Target <span class="premium-badge">Premium</span></label>
                        <input type="number" id="campCommentTarget" min="0" max="${maxPossible}" value="0">
                    </div>
                    <button class="btn-primary" id="createAdvancedBtn">🚀 Launch Campaign</button>
                </div>
            `;
        }
        
        function renderRewardsPage() {
            return `
                <div class="card">
                    <h2>🏆 Achievements</h2>
                    <div class="achievement-grid">
                        ${Object.entries({
                            'First Campaign': '🎬', '10 Engagements': '⚡', 'Referral Master': '🤝', 'Streak Hero': '🔥'
                        }).map(([name, icon]) => `<div class="achievement-card"><div class="achievement-icon">${icon}</div><div class="achievement-name">${name}</div><div class="achievement-reward">Coming Soon</div></div>`).join('')}
                    </div>
                </div>
                <div class="card">
                    <h2>📊 Your Stats</h2>
                    <div class="stat-row"><span>💰 Credits:</span><span style="color:var(--gold);">${Math.floor(userData?.credits || 0)}</span></div>
                    <div class="stat-row"><span>🏆 Total Earned:</span><span>${Math.floor(userData?.totalEarned || 0)}</span></div>
                    <div class="stat-row"><span>📢 Campaigns Created:</span><span>${userData?.campaigns?.length || 0}</span></div>
                    <div class="stat-row"><span>👀 Videos Engaged:</span><span>${userData?.watchedVideos?.length || 0}</span></div>
                </div>
            `;
        }
        
        function renderAccountPage() {
            const qrUrl = generateQRCodeURL(`VIEWSWAP_REF:${userData?.referralCode}`);
            return `
                <div class="card">
                    <div class="account-info">
                        <img src="${currentUser?.photoURL}" class="account-avatar">
                        <div style="font-weight:bold; margin-top:10px;">${escapeHtml(currentUser?.displayName)}</div>
                        <div style="font-size:0.8rem;">${currentUser?.email}</div>
                    </div>
                </div>
                <div class="card">
                    <h2>🔗 Your QR Code</h2>
                    <div class="qr-code-display"><img src="${qrUrl}" width="120" height="120"></div>
                    <div class="referral-code-box" id="refCode">${userData?.referralCode}</div>
                    <button class="btn-primary" id="copyRefBtn">📋 Copy Code</button>
                </div>
                <button class="signout-btn-lg" id="signOutBtn">🚪 Sign Out</button>
            `;
        }
        
        function renderReferPage() {
            const qrUrl = generateQRCodeURL(`VIEWSWAP_REF:${userData?.referralCode}`);
            return `
                <div class="card">
                    <h2>🤝 Referral Program</h2>
                    <div style="background:linear-gradient(135deg,var(--warning),#ea580c);border-radius:20px;padding:12px;text-align:center;margin-bottom:12px;">🎁 5% commission on everything your referrals earn!</div>
                    <div class="qr-code-display"><img src="${qrUrl}" width="150" height="150"></div>
                    <div class="referral-code-box">${userData?.referralCode}</div>
                    <button class="btn-primary" id="copyRefLink">📋 Copy Code</button>
                    <div class="stat-row"><span>💰 Commission Earned:</span><span style="color:gold;">${Math.floor(userData?.referralEarnings || 0)} credits</span></div>
                </div>
            `;
        }
        
        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
        
        async function renderCurrentPage() {
            const container = document.getElementById('pageContent');
            if(!container) return;
            if(currentPage === 'home'){ container.innerHTML = await renderHome(); document.getElementById('dailyBonusBtn')?.addEventListener('click', claimDailyBonus); }
            else if(currentPage === 'campaign'){ 
                container.innerHTML = renderCampaignPage(); 
                document.getElementById('createAdvancedBtn')?.addEventListener('click', async () => {
                    const title = document.getElementById('campTitle')?.value;
                    const videoUrl = document.getElementById('campVideoUrl')?.value;
                    const targetViews = document.getElementById('campViews')?.value;
                    const targetWatchTime = document.getElementById('campWatchTime')?.value;
                    const targetLikes = document.getElementById('campLikes')?.value;
                    const targetSubs = document.getElementById('campSubs')?.value;
                    const channelUrl = document.getElementById('campChannelUrl')?.value;
                    const commentsText = document.getElementById('campComments')?.value;
                    const commentCountTarget = document.getElementById('campCommentTarget')?.value;
                    
                    if(!title || !videoUrl) { showToast('Title and Video URL required', true); return; }
                    
                    const customComments = commentsText ? commentsText.split('\n').filter(c => c.trim()) : [];
                    
                    await createAdvancedCampaign({
                        title, videoUrl, channelUrl,
                        targetViews: parseInt(targetViews) || 0,
                        targetWatchTime: parseInt(targetWatchTime) || 0,
                        targetLikes: parseInt(targetLikes) || 0,
                        targetSubs: parseInt(targetSubs) || 0,
                        customComments,
                        commentCountTarget: parseInt(commentCountTarget) || 0
                    });
                });
            }
            else if(currentPage === 'rewards') container.innerHTML = renderRewardsPage();
            else if(currentPage === 'account'){ 
                container.innerHTML = renderAccountPage(); 
                document.getElementById('copyRefBtn')?.addEventListener('click', () => { navigator.clipboard.writeText(userData?.referralCode); showToast('Copied!'); });
                document.getElementById('signOutBtn')?.addEventListener('click', async () => await signOut(auth));
            }
            else if(currentPage === 'refer'){ 
                container.innerHTML = renderReferPage(); 
                document.getElementById('copyRefLink')?.addEventListener('click', () => { navigator.clipboard.writeText(userData?.referralCode); showToast('Copied!'); });
            }
        }
        
        async function claimDailyBonus() {
            if(!userData) return;
            const lastClaim = userData.streak?.lastClaim ? new Date(userData.streak.lastClaim) : null;
            const today = new Date();
            let newStreak = 1;
            if(lastClaim) {
                const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
                if(lastClaim.toDateString() === yesterday.toDateString()) newStreak = (userData.streak.current || 0) + 1;
                else if(lastClaim.toDateString() === today.toDateString()) { showToast('Already claimed today!'); return; }
            }
            const bonus = 25 + Math.floor(newStreak / 7) * 10;
            await updateCredits(bonus, 'daily');
            userData.streak = { current: newStreak, lastClaim: today.toISOString(), highest: Math.max(newStreak, userData.streak?.highest || 0) };
            await saveUserData();
            showToast(`🎁 Daily: +${bonus} credits | Streak: ${newStreak}`);
            renderCurrentPage();
        }
        
        document.querySelectorAll('.nav-item').forEach(btn => btn.addEventListener('click', () => {
            currentPage = btn.dataset.page;
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCurrentPage();
        }));
        
        function initOnlineTracking() {
            const statusRef = doc(db, 'viewswap_online', currentUser?.uid);
            const update = async() => { if(currentUser) await setDoc(statusRef, { uid: currentUser.uid, isOnline: true, lastSeen: serverTimestamp() }, { merge: true }); };
            update();
            setInterval(update, 30000);
            window.addEventListener('beforeunload', () => setDoc(statusRef, { isOnline: false }, { merge: true }));
        }
        
        onAuthStateChanged(auth, async(user) => {
            if(user) {
                currentUser = user;
                await loadUserData(user.uid);
                document.body.classList.add('authenticated');
                initOnlineTracking();
                renderCurrentPage();
            } else {
                document.body.classList.remove('authenticated');
                currentUser = null;
                userData = null;
            }
        });
        
        document.getElementById('signInBtn').addEventListener('click', () => signInWithPopup(auth, provider));
        document.getElementById('qrSignInBtn').addEventListener('click', () => showToast('QR Scanner ready after login', false));
        
        for(let i=0;i<35;i++){ const p=document.createElement('div'); p.className='particle'; p.style.width=Math.random()*4+2+'px'; p.style.height=p.style.width; p.style.left=Math.random()*100+'%'; p.style.animationDuration=Math.random()*12+6+'s'; p.style.animationDelay=Math.random()*8+'s'; document.getElementById('particles')?.appendChild(p); }
    </script>
</body>
</html>
