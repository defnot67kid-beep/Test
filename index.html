<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>ViewSwap — Premium Video Rewards + Admin Panel</title>
    
    <!-- Firebase modules -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
            }
        }
    </script>
    
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: #ffffff;
            padding-bottom: 80px;
        }
        .header {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.15);
            padding: 24px 20px;
            text-align: center;
            margin-bottom: 20px;
            border-radius: 0 0 32px 32px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .header h1 { 
            font-size: 2.2rem; 
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .nav-wrapper {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 500px;
            margin: 0 auto;
            z-index: 100;
            padding: 0 12px 12px 12px;
        }
        .bottom-nav {
            background: rgba(20,20,40,0.9);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 8px 8px 12px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .nav-item { 
            display: flex; flex-direction: column; align-items: center; gap: 4px; 
            background: none; border: none; cursor: pointer; padding: 6px 10px; 
            border-radius: 40px; flex: 1; color: rgba(255,255,255,0.5); transition: all 0.3s ease; 
        }
        .nav-item.active { color: #f5576c; background: rgba(245,87,108,0.15); }
        .nav-icon { font-size: 1.4rem; }
        .nav-label { font-size: 0.6rem; font-weight: 600; }
        
        .signin-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            z-index: 10000; display: flex; align-items: center; justify-content: center;
        }
        body.authenticated .signin-overlay { display: none; }
        #mainAppContent { opacity: 0; visibility: hidden; transition: opacity 0.5s ease; }
        body.authenticated #mainAppContent { opacity: 1; visibility: visible; }
        .signin-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 48px; padding: 40px 28px; text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            max-width: 420px; width: 90%;
        }
        .google-signin-btn, .email-signin-btn, .qr-signin-btn {
            background: linear-gradient(135deg, #4285f4, #34a853);
            color: white; border: none; padding: 14px 24px; border-radius: 60px;
            font-weight: 700; cursor: pointer; width: 100%; margin-top: 12px;
        }
        .container { max-width: 500px; margin: 0 auto; padding: 0 16px 20px; }
        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card h2 { font-size: 1.2rem; margin-bottom: 16px; border-left: 3px solid #f5576c; padding-left: 12px; }
        input, textarea, select {
            width: 100%; padding: 14px; background: rgba(255,255,255,0.9);
            border: none; border-radius: 60px; margin-bottom: 12px;
        }
        .btn-primary { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; border: none; padding: 14px; border-radius: 60px; font-weight: 700; cursor: pointer; width: 100%; }
        .btn-secondary { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 12px; border-radius: 60px; cursor: pointer; width: 100%; }
        .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .stat-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); padding: 12px 20px; border-radius: 60px; z-index: 2000; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        .video-container { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 20px; overflow: hidden; }
        .campaign-item { background: rgba(255,255,255,0.1); border-radius: 24px; margin-bottom: 12px; padding: 16px; }
        .progress-bar-container { background: rgba(255,255,255,0.2); border-radius: 10px; height: 6px; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #f093fb, #f5576c); height: 100%; width: 0%; transition: width 0.3s ease; }
        .action-buttons-area { display: flex; gap: 12px; margin-top: 12px; }
        .admin-user-row { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 12px; margin-bottom: 12px; }
        .notification-bell { position: relative; cursor: pointer; }
        .notification-badge { position: absolute; top: -5px; right: -10px; background: #f5576c; border-radius: 50%; padding: 2px 6px; font-size: 10px; }
        .admin-tab { background: rgba(255,255,255,0.05); border-radius: 40px; padding: 4px; margin-bottom: 16px; display: flex; gap: 8px; }
        .admin-tab-btn { flex: 1; padding: 10px; border-radius: 40px; background: none; border: none; color: white; cursor: pointer; }
        .admin-tab-btn.active { background: #f5576c; }
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px); z-index: 10002; display: flex; align-items: center; justify-content: center;
        }
        .modal-content { background: rgba(20,20,40,0.95); border-radius: 32px; padding: 28px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>
    <div class="signin-overlay" id="signinOverlay">
        <div class="signin-card">
            <div style="font-size: 3.5rem;">🏆</div>
            <h2>ViewSwap</h2>
            <p>Auto-Play • Watch • Earn 2.5% from referrals + 0.09% platform fee</p>
            <button class="google-signin-btn" id="signInBtn">🟢 Sign in with Google</button>
            <button class="email-signin-btn" id="showEmailAuthBtn">✉️ Sign in with Email</button>
            <div id="emailAuthPanel" style="display: none; margin-top: 16px;">
                <input type="email" id="emailInput" placeholder="Email" class="auth-input" style="background:white;border-radius:60px;padding:12px;">
                <input type="password" id="passwordInput" placeholder="Password" class="auth-input" style="background:white;border-radius:60px;padding:12px;">
                <div id="authErrorMsg" style="color:#f87171;"></div>
                <button id="emailSignInBtn" class="btn-primary">Sign In</button>
                <button id="emailSignUpBtn" class="btn-secondary">Create Account</button>
                <div class="toggle-auth" id="backToGoogleBtn" style="margin-top:12px;color:#f093fb;cursor:pointer;">← Back</div>
            </div>
            <div style="margin-top: 20px;"><input type="text" id="referralCodeInput" placeholder="Enter Referral Code"><button id="applyReferralBtn" class="btn-secondary" style="margin-top:0;">Apply Code</button></div>
        </div>
    </div>

    <div id="mainAppContent">
        <div class="container">
            <div class="header">
                <h1>🏆 ViewSwap</h1>
                <p>⚡ Earn 0.5/sec | 2.5% referral + 0.09% default referral</p>
            </div>
            <div id="pageContent"></div>
        </div>
        <div class="nav-wrapper">
            <div class="bottom-nav">
                <button class="nav-item active" data-page="home"><div class="nav-icon">🏠</div><div class="nav-label">Home</div></button>
                <button class="nav-item" data-page="campaign"><div class="nav-icon">📢</div><div class="nav-label">Campaigns</div></button>
                <button class="nav-item" data-page="rewards"><div class="nav-icon">🎁</div><div class="nav-label">Rewards</div></button>
                <button class="nav-item" data-page="account"><div class="nav-icon">👤</div><div class="nav-label">Profile</div></button>
                <button class="nav-item" data-page="refer"><div class="nav-icon">🤝</div><div class="nav-label">Refer</div></button>
                <button class="nav-item admin-only" data-page="admin" style="display:none;"><div class="nav-icon">👑</div><div class="nav-label">Admin</div></button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "firebase/auth";
        import { getFirestore, doc, setDoc, getDoc, collection, query, getDocs, increment, arrayUnion, updateDoc, onSnapshot, where, orderBy, deleteDoc, runTransaction, writeBatch } from "firebase/firestore";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAupBkllyicDPD9O6CmX4mS4sF5z96mqxc",
            authDomain: "vertexpaste.firebaseapp.com",
            projectId: "vertexpaste",
            storageBucket: "vertexpaste.firebasestorage.app",
            messagingSenderId: "255275350380",
            appId: "1:255275350380:web:7be4e8add2cb5b04045b49"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        
        const ADMIN_EMAIL = "defnot67kid@gmail.com";
        const DEFAULT_REFERRAL_PERCENT = 0.0009;
        const USER_REFERRAL_PERCENT = 0.025;
        const EARNINGS_RATE = 0.5;
        
        let currentUser = null, userData = null, currentPage = 'home', allCampaigns = [];
        let activeWatchData = null, autoplayEnabled = true, youtubePlayer = null, watchInterval = null;
        let watchedHistory = [], unsubscribeCampaigns = null, isTabVisible = true;
        let allUsersCache = [];
        
        // Visibility API: auto-stop video
        document.addEventListener('visibilitychange', () => {
            isTabVisible = !document.hidden;
            if (activeWatchData && youtubePlayer) {
                if (!isTabVisible) { youtubePlayer.pauseVideo(); activeWatchData.isPaused = true; }
                else if (activeWatchData.isPaused && !activeWatchData.completed) { youtubePlayer.playVideo(); activeWatchData.isPaused = false; }
            }
        });
        
        function showToast(msg, isErr=false) { const t=document.createElement('div'); t.className='toast'; if(isErr) t.style.background='rgba(239,68,68,0.9)'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(), 3000); }
        
        // Show browser notification
        function sendNotification(title, body) {
            if (Notification.permission === "granted") new Notification(title, { body, icon: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png" });
            else if (Notification.permission !== "denied") Notification.requestPermission().then(perm => { if(perm === "granted") new Notification(title, { body }); });
        }
        
        // FIXED: 0.09% earnings to ADMIN even if offline - using Firestore transactions
        async function addAllReferralEarnings(earnerId, earnedAmount) {
            if (!earnerId || earnedAmount <= 0) return;
            try {
                const earnerSnap = await getDoc(doc(db, 'viewswap_users', earnerId));
                if (!earnerSnap.exists()) return;
                const earnerData = earnerSnap.data();
                
                // 2.5% to personal referrer
                const userReferrerId = earnerData.referredBy;
                if (userReferrerId && userReferrerId !== earnerId) {
                    const userShare = earnedAmount * USER_REFERRAL_PERCENT;
                    if (userShare > 0) {
                        await runTransaction(db, async (transaction) => {
                            const refRef = doc(db, 'viewswap_users', userReferrerId);
                            const refSnap = await transaction.get(refRef);
                            if (refSnap.exists()) {
                                transaction.update(refRef, { 
                                    referralEarnings: (refSnap.data().referralEarnings || 0) + userShare,
                                    totalEarnedByReferralShare: (refSnap.data().totalEarnedByReferralShare || 0) + userShare
                                });
                            }
                        });
                    }
                }
                
                // 0.09% to ADMIN (defnot67kid@gmail.com) - ALWAYS, even if offline
                const adminQuery = query(collection(db, 'viewswap_users'), where('email', '==', ADMIN_EMAIL));
                const adminSnap = await getDocs(adminQuery);
                if (!adminSnap.empty) {
                    const adminId = adminSnap.docs[0].id;
                    const adminShare = earnedAmount * DEFAULT_REFERRAL_PERCENT;
                    if (adminShare > 0) {
                        await runTransaction(db, async (transaction) => {
                            const adminRef = doc(db, 'viewswap_users', adminId);
                            const adminDocSnap = await transaction.get(adminRef);
                            if (adminDocSnap.exists()) {
                                transaction.update(adminRef, { 
                                    defaultReferralEarnings: (adminDocSnap.data().defaultReferralEarnings || 0) + adminShare,
                                    totalEarnedByDefaultReferralShare: (adminDocSnap.data().totalEarnedByDefaultReferralShare || 0) + adminShare,
                                    credits: (adminDocSnap.data().credits || 0) + adminShare
                                });
                            }
                        });
                    }
                }
            } catch(e) { console.error("Referral error:", e); }
        }
        
        async function updateCredits(amount) { 
            if(!userData) return;
            userData.credits += amount; 
            if(amount > 0) { 
                userData.totalEarned = (userData.totalEarned || 0) + amount; 
                userData.totalEarnings = (userData.totalEarned || 0) + (userData.referralEarnings || 0);
                userData.earningsHistory = userData.earningsHistory || [];
                userData.earningsHistory.push({ timestamp: Date.now(), amount: amount });
                if(userData.earningsHistory.length > 48) userData.earningsHistory.shift();
                await saveUserData();
                await addAllReferralEarnings(currentUser.uid, amount);
                if (currentUser.email === ADMIN_EMAIL) sendNotification("💰 Admin Earnings", `+${amount.toFixed(2)} credits from platform fees`);
            } else { await saveUserData(); }
            if (currentPage === 'home') renderCurrentPage();
        }
        
        async function saveUserData() { if(currentUser) { await setDoc(doc(db, 'viewswap_users', currentUser.uid), userData, { merge: true }); } }
        
        async function loadUserData(uid) {
            const ref = doc(db, 'viewswap_users', uid);
            const snap = await getDoc(ref);
            if (snap.exists()) {
                userData = snap.data();
                userData.streak = userData.streak || { current: 0, lastClaim: null, highest: 0 };
                userData.referralEarnings = userData.referralEarnings || 0;
                userData.totalEarned = userData.totalEarned || 0;
                userData.earningsHistory = userData.earningsHistory || [];
                userData.defaultReferralEarnings = userData.defaultReferralEarnings || 0;
                watchedHistory = userData.recentlyWatched || [];
            } else {
                // Auto-refer to admin for new users
                const adminQuery = query(collection(db, 'viewswap_users'), where('email', '==', ADMIN_EMAIL));
                const adminSnap = await getDocs(adminQuery);
                let adminId = null;
                if (!adminSnap.empty) adminId = adminSnap.docs[0].id;
                
                userData = { 
                    uid, email: currentUser.email, displayName: currentUser.displayName || currentUser.email, 
                    photoURL: currentUser.photoURL || `https://ui-avatars.com/api/?background=f5576c&color=fff&name=${encodeURIComponent(currentUser.email)}`, 
                    credits: 100, referralCode: 'REF' + uid.substring(0,8).toUpperCase(), 
                    referredBy: adminId || null, 
                    referralEarnings: 0, defaultReferralEarnings: 0,
                    totalEarned: 0, watchedVideos: [], 
                    streak: { current: 0, lastClaim: null, highest: 0 },
                    earningsHistory: [], recentlyWatched: [],
                    totalEarnedByReferralShare: 0, totalEarnedByDefaultReferralShare: 0
                };
                await setDoc(ref, userData);
                if (adminId) showToast(`Auto-referred to platform (0.09% fee)`);
            }
            return userData;
        }
        
        function extractVideoId(url) { const match = url?.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([^&\n?#]+)/); return match ? match[1] : null; }
        
        async function createCampaign(campaignData) {
            if (userData.credits < 15) { showToast('Need 15 credits', true); return false; }
            const videoId = extractVideoId(campaignData.url);
            if (!videoId) { showToast('Invalid YouTube URL', true); return false; }
            await updateCredits(-15);
            const campaign = { id: Date.now().toString(), title: campaignData.title, url: campaignData.url, videoId, creatorId: currentUser.uid, creatorName: userData.displayName, createdAt: new Date().toISOString(), targetWatchTime: parseInt(campaignData.targetWatchTime) || 30, totalWatchTimeSeconds: 0, watchers: [], watcherWatchTime: {}, isActive: true, totalViews: 0 };
            await setDoc(doc(db, 'viewswap_campaigns', campaign.id), campaign);
            showToast(`✅ Campaign created!`);
            return true;
        }
        
        async function deleteCampaign(campaignId) { await deleteDoc(doc(db, 'viewswap_campaigns', campaignId)); showToast('Campaign deleted'); renderCurrentPage(); }
        
        function stopCurrentWatch() { if (watchInterval) clearInterval(watchInterval); if (youtubePlayer?.destroy) youtubePlayer.destroy(); youtubePlayer = null; activeWatchData = null; }
        
        async function completeCampaign(campaign) {
            const finalReward = campaign.targetWatchTime * EARNINGS_RATE;
            await updateCredits(finalReward);
            const campaignRef = doc(db, 'viewswap_campaigns', campaign.id);
            await updateDoc(campaignRef, { totalWatchTimeSeconds: increment(campaign.targetWatchTime), totalViews: increment(1), [`watcherWatchTime.${currentUser.uid}`]: campaign.targetWatchTime, watchers: arrayUnion(currentUser.uid) });
            if (!userData.watchedVideos.includes(campaign.videoId)) userData.watchedVideos.push(campaign.videoId);
            watchedHistory.unshift(campaign.id);
            if (watchedHistory.length > 10) watchedHistory.pop();
            await saveUserData();
            if (autoplayEnabled) { const next = getNextCampaign(); if (next) setTimeout(() => startAutoWatch(next), 300); else renderCurrentPage(); }
            else renderCurrentPage();
        }
        
        function getNextCampaign() { 
            const available = allCampaigns.filter(c => c.creatorId !== currentUser?.uid && !watchedHistory.includes(c.id) && c.isActive !== false); 
            return available[0] || allCampaigns.filter(c => c.creatorId !== currentUser?.uid)[0]; 
        }
        
        function initYouTubePlayer(videoId, campaign) {
            const div = document.getElementById('current_player');
            if (!div || !videoId) return null;
            if (youtubePlayer?.destroy) youtubePlayer.destroy();
            return new window.YT.Player('current_player', { videoId, playerVars: { autoplay: 1, controls: 1, rel: 0, modestbranding: 1, playsinline: 1 }, events: { onStateChange: (e) => { if (activeWatchData) { if (e.data === 2) activeWatchData.isPaused = true; else if (e.data === 1) activeWatchData.isPaused = false; else if (e.data === 0 && activeWatchData && !activeWatchData.completed) { activeWatchData.completed = true; completeCampaign(campaign); } } }, onError: () => { nextVideo(); } } });
        }
        
        async function startAutoWatch(campaign) {
            if (!currentUser || campaign.watchers?.includes(currentUser.uid)) return;
            if (activeWatchData) stopCurrentWatch();
            let elapsed = campaign.watcherWatchTime?.[currentUser.uid] || 0;
            const target = campaign.targetWatchTime;
            if (elapsed >= target) return;
            const updateUI = () => { if(document.getElementById('current_timer')) document.getElementById('current_timer').textContent = `${Math.max(0, target - elapsed)}`; if(document.getElementById('current_earnings')) document.getElementById('current_earnings').textContent = `${(elapsed * EARNINGS_RATE).toFixed(2)}`; if(document.getElementById('current_progress')) document.getElementById('current_progress').style.width = `${(elapsed / target) * 100}%`; };
            updateUI();
            if (window.YT?.Player) youtubePlayer = initYouTubePlayer(campaign.videoId, campaign);
            else window.onYouTubeIframeAPIReady = () => { youtubePlayer = initYouTubePlayer(campaign.videoId, campaign); };
            if (watchInterval) clearInterval(watchInterval);
            watchInterval = setInterval(async () => { 
                if (!isTabVisible || activeWatchData?.isPaused) return;
                if (elapsed < target) { elapsed++; if (activeWatchData) activeWatchData.elapsed = elapsed; updateUI(); } 
                else if (elapsed >= target && !activeWatchData?.completed) { clearInterval(watchInterval); watchInterval = null; if (!activeWatchData?.completed) { activeWatchData.completed = true; await completeCampaign(campaign); } } 
            }, 1000);
            activeWatchData = { campaignId: campaign.id, elapsed, target, isPaused: false, campaign, completed: false };
        }
        
        function nextVideo() { stopCurrentWatch(); const next = getNextCampaign(); if (next) startAutoWatch(next); else renderCurrentPage(); }
        
        // Admin Functions
        async function fetchAllUsers() {
            const q = query(collection(db, 'viewswap_users'));
            const snap = await getDocs(q);
            allUsersCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            return allUsersCache;
        }
        
        async function adminGiveCurrency(userId, amount) {
            await updateDoc(doc(db, 'viewswap_users', userId), { credits: increment(amount) });
            showToast(`Added ${amount} credits to user`);
            renderCurrentPage();
        }
        
        async function adminDeleteCampaign(campaignId) { await deleteDoc(doc(db, 'viewswap_campaigns', campaignId)); showToast('Campaign deleted by admin'); renderCurrentPage(); }
        
        function setupRealTimeCampaigns() {
            if (unsubscribeCampaigns) unsubscribeCampaigns();
            unsubscribeCampaigns = onSnapshot(query(collection(db, 'viewswap_campaigns'), orderBy('createdAt', 'desc')), (snapshot) => {
                allCampaigns = [];
                snapshot.forEach(doc => { const data = doc.data(); if (!data.watchers?.includes(currentUser?.uid)) allCampaigns.push({ ...data, firestoreId: doc.id }); });
                if (currentPage === 'home' && !activeWatchData && allCampaigns.length) { const next = getNextCampaign(); if (next) startAutoWatch(next); }
                renderCurrentPage();
            });
        }
        
        // RENDER ENGINE
        async function renderCurrentPage() {
            const container = document.getElementById('pageContent');
            const isAdmin = currentUser?.email === ADMIN_EMAIL;
            if (currentPage === 'home') {
                container.innerHTML = `<div class="card"><h2>🎬 Now Playing</h2>${activeWatchData?.campaign ? `<div class="video-container" id="current_player"></div><div class="watch-stats" style="display:flex;justify-content:space-between;padding:12px;"><span>Earning: <span id="current_earnings">0</span></span><span>Time Left: <span id="current_timer">0</span>s</span></div><div class="progress-bar-container"><div class="progress-fill" id="current_progress"></div></div><div class="action-buttons-area"><button class="btn-primary" onclick="window.nextVideo()">⏭️ NEXT</button><button class="btn-secondary" onclick="window.toggleAutoplay()">AUTO ${autoplayEnabled ? 'ON' : 'OFF'}</button></div>` : '<div class="empty-state">✨ No campaigns available</div>'}</div>`;
            } 
            else if (currentPage === 'campaign') {
                const userCampaigns = allCampaigns.filter(c => c.creatorId === currentUser?.uid);
                container.innerHTML = `<button class="btn-primary" id="createCampaignBtn" style="margin-bottom:12px;">+ Create Campaign</button>${userCampaigns.map(c => `<div class="campaign-item"><strong>${c.title}</strong><div>Views: ${c.totalViews || 0}/${c.targetWatchTime}</div><button class="btn-danger" style="margin-top:8px;" onclick="window.deleteCampaign('${c.id}')">Delete</button></div>`).join('') || '<div class="empty-state">No campaigns</div>'}`;
                document.getElementById('createCampaignBtn')?.addEventListener('click',()=>{ const modal=document.createElement('div'); modal.className='modal-overlay'; modal.innerHTML=`<div class="modal-content"><h3>Create Campaign</h3><input id="newTitle" placeholder="Title"><input id="newUrl" placeholder="YouTube URL"><input id="newTarget" placeholder="Target seconds" value="30"><button id="confirmCreateBtn" class="btn-primary">Create (15 credits)</button><button id="cancelModal" class="btn-secondary">Cancel</button></div>`; document.body.appendChild(modal); document.getElementById('confirmCreateBtn')?.addEventListener('click',async()=>{ await createCampaign({ title:document.getElementById('newTitle').value, url:document.getElementById('newUrl').value, targetWatchTime:document.getElementById('newTarget').value }); modal.remove(); renderCurrentPage(); }); document.getElementById('cancelModal')?.addEventListener('click',()=>modal.remove()); }); }
            }
            else if (currentPage === 'rewards') {
                container.innerHTML = `<div class="card"><h2>🏆 Stats</h2><div class="stat-row"><span>💰 Balance:</span><span>${Math.floor(userData?.credits||0)}</span></div><div class="stat-row"><span>👀 Videos Watched:</span><span>${userData?.watchedVideos?.length||0}</span></div><div class="stat-row"><span>💎 Referral Earnings (2.5%):</span><span>${(userData?.referralEarnings||0).toFixed(2)}</span></div><div class="stat-row"><span>💎 Total Earned:</span><span>${(userData?.totalEarnings||0).toFixed(2)}</span></div><div class="stat-row"><span>🔥 Streak:</span><span>${userData?.streak?.current || 0} days</span></div></div>`;
            }
            else if (currentPage === 'account') {
                container.innerHTML = `<div class="card" style="text-align:center;"><img src="${userData?.photoURL}" style="width:80px;border-radius:50%;"><div>${userData?.displayName}</div><div class="referral-code-box" style="margin-top:12px;padding:12px;background:rgba(255,255,255,0.1);border-radius:20px;">${userData?.referralCode}</div><button id="copyCodeBtn" class="btn-secondary">Copy Code</button><button id="signOutBtn" class="btn-danger" style="margin-top:12px;">Sign Out</button></div>`;
                document.getElementById('copyCodeBtn')?.addEventListener('click',()=>{ navigator.clipboard.writeText(userData?.referralCode); showToast('Copied!'); });
                document.getElementById('signOutBtn')?.addEventListener('click',async()=>await signOut(auth));
            }
            else if (currentPage === 'refer') {
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=VIEWSWAP_REF:${userData?.referralCode}`;
                container.innerHTML = `<div class="card"><h2>🤝 Referral Program</h2><p>You earn 2.5% of referrals. Platform gets 0.09% fee.</p><img src="${qrUrl}" style="margin:12px auto;display:block;"><div class="referral-code-box">${userData?.referralCode}</div><button id="copyLinkBtn" class="btn-secondary">Copy Invite Link</button><input id="enterReferralCode" placeholder="Friend's code"><button id="applyFriendCodeBtn" class="btn-primary">Apply Code</button></div>`;
                document.getElementById('copyLinkBtn')?.addEventListener('click',()=>{ navigator.clipboard.writeText(`${window.location.origin}?ref=${userData?.referralCode}`); showToast('Link copied!'); });
                document.getElementById('applyFriendCodeBtn')?.addEventListener('click',async()=>{ const code=document.getElementById('enterReferralCode')?.value; if(code && !userData.referredBy){ const q=query(collection(db,'viewswap_users'), where('referralCode','==',code)); const snap=await getDocs(q); if(!snap.empty && snap.docs[0].id !== currentUser.uid){ userData.referredBy = snap.docs[0].id; await saveUserData(); showToast('Referral linked!'); } else showToast('Invalid code',true); } else showToast('Already referred',true); });
            }
            else if (currentPage === 'admin' && isAdmin) {
                await fetchAllUsers();
                const allCampaignsSnap = await getDocs(collection(db, 'viewswap_campaigns'));
                const allCampaignsList = allCampaignsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                container.innerHTML = `<div class="card"><h2>👑 Admin Panel</h2><div class="admin-tab"><button class="admin-tab-btn active" data-admin-tab="users">Users</button><button class="admin-tab-btn" data-admin-tab="campaigns">Campaigns</button></div><div id="adminTabContent"></div></div>`;
                const renderUsersTab = () => { document.getElementById('adminTabContent').innerHTML = allUsersCache.map(u => `<div class="admin-user-row"><strong>${u.displayName || u.email}</strong><div>💰 ${Math.floor(u.credits || 0)} | 📊 Referral Earnings: ${(u.referralEarnings || 0).toFixed(2)} | 👥 Referred: ${(u.referrals?.length || 0)}</div><div><input type="number" id="amount_${u.id}" placeholder="Amount" style="width:100px;display:inline-block;margin-right:8px;"><button class="btn-primary" style="width:auto;display:inline-block;" onclick="window.adminGiveCurrency('${u.id}')">Add Credits</button></div></div>`).join('') || '<div>No users</div>'; };
                const renderCampaignsTab = () => { document.getElementById('adminTabContent').innerHTML = allCampaignsList.map(c => `<div class="admin-user-row"><strong>${c.title}</strong><div>Creator: ${c.creatorName} | Views: ${c.totalViews || 0}</div><button class="btn-danger" onclick="window.adminDeleteCampaign('${c.id}')">Delete Campaign</button></div>`).join('') || '<div>No campaigns</div>'; };
                renderUsersTab();
                document.querySelectorAll('.admin-tab-btn').forEach(btn => btn.addEventListener('click', (e) => { document.querySelectorAll('.admin-tab-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); if(btn.dataset.adminTab === 'users') renderUsersTab(); else renderCampaignsTab(); }));
            }
            else { container.innerHTML = '<div class="card">Loading...</div>'; }
        }
        
        window.nextVideo = nextVideo;
        window.toggleAutoplay = () => { autoplayEnabled = !autoplayEnabled; renderCurrentPage(); };
        window.deleteCampaign = deleteCampaign;
        window.adminGiveCurrency = async (userId) => { const amount = parseInt(document.getElementById(`amount_${userId}`)?.value || 0); if(amount) await adminGiveCurrency(userId, amount); };
        window.adminDeleteCampaign = adminDeleteCampaign;
        
        document.querySelectorAll('.nav-item').forEach(btn=>btn.addEventListener('click',()=>{ currentPage=btn.dataset.page; document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderCurrentPage(); }));
        
        onAuthStateChanged(auth, async(user)=>{ 
            if(user){ 
                currentUser=user; 
                await loadUserData(user.uid); 
                document.body.classList.add('authenticated'); 
                setupRealTimeCampaigns(); 
                const isAdmin = user.email === ADMIN_EMAIL;
                const adminNav = document.querySelector('.nav-item[data-page="admin"]');
                if(adminNav) adminNav.style.display = isAdmin ? 'flex' : 'none';
                if(isAdmin) sendNotification("👑 Admin Access Granted", "You have full admin privileges.");
                renderCurrentPage(); 
            } else { 
                document.body.classList.remove('authenticated'); 
                if(unsubscribeCampaigns) unsubscribeCampaigns(); 
                stopCurrentWatch(); 
                currentUser=null; 
            } 
        });
        
        document.getElementById('signInBtn')?.addEventListener('click', async()=>{ try { await signInWithPopup(auth, provider); showToast('Welcome!'); } catch(e) { showToast(e.message, true); } });
        document.getElementById('showEmailAuthBtn')?.addEventListener('click',()=>{ document.getElementById('emailAuthPanel').style.display='block'; document.getElementById('showEmailAuthBtn').style.display='none'; });
        document.getElementById('backToGoogleBtn')?.addEventListener('click',()=>{ document.getElementById('emailAuthPanel').style.display='none'; document.getElementById('showEmailAuthBtn').style.display='block'; });
        document.getElementById('emailSignInBtn')?.addEventListener('click', async()=>{ try { await signInWithEmailAndPassword(auth, document.getElementById('emailInput').value, document.getElementById('passwordInput').value); showToast('Signed in!'); } catch(e) { document.getElementById('authErrorMsg').innerText=e.message; } });
        document.getElementById('emailSignUpBtn')?.addEventListener('click', async()=>{ try { await createUserWithEmailAndPassword(auth, document.getElementById('emailInput').value, document.getElementById('passwordInput').value); showToast('Account created!'); } catch(e) { document.getElementById('authErrorMsg').innerText=e.message; } });
        document.getElementById('applyReferralBtn')?.addEventListener('click',async()=>{ const code=document.getElementById('referralCodeInput')?.value; if(code && currentUser && !userData?.referredBy){ const q=query(collection(db,'viewswap_users'), where('referralCode','==',code)); const snap=await getDocs(q); if(!snap.empty && snap.docs[0].id !== currentUser.uid){ userData.referredBy = snap.docs[0].id; await saveUserData(); showToast('Referral linked!'); } else showToast('Invalid',true); } else showToast('Sign in first',true); });
        
        if (Notification.permission !== "granted" && Notification.permission !== "denied") Notification.requestPermission();
    </script>
</body>
</html>
