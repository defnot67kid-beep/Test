<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>ViewSwap — Embedded Video Campaigns</title>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, getDocs, increment, runTransaction, arrayUnion, onSnapshot, serverTimestamp, where, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        window.firebaseModules = {
            initializeApp, getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged,
            getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, getDocs, increment, runTransaction, arrayUnion, onSnapshot, serverTimestamp, where, orderBy
        };
    </script>
    
    <!-- QR Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --primary: #8b5cf6; --primary-dark: #7c3aed; --primary-light: #a78bfa;
            --secondary: #ec489a; --success: #10b981; --warning: #f59e0b;
            --danger: #ef4444; --dark: #0f0f0f; --gray-800: #1f1f1f;
            --gray-700: #2a2a2a; --gray-600: #3a3a3a; --gray-400: #9ca3af;
            --white: #ffffff; --gold: #fbbf24;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            min-height: 100vh; color: var(--white); padding-bottom: 80px;
        }
        .signin-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0a0a0f 0%, #14141f 100%);
            z-index: 10000; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(8px);
        }
        body.authenticated .signin-overlay { display: none; }
        #mainAppContent { opacity: 0; visibility: hidden; transition: opacity 0.5s ease; }
        body.authenticated #mainAppContent { opacity: 1; visibility: visible; }
        .signin-card {
            background: rgba(30, 30, 40, 0.98); backdrop-filter: blur(20px);
            border-radius: 48px; padding: 48px 32px; text-align: center;
            border: 1px solid rgba(139, 92, 246, 0.5); max-width: 420px; width: 90%;
        }
        .google-signin-btn, .qr-signin-btn {
            background: linear-gradient(135deg, #4285f4, #34a853); color: white;
            border: none; padding: 14px 24px; border-radius: 60px; font-weight: 700;
            cursor: pointer; display: inline-flex; align-items: center; gap: 12px;
            margin-top: 12px; width: 100%; justify-content: center;
        }
        .qr-signin-btn { background: linear-gradient(135deg, #8b5cf6, #ec489a); }
        .container { max-width: 500px; margin: 0 auto; position: relative; z-index: 1; padding: 0 16px 20px; }
        .header {
            background: rgba(15, 15, 26, 0.9); backdrop-filter: blur(20px);
            border-radius: 0 0 32px 32px; padding: 20px; margin: -16px -16px 20px -16px;
            text-align: center; border-bottom: 1px solid rgba(139, 92, 246, 0.3);
        }
        .header h1 { font-size: 1.8rem; background: linear-gradient(135deg, #fff, var(--primary-light), var(--secondary)); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .online-badge { background: rgba(16, 185, 129, 0.2); padding: 6px 12px; border-radius: 40px; font-size: 0.7rem; display: inline-block; margin-top: 8px; border: 1px solid var(--success); }
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(15, 15, 26, 0.95); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; padding: 8px 8px 20px;
            border-top: 1px solid rgba(139, 92, 246, 0.3); max-width: 500px; margin: 0 auto; z-index: 100;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; cursor: pointer; padding: 6px 10px; border-radius: 40px; flex: 1; color: var(--gray-400); transition: all 0.2s; }
        .nav-item.active { color: white; background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(236, 72, 153, 0.2)); }
        .nav-icon { font-size: 1.3rem; } .nav-label { font-size: 0.6rem; font-weight: 600; }
        .card { background: rgba(30, 30, 40, 0.9); backdrop-filter: blur(10px); border-radius: 24px; padding: 20px; margin-bottom: 16px; border: 1px solid rgba(139, 92, 246, 0.2); }
        .card h2 { font-size: 1.2rem; margin-bottom: 16px; border-left: 3px solid var(--primary); padding-left: 12px; }
        .campaign-form-group { margin-bottom: 16px; }
        .campaign-form-group label { display: block; font-size: 0.8rem; color: var(--gray-400); margin-bottom: 6px; }
        input, textarea { width: 100%; padding: 12px; background: rgba(20,20,30,0.8); border: 1px solid rgba(139,92,246,0.4); border-radius: 20px; color: white; font-size: 0.9rem; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; padding: 12px; border-radius: 60px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 8px; }
        .btn-secondary { background: linear-gradient(135deg, var(--gray-700), var(--gray-600)); color: white; border: none; padding: 10px; border-radius: 60px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 8px; }
        .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); padding: 10px 18px; border-radius: 60px; z-index: 2000; animation: slideUp 0.3s ease; max-width: 90%; text-align: center; font-size: 0.85rem; }
        @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        .badge { background: rgba(139, 92, 246, 0.2); padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; display: inline-block; }
        .streak-card { background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(234, 88, 12, 0.2)); border-radius: 28px; padding: 20px; text-align: center; margin-bottom: 16px; border: 1px solid var(--warning); }
        .streak-number { font-size: 2.5rem; font-weight: 800; color: var(--warning); }
        .daily-bonus-btn { background: linear-gradient(135deg, var(--warning), #ea580c); color: white; border: none; padding: 10px 20px; border-radius: 60px; font-weight: 700; cursor: pointer; margin-top: 12px; }
        .achievement-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .achievement-card { background: rgba(35, 35, 45, 0.8); border-radius: 20px; padding: 14px 10px; text-align: center; }
        .achievement-card.unlocked { background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(236, 72, 153, 0.2)); border-color: var(--primary); }
        .referral-code-box { background: rgba(0,0,0,0.5); padding: 12px; border-radius: 16px; font-family: monospace; text-align: center; border: 2px dashed var(--primary); cursor: pointer; }
        .empty-state { text-align: center; padding: 30px; color: var(--gray-400); }
        .campaign-item { background: rgba(35,35,45,0.8); border-radius: 18px; padding: 14px; margin-bottom: 12px; }
        .button-group { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .button-group button { flex: 1; min-width: 70px; }
        
        /* Embedded Video Player */
        .video-player-container {
            margin-top: 12px;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
        }
        .video-player-container iframe {
            width: 100%;
            height: 200px;
            border: none;
        }
        .watch-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: rgba(0,0,0,0.8);
            gap: 10px;
        }
        .watch-timer {
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--warning);
        }
        .watch-progress {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
            overflow: hidden;
        }
        .watch-progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.5s linear;
        }
        .skip-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .skip-btn:active { transform: scale(0.96); }
        .watch-status {
            font-size: 0.7rem;
            color: var(--gray-400);
            margin-top: 8px;
            text-align: center;
        }
        
        /* QR Modal */
        .qr-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10001; display: flex; align-items: center;
            justify-content: center; flex-direction: column;
        }
        #qr-reader { width: 100%; max-width: 100vw; }
        .close-qr { background: var(--danger); color: white; border: none; padding: 14px 28px; border-radius: 60px; margin-top: 24px; cursor: pointer; }
        
        /* QR Display */
        .qr-display-img {
            background: white;
            padding: 16px;
            border-radius: 20px;
            display: inline-block;
            margin: 10px 0;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .qr-display-img:active { transform: scale(0.98); }
        .fullscreen-qr {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 10002; display: flex;
            align-items: center; justify-content: center; flex-direction: column;
        }
    </style>
</head>
<body>
    <div class="signin-overlay" id="signinOverlay">
        <div class="signin-card">
            <div style="font-size: 3.5rem;">🏆</div>
            <h2>ViewSwap</h2>
            <p>Embedded Videos • QR Referrals</p>
            <button class="google-signin-btn" id="signInBtn">🟢 Sign in with Google</button>
            <button class="qr-signin-btn" id="qrSignInBtn">📷 Scan QR Code to Refer</button>
        </div>
    </div>

    <div id="mainAppContent">
        <div class="container">
            <div class="header">
                <h1>🏆 ViewSwap</h1>
                <p>Watch • Earn • Refer</p>
                <div class="online-badge" id="onlineCountBadge">👥 Loading...</div>
            </div>
            <div id="pageContent"></div>
        </div>
        <div class="bottom-nav">
            <button class="nav-item active" data-page="home"><div class="nav-icon">🏠</div><div class="nav-label">Home</div></button>
            <button class="nav-item" data-page="campaign"><div class="nav-icon">📢</div><div class="nav-label">Campaign</div></button>
            <button class="nav-item" data-page="rewards"><div class="nav-icon">🎁</div><div class="nav-label">Rewards</div></button>
            <button class="nav-item" data-page="account"><div class="nav-icon">👤</div><div class="nav-label">Account</div></button>
            <button class="nav-item" data-page="refer"><div class="nav-icon">🤝</div><div class="nav-label">Refer</div></button>
        </div>
    </div>

    <script type="module">
        const { initializeApp } = window.firebaseModules;
        const { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } = window.firebaseModules;
        const { getFirestore, doc, setDoc, getDoc, collection, query, getDocs, increment, runTransaction, arrayUnion, updateDoc, onSnapshot, serverTimestamp, where, orderBy } = window.firebaseModules;
        
        const firebaseConfig = {
            apiKey: "AIzaSyAupBkllyicDPD9O6CmX4mS4sF5z96mqxc",
            authDomain: "vertexpaste.firebaseapp.com",
            projectId: "vertexpaste",
            storageBucket: "vertexpaste.firebasestorage.app",
            messagingSenderId: "255275350380",
            appId: "1:255275350380:web:7be4e8add2cb5b04045b49"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        
        let currentUser = null;
        let userData = null;
        let currentPage = 'home';
        let activeUsersCount = 10;
        let allCampaigns = [];
        let activeWatchTimers = {};
        
        function updateActiveUsersCount() {
            const onlineQuery = query(collection(db, 'viewswap_online'), where('isOnline', '==', true));
            onSnapshot(onlineQuery, (snap) => { 
                activeUsersCount = Math.max(snap.size, 5);
                document.getElementById('onlineCountBadge').innerHTML = `👥 ${activeUsersCount} active`;
            }, (err) => { activeUsersCount = 10; });
        }
        
        async function loadAllCampaigns() {
            try {
                const campaignsQuery = query(collection(db, 'viewswap_campaigns'), orderBy('createdAt', 'desc'));
                const snapshot = await getDocs(campaignsQuery);
                allCampaigns = [];
                snapshot.forEach(doc => {
                    allCampaigns.push({ ...doc.data(), firestoreId: doc.id });
                });
                return allCampaigns;
            } catch (error) { return []; }
        }
        
        function setupCampaignsListener() {
            const campaignsQuery = query(collection(db, 'viewswap_campaigns'), orderBy('createdAt', 'desc'));
            onSnapshot(campaignsQuery, (snapshot) => {
                allCampaigns = [];
                snapshot.forEach(doc => {
                    allCampaigns.push({ ...doc.data(), firestoreId: doc.id });
                });
                if (currentPage === 'home') renderCurrentPage();
            });
        }
        
        function getEventMultiplier() { return 1.0; } // Removed random for consistency
        
        async function loadUserData(uid) {
            const ref = doc(db, 'viewswap_users', uid);
            const snap = await getDoc(ref);
            if (snap.exists()) {
                userData = snap.data();
                userData.achievements = userData.achievements || {};
                userData.streak = userData.streak || { current: 0, lastClaim: null, highest: 0 };
                userData.campaigns = userData.campaigns || [];
                userData.watchedVideos = userData.watchedVideos || [];
                userData.referrals = userData.referrals || [];
                userData.referralEarnings = userData.referralEarnings || 0;
            } else {
                userData = {
                    uid, email: currentUser.email, displayName: currentUser.displayName,
                    photoURL: currentUser.photoURL, credits: 100,
                    referralCode: 'REF' + uid.substring(0,8).toUpperCase(),
                    referredBy: null, referralEarnings: 0, totalEarned: 0,
                    watchedVideos: [], campaigns: [],
                    achievements: {}, streak: { current: 0, lastClaim: null, highest: 0 },
                    createdAt: new Date().toISOString()
                };
                await setDoc(ref, userData);
            }
            return userData;
        }
        
        async function saveUserData() { 
            if(currentUser) await setDoc(doc(db, 'viewswap_users', currentUser.uid), userData, { merge: true }); 
        }
        
        async function updateCredits(amount) { 
            userData.credits += amount; 
            if(amount > 0) userData.totalEarned += amount; 
            await saveUserData(); 
        }
        
        function extractVideoId(url) {
            if (!url) return null;
            const regex = /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([^&\n?#]+)/;
            const match = url.match(regex);
            return match ? match[1] : null;
        }
        
        function getYouTubeEmbedUrl(url) {
            const videoId = extractVideoId(url);
            return videoId ? `https://www.youtube.com/embed/${videoId}?autoplay=0&enablejsapi=1` : null;
        }
        
        async function createAdvancedCampaign(campaignData) {
            if (userData.credits < 15) { showToast('Need 15 credits', true); return false; }
            await updateCredits(-15);
            
            const videoId = extractVideoId(campaignData.url);
            const campaign = {
                id: Date.now().toString(),
                title: campaignData.title,
                url: campaignData.url,
                embedUrl: getYouTubeEmbedUrl(campaignData.url),
                channelUrl: campaignData.channelUrl || null,
                videoId: videoId,
                creatorId: currentUser.uid,
                creatorName: userData.displayName,
                creatorPhoto: userData.photoURL,
                createdAt: new Date().toISOString(),
                targetViews: Math.min(parseInt(campaignData.targetViews) || activeUsersCount, activeUsersCount * 2),
                targetWatchTime: parseInt(campaignData.targetWatchTime) || 30,
                targetLikes: parseInt(campaignData.targetLikes) || 10,
                targetSubs: campaignData.targetSubs ? parseInt(campaignData.targetSubs) : null,
                targetComments: campaignData.targetComments ? parseInt(campaignData.targetComments) : null,
                customCommentText: campaignData.customCommentText || null,
                currentViews: 0,
                currentWatchTime: 0,
                currentLikes: 0,
                currentSubs: 0,
                currentComments: 0,
                watchers: [],
                watcherWatchTime: {},
                viewReward: 10,
                watchTimeRewardPerSec: 1.9,
                likeReward: 2.8,
                subReward: 15,
                commentReward: 5,
                isActive: true
            };
            
            const campaignRef = doc(db, 'viewswap_campaigns', campaign.id);
            await setDoc(campaignRef, campaign);
            userData.campaigns = userData.campaigns || [];
            userData.campaigns.push(campaign);
            await saveUserData();
            showToast(`✅ Campaign "${campaignData.title}" created!`);
            return true;
        }
        
        // Watch tracking with timer and skip
        async function startWatchingCampaign(campaign) {
            if (!currentUser) { showToast('Sign in first', true); return; }
            
            const watchKey = `${campaign.id}_${currentUser.uid}`;
            if (activeWatchTimers[watchKey]) {
                showToast('Already watching this video!', true);
                return;
            }
            
            // Check if already fully watched this campaign
            if (campaign.watchers && campaign.watchers.includes(currentUser.uid)) {
                showToast('You already completed this campaign!', true);
                return;
            }
            
            const remainingWatchTime = Math.max(0, campaign.targetWatchTime - (campaign.watcherWatchTime?.[currentUser.uid] || 0));
            if (remainingWatchTime <= 0) {
                showToast('You already met watch time for this campaign!', true);
                return;
            }
            
            showToast(`⏱️ Watch for ${remainingWatchTime} seconds to earn credits!`, false);
            
            let elapsed = campaign.watcherWatchTime?.[currentUser.uid] || 0;
            const target = campaign.targetWatchTime;
            let interval = setInterval(async () => {
                elapsed++;
                
                // Update UI
                const progressEl = document.getElementById(`progress_${campaign.id}`);
                const timerEl = document.getElementById(`timer_${campaign.id}`);
                if (progressEl) progressEl.style.width = `${(elapsed / target) * 100}%`;
                if (timerEl) timerEl.textContent = `${Math.floor(elapsed)}/${target}s`;
                
                if (elapsed >= target) {
                    clearInterval(interval);
                    delete activeWatchTimers[watchKey];
                    
                    // Reward the user for completing watch time
                    const reward = target * campaign.watchTimeRewardPerSec;
                    await updateCredits(reward);
                    
                    // Update campaign stats
                    const campaignRef = doc(db, 'viewswap_campaigns', campaign.id);
                    const newWatchTime = (campaign.currentWatchTime || 0) + target;
                    await updateDoc(campaignRef, {
                        currentWatchTime: newWatchTime,
                        [`watcherWatchTime.${currentUser.uid}`]: target,
                        watchers: arrayUnion(currentUser.uid)
                    });
                    
                    // Record watched video
                    if (!userData.watchedVideos.includes(campaign.videoId)) {
                        userData.watchedVideos.push(campaign.videoId);
                        await saveUserData();
                    }
                    
                    // Reward creator
                    if (campaign.creatorId !== currentUser.uid) {
                        const creatorReward = Math.floor(reward * 0.1);
                        if (creatorReward > 0) {
                            await updateDoc(doc(db, 'viewswap_users', campaign.creatorId), { 
                                credits: increment(creatorReward), 
                                totalEarned: increment(creatorReward) 
                            });
                        }
                    }
                    
                    showToast(`✅ Watch complete! Earned ${reward.toFixed(1)} credits!`);
                    await checkAchievements();
                    renderCurrentPage();
                }
            }, 1000);
            
            activeWatchTimers[watchKey] = interval;
        }
        
        function skipWatchingCampaign(campaignId) {
            const watchKey = Object.keys(activeWatchTimers).find(key => key.startsWith(campaignId));
            if (watchKey && activeWatchTimers[watchKey]) {
                clearInterval(activeWatchTimers[watchKey]);
                delete activeWatchTimers[watchKey];
                showToast('⏹️ Watching stopped', false);
            }
        }
        
        async function interactWithCampaign(campaign, actionType) {
            if (!currentUser) return;
            const multiplier = getEventMultiplier();
            let reward = 0;
            let updateData = {};
            
            if (actionType === 'like') {
                if ((campaign.currentLikes || 0) >= (campaign.targetLikes || 0)) { 
                    showToast('Like target reached!', true); return; 
                }
                reward = campaign.likeReward * multiplier;
                await updateCredits(reward);
                updateData = { currentLikes: (campaign.currentLikes || 0) + 1 };
                showToast(`❤️ Liked! +${reward.toFixed(1)} credits`);
            }
            else if (actionType === 'subscribe' && campaign.channelUrl) {
                if (campaign.targetSubs && (campaign.currentSubs || 0) >= campaign.targetSubs) { 
                    showToast('Subscribe target reached!', true); return; 
                }
                reward = campaign.subReward * multiplier;
                await updateCredits(reward);
                updateData = { currentSubs: (campaign.currentSubs || 0) + 1 };
                window.open(campaign.channelUrl, '_blank');
                showToast(`🔔 Subscribed! +${reward.toFixed(1)} credits`);
            }
            else if (actionType === 'comment' && campaign.customCommentText) {
                if (campaign.targetComments && (campaign.currentComments || 0) >= campaign.targetComments) { 
                    showToast('Comment target reached!', true); return; 
                }
                reward = campaign.commentReward * multiplier;
                await updateCredits(reward);
                updateData = { currentComments: (campaign.currentComments || 0) + 1 };
                showToast(`💬 Commented! +${reward.toFixed(1)} credits`);
            }
            
            if (Object.keys(updateData).length > 0) {
                const campaignRef = doc(db, 'viewswap_campaigns', campaign.id || campaign.firestoreId);
                await updateDoc(campaignRef, updateData);
                if (reward > 0 && campaign.creatorId !== currentUser.uid) {
                    const creatorReward = Math.floor(reward * 0.1);
                    if (creatorReward > 0) {
                        await updateDoc(doc(db, 'viewswap_users', campaign.creatorId), { credits: increment(creatorReward), totalEarned: increment(creatorReward) });
                    }
                }
                await checkAchievements();
                renderCurrentPage();
            }
        }
        
        window.interactWithCampaign = interactWithCampaign;
        window.startWatchingCampaign = startWatchingCampaign;
        window.skipWatchingCampaign = skipWatchingCampaign;
        
        async function checkAchievements() {
            const campaignCount = userData.campaigns?.length || 0;
            const watchedCount = userData.watchedVideos?.length || 0;
            const referralCount = userData.referrals?.length || 0;
            const streak = userData.streak?.current || 0;
            
            if (streak >= 1 && !userData.achievements.streak1) {
                userData.achievements.streak1 = true;
                await updateCredits(15);
                showToast('🏆 Streak Starter! +15 credits');
            }
            if (campaignCount >= 1 && !userData.achievements.campaign1) {
                userData.achievements.campaign1 = true;
                await updateCredits(20);
                showToast('🏆 First Campaign! +20 credits');
            }
            if (watchedCount >= 10 && !userData.achievements.watcher10) {
                userData.achievements.watcher10 = true;
                await updateCredits(20);
                showToast('🏆 Active Watcher! +20 credits');
            }
            if (referralCount >= 1 && !userData.achievements.refer1) {
                userData.achievements.refer1 = true;
                await updateCredits(25);
                showToast('🏆 First Referral! +25 credits');
            }
            await saveUserData();
        }
        
        async function claimDailyBonus() {
            const lastClaim = userData.streak?.lastClaim ? new Date(userData.streak.lastClaim) : null;
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            let newStreak = 1;
            if (lastClaim) {
                if (lastClaim.toDateString() === yesterday.toDateString()) newStreak = (userData.streak.current || 0) + 1;
                else if (lastClaim.toDateString() === today.toDateString()) { showToast('Already claimed today!'); return; }
            }
            const bonusAmount = 25 + Math.floor(newStreak / 7) * 10;
            await updateCredits(bonusAmount);
            userData.streak = { current: newStreak, lastClaim: today.toISOString(), highest: Math.max(newStreak, userData.streak?.highest || 0) };
            await saveUserData();
            showToast(`🎁 Daily: +${bonusAmount} credits | Streak: ${newStreak} days`);
            renderCurrentPage();
        }
        
        async function processQRReferral(referrerCode) {
            if (!currentUser) return false;
            if (userData.referredBy) { showToast('Already have a referrer', true); return false; }
            const q = query(collection(db, 'viewswap_users'), where('referralCode', '==', referrerCode));
            const snapshot = await getDocs(q);
            if (!snapshot.empty) {
                const referrerId = snapshot.docs[0].id;
                if (referrerId !== currentUser.uid) {
                    userData.referredBy = referrerId;
                    await saveUserData();
                    await updateDoc(doc(db, 'viewswap_users', referrerId), { referrals: arrayUnion(currentUser.uid) });
                    await updateCredits(10);
                    showToast(`🎉 Referral success! +10 credits`);
                    return true;
                }
            }
            return false;
        }
        
        // QR Scanner
        let activeScanner = null;
        function showQRScanner(onSuccess) {
            const modal = document.createElement('div');
            modal.className = 'qr-modal';
            modal.innerHTML = `<div style="width:100%; padding:20px;"><div id="qr-reader-scanner" style="width:100%;"></div><button class="close-qr" id="closeScannerBtn">Close</button></div>`;
            document.body.appendChild(modal);
            const scanner = new Html5Qrcode("qr-reader-scanner");
            activeScanner = scanner;
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 280, height: 280 } }, (text) => {
                scanner.stop();
                modal.remove();
                onSuccess(text);
            }, (err) => {});
            document.getElementById('closeScannerBtn').onclick = () => { scanner.stop(); modal.remove(); };
        }
        
        function showFullscreenQR(qrUrl) {
            const modal = document.createElement('div');
            modal.className = 'fullscreen-qr';
            modal.innerHTML = `<div style="background:#1a1a2e; padding:30px; border-radius:40px; text-align:center;"><img src="${qrUrl}" width="250" height="250" style="border-radius:20px;"><button class="close-qr" id="closeFullQr" style="margin-top:20px;">Close</button></div>`;
            document.body.appendChild(modal);
            document.getElementById('closeFullQr').onclick = () => modal.remove();
        }
        
        function generateQRCodeURL(data) {
            return `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(data)}`;
        }
        
        // Rendering
        async function renderHome() {
            await loadAllCampaigns();
            const availableCampaigns = allCampaigns.filter(c => c.creatorId !== currentUser?.uid);
            
            let html = `<div class="streak-card"><div>🔥 Current Streak</div><div class="streak-number">${userData?.streak?.current || 0} days</div><button class="daily-bonus-btn" id="dailyBonusBtn">🎁 Claim Daily Bonus</button></div>`;
            html += `<div class="card"><h2>🎬 Watch & Earn (No Limits!)</h2>`;
            if (availableCampaigns.length === 0) {
                html += '<div class="empty-state">No campaigns available. Create one in Campaign tab!</div>';
            } else {
                html += availableCampaigns.map(c => renderCampaignWithPlayer(c)).join('');
            }
            html += `</div>`;
            return html;
        }
        
        function renderCampaignWithPlayer(c) {
            const embedUrl = getYouTubeEmbedUrl(c.url);
            const remainingTime = Math.max(0, c.targetWatchTime - (c.watcherWatchTime?.[currentUser?.uid] || 0));
            const alreadyCompleted = c.watchers?.includes(currentUser?.uid);
            
            return `
                <div class="campaign-item">
                    <div style="font-weight:bold; margin-bottom:8px;">${escapeHtml(c.title)}</div>
                    <div class="badge" style="margin:8px 0;">by ${escapeHtml(c.creatorName)}</div>
                    <div class="stat-row"><span>👁️ Views:</span><span>${c.currentViews || 0}/${c.targetViews}</span></div>
                    <div class="stat-row"><span>❤️ Likes:</span><span>${c.currentLikes || 0}/${c.targetLikes}</span></div>
                    <div class="badge">💰 ${c.viewReward}/view | ${c.watchTimeRewardPerSec}/sec | ${c.likeReward}/like</div>
                    
                    ${embedUrl ? `
                        <div class="video-player-container">
                            <iframe src="${embedUrl}" frameborder="0" allowfullscreen></iframe>
                            <div class="watch-controls">
                                <span class="watch-timer" id="timer_${c.id}">${alreadyCompleted ? 'Completed!' : `${remainingTime}/${c.targetWatchTime}s`}</span>
                                <div class="watch-progress"><div class="watch-progress-fill" id="progress_${c.id}" style="width:${((c.watcherWatchTime?.[currentUser?.uid] || 0) / c.targetWatchTime) * 100}%"></div></div>
                                ${!alreadyCompleted ? `<button class="skip-btn" onclick="skipWatchingCampaign('${c.id}')">⏹️ Skip</button>` : ''}
                            </div>
                        </div>
                        <div class="watch-status">
                            ${!alreadyCompleted ? `⏱️ Need to watch ${remainingTime} seconds to earn credits!` : '✅ You completed this campaign!'}
                        </div>
                    ` : `<div class="empty-state">⚠️ Invalid video URL</div>`}
                    
                    <div class="button-group">
                        ${!alreadyCompleted ? `<button class="btn-primary" onclick="startWatchingCampaign(${JSON.stringify(c).replace(/"/g, '&quot;')})">▶️ Start Watching</button>` : ''}
                        <button class="btn-secondary" onclick="interactWithCampaign(${JSON.stringify(c).replace(/"/g, '&quot;')}, 'like')">❤️ Like</button>
                        ${c.channelUrl ? `<button class="btn-secondary" onclick="interactWithCampaign(${JSON.stringify(c).replace(/"/g, '&quot;')}, 'subscribe')">🔔 Subscribe</button>` : ''}
                        ${c.customCommentText ? `<button class="btn-secondary" onclick="interactWithCampaign(${JSON.stringify(c).replace(/"/g, '&quot;')}, 'comment')">💬 Comment</button>` : ''}
                    </div>
                </div>
            `;
        }
        
        function renderCampaignPage() {
            return `<div class="card">
                <h2>🚀 Create Campaign</h2>
                <div class="campaign-form-group"><label>Campaign Title *</label><input id="campTitle" placeholder="Epic Video Campaign"></div>
                <div class="campaign-form-group"><label>YouTube URL *</label><input id="campUrl" placeholder="https://youtube.com/watch?v=..."></div>
                <div class="campaign-form-group"><label>Channel URL (for subscribe)</label><input id="channelUrl" placeholder="https://youtube.com/@channel"></div>
                <div class="campaign-form-group"><label>Target Views</label><input id="targetViews" type="number" value="${activeUsersCount}"></div>
                <div class="campaign-form-group"><label>Target Watch Time (seconds)</label><input id="targetWatchTime" type="number" value="30"></div>
                <div class="campaign-form-group"><label>Target Likes</label><input id="targetLikes" type="number" value="10"></div>
                <div class="campaign-form-group"><label>Target Subscribers (optional)</label><input id="targetSubs" type="number" placeholder="Optional"></div>
                <div class="campaign-form-group"><label>Custom Comment Text</label><textarea id="commentText" placeholder="Type comment here..." rows="2"></textarea></div>
                <div class="campaign-form-group"><label>How many comments?</label><input id="targetComments" type="number" placeholder="Optional"></div>
                <button class="btn-primary" id="createAdvancedBtn">✨ Launch Campaign (15 credits)</button>
            </div>`;
        }
        
        function renderRewardsPage() {
            const streak = userData?.streak?.current||0, campCount=userData?.campaigns?.length||0, watched=userData?.watchedVideos?.length||0, referralCount=userData?.referrals?.length||0;
            return `<div class="card"><h2>🏆 Achievements</h2><div class="achievement-grid">
                <div class="achievement-card ${userData?.achievements?.streak1?'unlocked':''}"><div>🔥 1 Day Streak</div>${userData?.achievements?.streak1?'✓':'🔒'}</div>
                <div class="achievement-card ${userData?.achievements?.campaign1?'unlocked':''}"><div>📢 First Campaign</div>${userData?.achievements?.campaign1?'✓':'🔒'}</div>
                <div class="achievement-card ${userData?.achievements?.watcher10?'unlocked':''}"><div>👁️ Active Watcher</div>${userData?.achievements?.watcher10?'✓':'🔒'}</div>
                <div class="achievement-card ${userData?.achievements?.refer1?'unlocked':''}"><div>🤝 First Referral</div>${userData?.achievements?.refer1?'✓':'🔒'}</div>
            </div></div>
            <div class="card"><h2>📊 Stats</h2><div class="stat-row"><span>💰 Balance:</span><span>${Math.floor(userData?.credits||0)}</span></div>
            <div class="stat-row"><span>📢 Campaigns:</span><span>${campCount}</span></div>
            <div class="stat-row"><span>👀 Videos Watched:</span><span>${watched}</span></div>
            <div class="stat-row"><span>🤝 Referrals:</span><span>${referralCount}</span></div>
            <div class="stat-row"><span>💎 Total Earned:</span><span>${Math.floor(userData?.totalEarned||0)}</span></div></div>`;
        }
        
        function renderAccountPage() {
            const qrUrl = generateQRCodeURL(`VIEWSWAP_REF:${userData?.referralCode}`);
            return `<div class="card"><div class="account-info"><img src="${currentUser?.photoURL}" style="width:70px;height:70px;border-radius:50%;border:3px solid var(--primary);"><div style="margin-top:10px;font-weight:bold;">${escapeHtml(currentUser?.displayName)}</div><div>${currentUser?.email}</div></div></div>
            <div class="card"><h2>💰 Balance</h2><div style="font-size:2rem;text-align:center;">${Math.floor(userData?.credits||0)} credits</div></div>
            <div class="card"><h2>🔗 Your QR Code</h2><div class="qr-display-img" id="qrDisplay"><img src="${qrUrl}" width="120" height="120"></div>
            <div class="referral-code-box" id="refCode">${userData?.referralCode}</div>
            <button class="btn-primary" id="copyCodeBtn">📋 Copy Code</button></div>
            <button class="btn-secondary" id="signOutBtn">🚪 Sign Out</button>`;
        }
        
        function renderReferPage() {
            const qrUrl = generateQRCodeURL(`VIEWSWAP_REF:${userData?.referralCode}`);
            return `<div class="card"><h2>🤝 Referral Program</h2><div style="background:linear-gradient(135deg,var(--warning),#ea580c);border-radius:20px;padding:12px;text-align:center;margin-bottom:16px;">🎁 5% commission on everything!</div>
            <div class="qr-display-img" id="qrDisplayRefer"><img src="${qrUrl}" width="150" height="150"></div>
            <div class="referral-code-box" id="refCodeRefer">${userData?.referralCode}</div>
            <button class="btn-primary" id="copyReferBtn">📋 Copy Code</button>
            <button class="btn-secondary" id="scanQrBtn">📷 Scan QR to Refer Someone</button>
            <div class="stat-row" style="margin-top:16px;"><span>💰 Commission Earned:</span><span style="color:gold;">${Math.floor(userData?.referralEarnings||0)} credits</span></div></div>`;
        }
        
        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
        
        async function renderCurrentPage() {
            const container = document.getElementById('pageContent');
            if(!container) return;
            if(currentPage === 'home'){ 
                container.innerHTML = await renderHome(); 
                document.getElementById('dailyBonusBtn')?.addEventListener('click', claimDailyBonus);
            }
            else if(currentPage === 'campaign'){ 
                container.innerHTML = renderCampaignPage(); 
                document.getElementById('createAdvancedBtn')?.addEventListener('click', async () => {
                    const title = document.getElementById('campTitle')?.value;
                    const url = document.getElementById('campUrl')?.value;
                    if(!title || !url) { showToast('Title and URL required', true); return; }
                    await createAdvancedCampaign({
                        title, url,
                        channelUrl: document.getElementById('channelUrl')?.value,
                        targetViews: document.getElementById('targetViews')?.value,
                        targetWatchTime: document.getElementById('targetWatchTime')?.value,
                        targetLikes: document.getElementById('targetLikes')?.value,
                        targetSubs: document.getElementById('targetSubs')?.value,
                        customCommentText: document.getElementById('commentText')?.value,
                        targetComments: document.getElementById('targetComments')?.value
                    });
                    showToast('Campaign created! Check Home page');
                });
            }
            else if(currentPage === 'rewards') container.innerHTML = renderRewardsPage();
            else if(currentPage === 'account'){ 
                container.innerHTML = renderAccountPage(); 
                const qrUrl = generateQRCodeURL(`VIEWSWAP_REF:${userData?.referralCode}`);
                document.getElementById('qrDisplay')?.addEventListener('click', () => showFullscreenQR(qrUrl));
                document.getElementById('copyCodeBtn')?.addEventListener('click',()=>{ navigator.clipboard.writeText(userData?.referralCode); showToast('Copied!'); });
                document.getElementById('signOutBtn')?.addEventListener('click',async()=>await signOut(auth));
            }
            else if(currentPage === 'refer'){ 
                container.innerHTML = renderReferPage(); 
                const qrUrl = generateQRCodeURL(`VIEWSWAP_REF:${userData?.referralCode}`);
                document.getElementById('qrDisplayRefer')?.addEventListener('click', () => showFullscreenQR(qrUrl));
                document.getElementById('copyReferBtn')?.addEventListener('click',()=>{ navigator.clipboard.writeText(userData?.referralCode); showToast('Code copied'); });
                document.getElementById('scanQrBtn')?.addEventListener('click',()=>{
                    showQRScanner(async (code) => {
                        if (code.startsWith('VIEWSWAP_REF:')) {
                            const refCode = code.split(':')[1];
                            await processQRReferral(refCode);
                        } else { showToast('Invalid QR code', true); }
                    });
                });
            }
        }
        
        function showToast(msg, isErr=false) { 
            const t=document.createElement('div'); t.className='toast'; 
            if(isErr) t.style.background='rgba(239,68,68,0.95)'; t.textContent=msg; 
            document.body.appendChild(t); setTimeout(()=>t.remove(), 3000);
        }
        
        document.querySelectorAll('.nav-item').forEach(btn=>btn.addEventListener('click',()=>{ 
            currentPage=btn.dataset.page; 
            document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active')); 
            btn.classList.add('active'); renderCurrentPage(); 
        }));
        
        function initOnlineTracking() { 
            updateActiveUsersCount(); 
            const statusRef=doc(db,'viewswap_online',currentUser?.uid); 
            const update=async()=>{ if(currentUser) await setDoc(statusRef,{uid:currentUser.uid,isOnline:true,lastSeen:serverTimestamp()},{merge:true}); }; 
            update(); setInterval(update, 30000); 
            window.addEventListener('beforeunload',()=>setDoc(statusRef,{isOnline:false},{merge:true}));
        }
        
        onAuthStateChanged(auth, async(user)=>{ 
            if(user){ 
                currentUser=user; 
                await loadUserData(user.uid); 
                document.body.classList.add('authenticated'); 
                initOnlineTracking();
                setupCampaignsListener();
                renderCurrentPage(); 
            } else { 
                document.body.classList.remove('authenticated'); 
                currentUser=null; 
                userData=null; 
            } 
        });
        
        document.getElementById('signInBtn')?.addEventListener('click',()=>signInWithPopup(auth,provider));
        document.getElementById('qrSignInBtn')?.addEventListener('click',()=>{
            showQRScanner(async (code) => {
                if (!currentUser) {
                    sessionStorage.setItem('pendingReferral', code);
                    await signInWithPopup(auth, provider);
                } else {
                    if (code.startsWith('VIEWSWAP_REF:')) {
                        await processQRReferral(code.split(':')[1]);
                    }
                }
            });
        });
        
        const pendingRef = sessionStorage.getItem('pendingReferral');
        if (pendingRef) {
            setTimeout(async () => {
                if (currentUser && !userData?.referredBy) {
                    await processQRReferral(pendingRef);
                    sessionStorage.removeItem('pendingReferral');
                }
            }, 2000);
        }
    </script>
</body>
</html>
