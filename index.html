<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>ViewSwap - Smart Campaign Limits</title>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, where, getDocs, increment, runTransaction, arrayUnion, deleteDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        window.firebaseModules = {
            initializeApp, getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged,
            getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, where, getDocs, increment, runTransaction, arrayUnion, deleteDoc, onSnapshot, serverTimestamp
        };
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --primary-light: #a78bfa;
            --secondary: #ec489a;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --youtube: #ff0000;
            --dark: #0f0f0f;
            --gray-800: #1f1f1f;
            --gray-700: #2a2a2a;
            --gray-600: #3a3a3a;
            --gray-400: #9ca3af;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            min-height: 100vh;
            color: var(--white);
            position: relative;
            padding-bottom: 80px;
        }

        .signin-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0f 0%, #14141f 100%);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            transition: all 0.4s ease;
        }
        
        body.authenticated .signin-overlay { display: none; }
        
        #mainAppContent {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        
        body.authenticated #mainAppContent {
            opacity: 1;
            visibility: visible;
        }
        
        .signin-card {
            background: rgba(30, 30, 40, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 48px 32px;
            text-align: center;
            border: 1px solid rgba(139, 92, 246, 0.5);
            max-width: 420px;
            width: 90%;
            animation: fadeInUp 0.5s ease;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .google-signin-btn {
            background: linear-gradient(135deg, #4285f4, #34a853);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 1.1rem;
            transition: transform 0.2s;
            margin-top: 8px;
        }
        
        .google-signin-btn:active { transform: scale(0.97); }
        
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .particle {
            position: absolute;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            animation: float linear infinite;
            opacity: 0.3;
        }
        
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            padding: 0 16px 20px;
        }
        
        .header {
            background: rgba(15, 15, 26, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 0 0 32px 32px;
            padding: 20px;
            margin: -16px -16px 20px -16px;
            text-align: center;
            border-bottom: 1px solid rgba(139, 92, 246, 0.3);
        }
        
        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #fff, var(--primary-light), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .online-badge {
            background: rgba(16, 185, 129, 0.2);
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            display: inline-block;
            margin-top: 8px;
            border: 1px solid var(--success);
        }
        
        .credit-card {
            background: linear-gradient(135deg, rgba(30, 30, 40, 0.95), rgba(20, 20, 30, 0.95));
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid rgba(139, 92, 246, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .credit-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--warning));
        }
        
        .credit-amount {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-light), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 8px 0;
        }
        
        .daily-bonus {
            background: linear-gradient(135deg, var(--warning), #ea580c);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8rem;
        }
        
        .user-card {
            background: rgba(30, 30, 40, 0.9);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid var(--primary);
        }
        
        .signout-btn {
            background: var(--danger);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            border: none;
            color: white;
            cursor: pointer;
            margin-left: auto;
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 15, 26, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 8px 16px 20px;
            border-top: 1px solid rgba(139, 92, 246, 0.3);
            max-width: 500px;
            margin: 0 auto;
            z-index: 100;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 40px;
            flex: 1;
            color: var(--gray-400);
            transition: all 0.2s;
        }
        
        .nav-item.active {
            color: white;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(236, 72, 153, 0.2));
        }
        
        .nav-icon { font-size: 1.5rem; }
        .nav-label { font-size: 0.65rem; font-weight: 600; }
        
        .card {
            background: rgba(30, 30, 40, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }
        
        .card h2 {
            font-size: 1.2rem;
            margin-bottom: 16px;
            border-left: 3px solid var(--primary);
            padding-left: 12px;
        }
        
        .campaign-item {
            background: rgba(35, 35, 45, 0.8);
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 12px;
        }
        
        .campaign-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 6px;
        }
        
        .campaign-url {
            font-size: 0.7rem;
            color: var(--primary-light);
            word-break: break-all;
            margin-bottom: 10px;
        }
        
        .limit-info {
            background: rgba(139, 92, 246, 0.2);
            border-radius: 12px;
            padding: 8px;
            margin: 10px 0;
            font-size: 0.7rem;
            text-align: center;
        }
        
        .progress-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 8px;
            margin: 8px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s;
        }
        
        .badge-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 10px 0;
        }
        
        .badge {
            background: rgba(139, 92, 246, 0.2);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        
        input, select {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            background: rgba(35, 35, 45, 0.9);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 20px;
            color: white;
            font-size: 0.9rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        
        .btn-primary:active { transform: scale(0.97); }
        
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 60px;
            z-index: 2000;
            animation: slideUp 0.3s ease;
            max-width: 90%;
            text-align: center;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--gray-400);
        }
        
        .slider-control {
            margin: 15px 0;
        }
        
        .slider-control label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }
        
        input[type="range"] {
            width: 100%;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(139, 92, 246, 0.3);
            border-radius: 5px;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
        }
        
        .slider-value {
            text-align: center;
            margin-top: 8px;
            font-weight: bold;
            color: var(--primary-light);
        }
        
        .max-limit-warning {
            color: var(--warning);
            font-size: 0.7rem;
            margin-top: 4px;
        }
        
        .watch-btn {
            background: linear-gradient(135deg, var(--youtube), #cc0000);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            font-size: 0.85rem;
            transition: transform 0.2s;
        }
        
        .watch-btn:active { transform: scale(0.97); }
        .watch-btn.disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="signin-overlay" id="signinOverlay">
        <div class="signin-card">
            <div style="font-size: 4rem;">🎬</div>
            <h2>ViewSwap</h2>
            <p>Smart Campaign Limits • Max = Active Users</p>
            <button class="google-signin-btn" id="signInBtn">🟢 Sign in with Google</button>
            <div class="status-badge">🔐 Campaign likes/subs limited to active users</div>
        </div>
    </div>

    <div id="mainAppContent">
        <div class="bg-particles" id="particles"></div>
        <div class="container">
            <div class="header">
                <h1>🎬 ViewSwap</h1>
                <p>Smart Limits • Max Engagement = Active Users</p>
                <div class="online-badge" id="onlineCountBadge">👥 Loading users...</div>
            </div>

            <div class="credit-card">
                <div class="credit-label">💰 YOUR CREDITS</div>
                <div class="credit-amount" id="creditBalance">0</div>
                <button class="daily-bonus" id="dailyBonusBtn">🎁 Daily Bonus (+50)</button>
            </div>

            <div class="user-card">
                <div class="user-info">
                    <img id="userAvatar" class="user-avatar" src="">
                    <div style="flex: 1;">
                        <div id="userName" style="font-weight: bold;"></div>
                        <div id="userEmail" style="font-size: 0.7rem; color: var(--gray-400);"></div>
                    </div>
                    <button class="signout-btn" id="signOutBtn">Sign Out</button>
                </div>
            </div>

            <div id="pageContent"></div>
        </div>

        <div class="bottom-nav">
            <button class="nav-item active" data-page="home"><div class="nav-icon">🏠</div><div class="nav-label">Home</div></button>
            <button class="nav-item" data-page="campaign"><div class="nav-icon">📢</div><div class="nav-label">Campaign</div></button>
            <button class="nav-item" data-page="refer"><div class="nav-icon">🤝</div><div class="nav-label">Refer</div></button>
            <button class="nav-item" data-page="help"><div class="nav-icon">💬</div><div class="nav-label">Help</div></button>
        </div>
    </div>

    <script type="module">
        const { initializeApp } = window.firebaseModules;
        const { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } = window.firebaseModules;
        const { getFirestore, doc, setDoc, getDoc, collection, query, getDocs, increment, runTransaction, arrayUnion, updateDoc, onSnapshot, serverTimestamp, deleteDoc, where } = window.firebaseModules;
        
        const firebaseConfig = {
            apiKey: "AIzaSyAupBkllyicDPD9O6CmX4mS4sF5z96mqxc",
            authDomain: "vertexpaste.firebaseapp.com",
            projectId: "vertexpaste",
            storageBucket: "vertexpaste.firebasestorage.app",
            messagingSenderId: "255275350380",
            appId: "1:255275350380:web:7be4e8add2cb5b04045b49"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        
        let currentUser = null;
        let userData = null;
        let currentPage = 'home';
        let activeUsersCount = 0;
        let activeUsersList = [];
        
        // Track online users - completely separate from other sites
        function initOnlineTracking() {
            const userStatusRef = doc(db, 'viewswap_online', currentUser?.uid || 'temp');
            
            const updateOnlineStatus = async () => {
                if (!currentUser) return;
                await setDoc(doc(db, 'viewswap_online', currentUser.uid), {
                    uid: currentUser.uid,
                    displayName: userData?.displayName || currentUser.displayName,
                    lastSeen: serverTimestamp(),
                    isOnline: true
                }, { merge: true });
            };
            
            updateOnlineStatus();
            const interval = setInterval(updateOnlineStatus, 30000);
            
            window.addEventListener('beforeunload', async () => {
                if (currentUser) {
                    await setDoc(doc(db, 'viewswap_online', currentUser.uid), {
                        isOnline: false,
                        lastSeen: serverTimestamp()
                    }, { merge: true });
                }
            });
            
            // Listen for active users count
            const onlineQuery = query(collection(db, 'viewswap_online'), where('isOnline', '==', true));
            const unsubscribe = onSnapshot(onlineQuery, (snapshot) => {
                activeUsersList = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.uid !== currentUser?.uid) {
                        activeUsersList.push(data);
                    }
                });
                activeUsersCount = snapshot.size;
                document.getElementById('onlineCountBadge').innerHTML = `👥 ${activeUsersCount} active ${activeUsersCount === 1 ? 'user' : 'users'} online`;
            });
            
            return () => {
                clearInterval(interval);
                unsubscribe();
            };
        }
        
        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
        
        function extractVideoId(url) {
            const regex = /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/;
            const match = url.match(regex);
            return match ? match[1] : null;
        }
        
        async function loadUserData(uid) {
            const ref = doc(db, 'viewswap_users', uid);
            const snap = await getDoc(ref);
            if (snap.exists()) {
                userData = snap.data();
            } else {
                userData = {
                    uid, email: currentUser.email, displayName: currentUser.displayName,
                    photoURL: currentUser.photoURL, credits: 100,
                    referralCode: 'REF' + uid.substring(0,6).toUpperCase(),
                    referredBy: null, referralEarnings: 0, totalEarned: 0,
                    watchedVideos: [], campaigns: [],
                    lastDailyBonus: null, createdAt: new Date().toISOString()
                };
                await setDoc(ref, userData);
            }
            document.getElementById('creditBalance').innerText = Math.floor(userData.credits);
            return userData;
        }
        
        async function saveUserData() {
            if(currentUser) await setDoc(doc(db, 'viewswap_users', currentUser.uid), userData, { merge: true });
            document.getElementById('creditBalance').innerText = Math.floor(userData.credits);
        }
        
        async function updateCredits(amount) {
            userData.credits += amount;
            if(amount > 0) userData.totalEarned += amount;
            await saveUserData();
            return true;
        }
        
        async function claimDailyBonus() {
            const last = userData.lastDailyBonus ? new Date(userData.lastDailyBonus) : null;
            const today = new Date();
            if(last && last.toDateString() === today.toDateString()) {
                showToast('Already claimed today!');
                return;
            }
            await updateCredits(50);
            userData.lastDailyBonus = today.toISOString();
            await saveUserData();
            showToast('🎁 Daily bonus +50 credits!');
            renderCurrentPage();
        }
        
        // Create campaign with intelligent limits based on active users
        async function createCampaign(title, url, targetLikes, targetSubs) {
            const videoId = extractVideoId(url);
            if (!videoId) { showToast('Invalid YouTube URL'); return false; }
            
            // Max limit = active users count (excluding self)
            const maxPossible = Math.max(1, activeUsersCount - 1);
            
            if (targetLikes > maxPossible) {
                showToast(`Max likes limited to ${maxPossible} (active users online)`);
                return false;
            }
            if (targetSubs > maxPossible) {
                showToast(`Max subscribers limited to ${maxPossible} (active users online)`);
                return false;
            }
            
            const totalCost = (targetLikes * 2) + (targetSubs * 5);
            if (userData.credits < totalCost) {
                showToast(`Need ${totalCost} credits! You have ${userData.credits}`);
                return false;
            }
            
            await updateCredits(-totalCost);
            
            const campaign = {
                id: Date.now().toString(),
                title, url, videoId,
                targetLikes: targetLikes,
                targetSubs: targetSubs,
                currentLikes: 0,
                currentSubs: 0,
                creatorId: currentUser.uid,
                creatorName: userData.displayName,
                createdAt: new Date().toISOString(),
                watchers: [],
                completed: false
            };
            
            userData.campaigns = userData.campaigns || [];
            userData.campaigns.push(campaign);
            await saveUserData();
            
            const campaignRef = doc(db, 'viewswap_campaigns', campaign.id);
            await setDoc(campaignRef, campaign);
            
            showToast(`✅ Campaign created! Cost: ${totalCost} credits | Max likes/subs: ${maxPossible}`);
            renderCurrentPage();
            return true;
        }
        
        // Watch campaign and perform like/sub actions (simulated with limit checks)
        async function watchCampaign(campaign) {
            if (userData.watchedVideos?.includes(campaign.videoId)) {
                showToast('You already engaged with this video!');
                return;
            }
            if (campaign.creatorId === currentUser.uid) {
                showToast("Can't engage with your own video");
                return;
            }
            
            // Check if campaign is already completed
            const likesLeft = campaign.targetLikes - campaign.currentLikes;
            const subsLeft = campaign.targetSubs - campaign.currentSubs;
            
            if (likesLeft <= 0 && subsLeft <= 0) {
                showToast('This campaign has reached its limits!');
                return;
            }
            
            // Open YouTube
            window.open(campaign.url, '_blank');
            
            let rewardEarned = 0;
            let liked = false;
            let subscribed = false;
            
            // Simulate like if needed
            if (likesLeft > 0) {
                liked = true;
                rewardEarned += 2;
            }
            
            // Simulate subscribe if needed
            if (subsLeft > 0) {
                subscribed = true;
                rewardEarned += 5;
            }
            
            if (rewardEarned > 0) {
                await updateCredits(rewardEarned);
                showToast(`🎬 +${rewardEarned} credits! ${liked ? '👍 Liked' : ''} ${subscribed ? '🔔 Subscribed' : ''}`);
            }
            
            // Mark as watched
            userData.watchedVideos = userData.watchedVideos || [];
            userData.watchedVideos.push(campaign.videoId);
            await saveUserData();
            
            // Update campaign progress
            const campaignRef = doc(db, 'viewswap_campaigns', campaign.id);
            const updates = {};
            if (liked) updates.currentLikes = increment(1);
            if (subscribed) updates.currentSubs = increment(1);
            updates.watchers = arrayUnion(currentUser.uid);
            await updateDoc(campaignRef, updates);
            
            // Update local campaign data
            if (liked) campaign.currentLikes++;
            if (subscribed) campaign.currentSubs++;
            
            // Reward creator with 1 credit per engagement
            const creatorRef = doc(db, 'viewswap_users', campaign.creatorId);
            await runTransaction(db, async (transaction) => {
                const creatorSnap = await transaction.get(creatorRef);
                if (creatorSnap.exists()) {
                    let creatorReward = 0;
                    if (liked) creatorReward += 1;
                    if (subscribed) creatorReward += 1;
                    if (creatorReward > 0) {
                        transaction.update(creatorRef, { credits: increment(creatorReward), totalEarned: increment(creatorReward) });
                    }
                }
            });
            
            // Update user's campaigns list
            const userCampaignIndex = userData.campaigns?.findIndex(c => c.id === campaign.id);
            if (userCampaignIndex !== -1) {
                userData.campaigns[userCampaignIndex] = campaign;
                await saveUserData();
            }
            
            renderCurrentPage();
        }
        
        window.watchCampaign = watchCampaign;
        
        async function renderHome() {
            const campaignsQuery = query(collection(db, 'viewswap_campaigns'));
            const snapshot = await getDocs(campaignsQuery);
            const allCampaigns = [];
            snapshot.forEach(doc => allCampaigns.push(doc.data()));
            
            const availableCampaigns = allCampaigns.filter(c => 
                c.creatorId !== currentUser?.uid && 
                !userData?.watchedVideos?.includes(c.videoId) &&
                (c.currentLikes < c.targetLikes || c.currentSubs < c.targetSubs)
            );
            
            if (availableCampaigns.length === 0) {
                return `<div class="card"><h2>🎬 Available Campaigns</h2><div class="empty-state">No active campaigns. Create one to get started!</div></div>`;
            }
            
            return `
                <div class="card">
                    <h2>🎬 Engage & Earn Credits</h2>
                    <p style="font-size: 0.7rem; margin-bottom: 12px; color: var(--gray-400);">👥 ${activeUsersCount} active users online • Max engagement per video = ${Math.max(0, activeUsersCount - 1)}</p>
                    ${availableCampaigns.map(campaign => {
                        const likesProgress = (campaign.currentLikes / campaign.targetLikes) * 100;
                        const subsProgress = (campaign.currentSubs / campaign.targetSubs) * 100;
                        const isComplete = campaign.currentLikes >= campaign.targetLikes && campaign.currentSubs >= campaign.targetSubs;
                        
                        return `
                            <div class="campaign-item">
                                <div class="campaign-title">${escapeHtml(campaign.title)}</div>
                                <div class="campaign-url">${escapeHtml(campaign.url)}</div>
                                <div class="limit-info">
                                    🎯 Limits based on active users: ${Math.max(0, activeUsersCount - 1)} max
                                </div>
                                <div class="badge-group">
                                    <span class="badge">👍 Likes: ${campaign.currentLikes}/${campaign.targetLikes}</span>
                                    <span class="badge">🔔 Subs: ${campaign.currentSubs}/${campaign.targetSubs}</span>
                                    <span class="badge">👤 ${escapeHtml(campaign.creatorName || 'User')}</span>
                                </div>
                                <div class="progress-bar"><div class="progress-fill" style="width: ${likesProgress}%"></div></div>
                                <div class="progress-bar"><div class="progress-fill" style="width: ${subsProgress}%"></div></div>
                                ${!isComplete ? 
                                    `<button class="watch-btn" onclick="window.watchCampaign(${JSON.stringify(campaign).replace(/"/g, '&quot;')})">
                                        ▶️ Watch & Engage (Earn credits!)
                                    </button>` :
                                    `<button class="watch-btn disabled" disabled>✓ Campaign Complete</button>`
                                }
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }
        
        function renderCampaignPage() {
            const maxLimit = Math.max(0, activeUsersCount - 1);
            return `
                <div class="card">
                    <h2>📢 Create Smart Campaign</h2>
                    <div class="limit-info" style="margin-bottom: 16px;">
                        👥 ${activeUsersCount} active users online<br>
                        ⚡ Maximum likes/subs per campaign: <strong>${maxLimit}</strong>
                    </div>
                    <input type="text" id="campaignTitle" placeholder="Campaign title">
                    <input type="url" id="campaignUrl" placeholder="YouTube video URL">
                    
                    <div class="slider-control">
                        <label>👍 Likes Target <span id="likesValue">0</span> / ${maxLimit}</label>
                        <input type="range" id="likesSlider" min="0" max="${maxLimit}" value="0" step="1">
                        <div class="max-limit-warning">Max likes limited to active users (${maxLimit})</div>
                    </div>
                    
                    <div class="slider-control">
                        <label>🔔 Subscribers Target <span id="subsValue">0</span> / ${maxLimit}</label>
                        <input type="range" id="subsSlider" min="0" max="${maxLimit}" value="0" step="1">
                        <div class="max-limit-warning">Max subs limited to active users (${maxLimit})</div>
                    </div>
                    
                    <div class="limit-info" id="costDisplay">
                        💰 Estimated Cost: 0 credits
                    </div>
                    
                    <button class="btn-primary" id="createCampaignBtn">🚀 Launch Smart Campaign</button>
                </div>
                <div class="card">
                    <h2>📊 My Campaigns</h2>
                    <div id="myCampaignsList"></div>
                </div>
            `;
        }
        
        async function renderMyCampaigns() {
            const container = document.getElementById('myCampaignsList');
            if (!container) return;
            
            const myCampaigns = userData?.campaigns || [];
            if (myCampaigns.length === 0) {
                container.innerHTML = '<div class="empty-state">You haven\'t created any campaigns yet</div>';
                return;
            }
            
            container.innerHTML = myCampaigns.map(campaign => {
                const likesProgress = (campaign.currentLikes / campaign.targetLikes) * 100;
                const subsProgress = (campaign.currentSubs / campaign.targetSubs) * 100;
                return `
                    <div class="campaign-item">
                        <div class="campaign-title">${escapeHtml(campaign.title)}</div>
                        <div class="campaign-url">${escapeHtml(campaign.url)}</div>
                        <div class="badge-group">
                            <span class="badge">👍 ${campaign.currentLikes}/${campaign.targetLikes} likes</span>
                            <span class="badge">🔔 ${campaign.currentSubs}/${campaign.targetSubs} subs</span>
                        </div>
                        <div class="progress-bar"><div class="progress-fill" style="width: ${likesProgress}%"></div></div>
                        <div class="progress-bar"><div class="progress-fill" style="width: ${subsProgress}%"></div></div>
                        ${campaign.currentLikes >= campaign.targetLikes && campaign.currentSubs >= campaign.targetSubs ? 
                            '<div class="badge" style="background: var(--success);">✓ Campaign Complete</div>' : 
                            '<div class="badge">🔄 Active</div>'
                        }
                    </div>
                `;
            }).join('');
        }
        
        function renderReferPage() {
            return `
                <div class="card">
                    <h2>🤝 Referral Program</h2>
                    <div style="background: linear-gradient(135deg, var(--warning), #ea580c); border-radius: 20px; padding: 16px; text-align: center; margin-bottom: 16px;">
                        🎁 5% Commission on all referral earnings!
                    </div>
                    <div style="background: rgba(139,92,246,0.1); border-radius: 20px; padding: 20px; text-align: center;">
                        <div style="font-size: 0.7rem; color: var(--gray-400);">Your Referral Code</div>
                        <div class="referral-code-box" id="referralCodeDisplay" style="background:rgba(0,0,0,0.5);padding:14px;border-radius:16px;margin:12px 0;border:2px dashed var(--primary);cursor:pointer;">${userData?.referralCode || ''}</div>
                        <button class="btn-primary" id="copyReferralBtn">📋 Copy Code</button>
                    </div>
                    <div style="background: rgba(139,92,246,0.1); border-radius: 20px; padding: 20px; text-align: center; margin-top: 12px;">
                        <div style="font-size: 0.7rem; color: var(--gray-400);">Commission Earned</div>
                        <div style="font-size: 2rem; font-weight: bold; color: var(--primary);">${(userData?.referralEarnings || 0).toFixed(2)}</div>
                    </div>
                </div>
            `;
        }
        
        function renderHelpPage() {
            return `
                <div class="card">
                    <h2>❓ Smart Campaign Limits</h2>
                    <p>Your campaign's likes and subscribers targets are LIMITED to the number of active users on the site!</p>
                    <ul style="margin: 12px 0 0 20px; line-height: 1.6;">
                        <li>👥 Active users = people currently online</li>
                        <li>🎯 Max likes/subs = active users - 1 (excludes yourself)</li>
                        <li>💰 Likes cost: 2 credits each</li>
                        <li>💰 Subscribers cost: 5 credits each</li>
                        <li>📈 When someone engages, YOU earn 1 credit per action</li>
                    </ul>
                </div>
                <div class="card">
                    <h2>💡 How It Works</h2>
                    <p>1️⃣ Sign in with Google<br>2️⃣ Create a campaign with limits based on active users<br>3️⃣ Other users watch your video and engage<br>4️⃣ You earn credits when they engage<br>5️⃣ They earn credits for watching!</p>
                </div>
            `;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
        }
        
        async function renderCurrentPage() {
            const container = document.getElementById('pageContent');
            if (!container) return;
            
            if (currentPage === 'home') {
                container.innerHTML = await renderHome();
            } else if (currentPage === 'campaign') {
                container.innerHTML = renderCampaignPage();
                
                const maxLimit = Math.max(0, activeUsersCount - 1);
                const likesSlider = document.getElementById('likesSlider');
                const subsSlider = document.getElementById('subsSlider');
                const likesValue = document.getElementById('likesValue');
                const subsValue = document.getElementById('subsValue');
                const costDisplay = document.getElementById('costDisplay');
                
                function updateCost() {
                    const likes = parseInt(likesSlider?.value || 0);
                    const subs = parseInt(subsSlider?.value || 0);
                    const cost = (likes * 2) + (subs * 5);
                    if (costDisplay) costDisplay.innerHTML = `💰 Estimated Cost: ${cost} credits`;
                }
                
                if (likesSlider) {
                    likesSlider.oninput = () => {
                        likesValue.textContent = likesSlider.value;
                        updateCost();
                    };
                }
                if (subsSlider) {
                    subsSlider.oninput = () => {
                        subsValue.textContent = subsSlider.value;
                        updateCost();
                    };
                }
                updateCost();
                
                document.getElementById('createCampaignBtn')?.addEventListener('click', async () => {
                    const title = document.getElementById('campaignTitle')?.value;
                    const url = document.getElementById('campaignUrl')?.value;
                    const likes = parseInt(likesSlider?.value || 0);
                    const subs = parseInt(subsSlider?.value || 0);
                    
                    if (!title || !url) { showToast('Enter title and URL'); return; }
                    if (likes === 0 && subs === 0) { showToast('Set at least one target'); return; }
                    
                    await createCampaign(title, url, likes, subs);
                    document.getElementById('campaignTitle').value = '';
                    document.getElementById('campaignUrl').value = '';
                    if (likesSlider) likesSlider.value = 0;
                    if (subsSlider) subsSlider.value = 0;
                    likesValue.textContent = '0';
                    subsValue.textContent = '0';
                    updateCost();
                    await renderMyCampaigns();
                });
                await renderMyCampaigns();
            } else if (currentPage === 'refer') {
                container.innerHTML = renderReferPage();
                document.getElementById('copyReferralBtn')?.addEventListener('click', () => {
                    navigator.clipboard.writeText(userData?.referralCode || '');
                    showToast('Referral code copied!');
                });
                document.getElementById('referralCodeDisplay')?.addEventListener('click', () => {
                    navigator.clipboard.writeText(userData?.referralCode || '');
                    showToast('Referral code copied!');
                });
            } else if (currentPage === 'help') {
                container.innerHTML = renderHelpPage();
            }
        }
        
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', () => {
                currentPage = btn.dataset.page;
                document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderCurrentPage();
            });
        });
        
        async function handleSignIn() {
            try {
                const result = await signInWithPopup(auth, provider);
                showToast(`Welcome ${result.user.displayName}!`);
            } catch(e) { showToast('Sign in failed'); }
        }
        
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await loadUserData(user.uid);
                document.getElementById('userAvatar').src = user.photoURL || 'https://via.placeholder.com/50';
                document.getElementById('userName').textContent = user.displayName || 'User';
                document.getElementById('userEmail').textContent = user.email;
                document.body.classList.add('authenticated');
                initOnlineTracking();
                renderCurrentPage();
            } else {
                document.body.classList.remove('authenticated');
                currentUser = null;
                userData = null;
            }
        });
        
        document.getElementById('signInBtn').addEventListener('click', handleSignIn);
        document.getElementById('signOutBtn').addEventListener('click', async () => { await signOut(auth); showToast('Signed out'); });
        document.getElementById('dailyBonusBtn').addEventListener('click', async () => { if (userData) await claimDailyBonus(); });
        
        for (let i = 0; i < 40; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.width = Math.random() * 5 + 2 + 'px';
            p.style.height = p.style.width;
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = Math.random() * 15 + 8 + 's';
            p.style.animationDelay = Math.random() * 10 + 's';
            document.getElementById('particles')?.appendChild(p);
        }
    </script>
</body>
</html>
