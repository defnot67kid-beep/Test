<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        window.firebaseModules = {
            initializeApp, getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged,

    <!-- Google API Client Library -->

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --primary-light: #a78bfa;
            --secondary: #ec489a;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --youtube: #ff0000;
            --dark: #0f0f0f;
            --gray-800: #1f1f1f;
            --gray-700: #2a2a2a;
            --gray-600: #3a3a3a;
            --gray-400: #9ca3af;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            min-height: 100vh;
            padding-bottom: 80px;
            color: var(--white);
        }

        /* Animated Background */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            animation: float linear infinite;
            opacity: 0.3;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            padding: 0 16px;
        }

        /* Header */
        .header {
            background: rgba(15, 15, 26, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 0 0 32px 32px;
            padding: 20px;
            margin: -16px -16px 20px -16px;
            text-align: center;
            border-bottom: 1px solid rgba(139, 92, 246, 0.3);
        }

        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #fff, var(--primary-light), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header p {
            font-size: 0.75rem;
            color: var(--gray-400);
            margin-top: 4px;
        }

        /* Auth Card */
        .auth-card {
            background: rgba(30, 30, 40, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 32px 24px;
            text-align: center;
            border: 1px solid rgba(139, 92, 246, 0.3);
            margin: 20px 0;
        }

        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 16px;
            border: 3px solid var(--primary);
            object-fit: cover;
        }

        .user-name {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .user-email {
            font-size: 0.8rem;
            color: var(--gray-400);
            margin-bottom: 16px;
        }

        .google-btn {
            background: linear-gradient(135deg, #4285f4, #34a853);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            transition: transform 0.2s;
        }

        .google-btn:active { transform: scale(0.96); }

        /* Credit Card */
        .credit-card {
            background: linear-gradient(135deg, rgba(30, 30, 40, 0.95), rgba(20, 20, 30, 0.95));
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid rgba(139, 92, 246, 0.3);
            position: relative;
            overflow: hidden;
        }

        .credit-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--warning));

        /* YouTube Card */
        .youtube-card {

        .youtube-stats {

        .stat-box {

            font-size: 0.7rem;

        /* Bottom Navigation */
        .bottom-nav {

            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 15, 26, 0.95);
            backdrop-filter: blur(20px);

        .nav-item {

            border: none;
            cursor: pointer;

        .nav-icon { font-size: 1.5rem; }

        /* Cards */
        .card {
            background: rgba(30, 30, 40, 0.9);
            backdrop-filter: blur(10px);

            padding: 20px;
            margin-bottom: 16px;

        }

        /* Action Grid */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));

        .action-card {

            border: 2px solid rgba(139, 92, 246, 0.2);
            border-radius: 16px;
            padding: 12px 8px;

        .action-card.selected {

            transform: scale(1.02);
        }

        .action-emoji { font-size: 1.5rem; }
        .action-name { font-size: 0.7rem; font-weight: 600; margin-top: 4px; }
        .action-price { font-size: 0.6rem; opacity: 0.8; }

        /* Campaign Items */
        .campaign-item {
            background: rgba(35, 35, 45, 0.8);
            border-radius: 18px;
            padding: 14px;
            margin-bottom: 12px;
        }

        .campaign-title {
            font-weight: 700;
            margin-bottom: 6px;
        }

        .campaign-url {
            font-size: 0.65rem;
            color: var(--primary-light);
            word-break: break-all;
            margin-bottom: 10px;
        }

        .badge-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 10px 0;
        }

        .badge {
            background: rgba(139, 92, 246, 0.2);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
        }

        .progress-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 6px;
            margin: 8px 0;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s;
        }

        /* Form Elements */
        input, select {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            background: rgba(35, 35, 45, 0.9);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 20px;
            color: white;
            font-size: 0.9rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn {
            padding: 14px;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }

        .btn:active { transform: scale(0.97); }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
        .btn-success { background: linear-gradient(135deg, var(--success), #059669); color: white; }
        .btn-youtube { background: var(--youtube); color: white; }

        .cost-display {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            margin: 16px 0;
        }

        .cost-amount { font-size: 2rem; font-weight: 800; }
        .cost-label { font-size: 0.7rem; opacity: 0.9; }

        .referral-code-box {
            background: rgba(0,0,0,0.5);
            padding: 14px;
            border-radius: 16px;
            font-family: monospace;
            font-size: 1.1rem;
            text-align: center;
            margin: 12px 0;
            border: 2px dashed var(--primary);
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 60px;
            z-index: 2000;
            animation: slideUp 0.3s ease;
            max-width: 90%;
            text-align: center;
            white-space: normal;
            word-break: break-word;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .hidden { display: none; }
        .empty-state { text-align: center; padding: 40px; color: var(--gray-400); }

        .slider-control {
            margin: 12px 0;
        }
        
        .slider-control label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.8rem;
        }
        
        input[type="range"] {
            width: 100%;
            height: 4px;
            background: rgba(139, 92, 246, 0.3);
            -webkit-appearance: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
        }
        
        .slider-value {
            text-align: center;
            margin-top: 8px;
            font-weight: bold;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: var(--gray-400);
        }
    </style>
</head>

    <script type="module">
        // Import Firebase
        const { initializeApp } = window.firebaseModules;
        const { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } = window.firebaseModules;
        const { getFirestore, doc, setDoc, getDoc, increment, runTransaction } = window.firebaseModules;
        
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAupBkllyicDPD9O6CmX4mS4sF5z96mqxc",
            authDomain: "vertexpaste.firebaseapp.com",
            projectId: "vertexpaste",
            storageBucket: "vertexpaste.firebasestorage.app",
            messagingSenderId: "255275350380",
            appId: "1:255275350380:web:7be4e8add2cb5b04045b49"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        
        // Add ALL YouTube scopes for full access
        provider.addScope('https://www.googleapis.com/auth/youtube'); // Full YouTube access
        provider.addScope('https://www.googleapis.com/auth/youtube.force-ssl'); // Force SSL
        provider.addScope('https://www.googleapis.com/auth/youtube.readonly'); // Read access
        provider.addScope('https://www.googleapis.com/auth/youtube.upload'); // Upload videos
        provider.addScope('https://www.googleapis.com/auth/youtubepartner'); // Partner access
        
        // Action Types
        const ACTION_TYPES = {
            view: { name: 'Views', emoji: '👁️', baseCost: 1, reward: 1, requiresAuth: false },
            subscriber: { name: 'Subscribers', emoji: '🔔', baseCost: 5, reward: 5, requiresAuth: true, action: 'subscribe' },
            like: { name: 'Likes', emoji: '❤️', baseCost: 1, reward: 1, requiresAuth: true, action: 'like' },
            comment: { name: 'Comments', emoji: '💬', baseCost: 3, reward: 3, requiresAuth: true, action: 'comment' },
            commentLike: { name: 'Comment Likes', emoji: '⭐', baseCost: 1, reward: 1, requiresAuth: true, action: 'commentLike' }
        };
        
        let currentUser = null;
        let userData = null;
        let currentPage = 'home';
        let selectedActions = new Set();
        let campaignTargets = { view: 10, subscriber: 0, like: 0, comment: 0, commentLike: 0 };
        let youtubeAccessToken = null;
        let youtubeChannel = null;
        let gapiInitialized = false;
        
        // Helper Functions
        function showToast(message, duration = 3000) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), duration);
        }
        
        // Initialize Google API
        async function initGoogleAPI() {
            return new Promise((resolve, reject) => {
                if (gapiInitialized) {
                    resolve();
                    return;
                }
                
                const checkGapi = () => {
                    if (window.gapi && window.gapi.client) {
                        resolve();
                    } else {
                        setTimeout(checkGapi, 100);
                    }
                };
                
                if (!window.gapi) {
                    const script = document.createElement('script');
                    script.src = 'https://apis.google.com/js/api.js';
                    script.onload = () => {
                        window.gapi.load('client', () => {
                            gapiInitialized = true;
                            resolve();
                        });
                    };
                    script.onerror = reject;
                    document.head.appendChild(script);
                } else {
                    window.gapi.load('client', () => {
                        gapiInitialized = true;
                        resolve();
                    });
                }
            });
        }
        
        // Initialize YouTube API with token
        async function initYouTubeAPI(token) {
            try {
                await initGoogleAPI();
                await window.gapi.client.init({
                    apiKey: firebaseConfig.apiKey,
                    discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/youtube/v3/rest']
                });
                window.gapi.client.setToken({ access_token: token });
                return true;
            } catch (error) {
                console.error('YouTube API init error:', error);
                return false;
            }
        }
        
        // Get YouTube Channel Info
        async function getYouTubeChannel() {
            try {
                const response = await window.gapi.client.youtube.channels.list({
                    part: ['snippet', 'statistics'],
                    mine: true
                });
                
                if (response.result.items && response.result.items.length > 0) {
                    const channel = response.result.items[0];
                    return {
                        id: channel.id,
                        title: channel.snippet.title,
                        thumbnail: channel.snippet.thumbnails.default.url,
                        subscriberCount: parseInt(channel.statistics.subscriberCount) || 0,
                        videoCount: parseInt(channel.statistics.videoCount) || 0,
                        viewCount: parseInt(channel.statistics.viewCount) || 0
                    };
                }
                return null;
            } catch (error) {
                console.error('Get channel error:', error);
                return null;
            }
        }
        
        // YouTube Actions
        async function subscribeToChannel(channelId) {
            try {
                const response = await window.gapi.client.youtube.subscriptions.insert({
                    part: ['snippet'],
                    resource: {
                        snippet: {
                            resourceId: {
                                kind: 'youtube#channel',
                                channelId: channelId
                            }
                        }
                    }
                });
                return response.status === 200;
            } catch (error) {
                console.error('Subscribe error:', error);
                return false;
            }
        }
        
        async function likeVideo(videoId) {
            try {
                const response = await window.gapi.client.youtube.videos.rate({
                    id: videoId,
                    rating: 'like'
                });
                return response.status === 204;
            } catch (error) {
                console.error('Like error:', error);
                return false;
            }
        }
        
        async function postComment(videoId, text) {
            try {
                const response = await window.gapi.client.youtube.commentThreads.insert({
                    part: ['snippet'],
                    resource: {
                        snippet: {
                            videoId: videoId,
                            topLevelComment: {
                                snippet: {
                                    textOriginal: text
                                }
                            }
                        }
                    }
                });
                return response.result;
            } catch (error) {
                console.error('Comment error:', error);
                return null;
            }
        }
        
        async function likeComment(commentId) {
            try {
                const response = await window.gapi.client.youtube.comments.setRating({
                    id: commentId,
                    rating: 'like'
                });
                return response.status === 204;
            } catch (error) {
                console.error('Comment like error:', error);
                return false;
            }
        }
        
        // Extract Video ID from URL
        function extractVideoId(url) {
            const regex = /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/;
            const match = url.match(regex);
            return match ? match[1] : null;
        }
        
        // Extract Channel ID from URL
        function extractChannelId(url) {
            const regex = /youtube\.com\/channel\/([^\/\?\&]+)/;
            const match = url.match(regex);
            return match ? match[1] : null;
        }
        
        // Load User Data
        async function loadUserData(uid) {
            const userRef = doc(db, 'users', uid);
            const userSnap = await getDoc(userRef);
            
            if (userSnap.exists()) {
                userData = userSnap.data();
            } else {
                userData = {
                    uid: uid,
                    email: currentUser.email,
                    displayName: currentUser.displayName,
                    photoURL: currentUser.photoURL,
                    credits: 500,
                    referralCode: 'REF' + uid.substring(0, 6).toUpperCase(),
                    referredBy: null,
                    referralEarnings: 0,
                    totalEarned: 0,
                    totalSpent: 0,
                    lastDailyBonus: null,
                    referrals: [],
                    campaigns: [],
                    youtubeConnected: false,
                    createdAt: new Date().toISOString()
                };
                await setDoc(userRef, userData);
            }
            updateCreditDisplay();
            return userData;
        }
        
        async function saveUserData() {
            if (!currentUser) return;
            const userRef = doc(db, 'users', currentUser.uid);
            await setDoc(userRef, userData, { merge: true });
        }
        
        async function updateCredits(amount, reason = '') {
            if (!currentUser) return false;
            userData.credits += amount;
            if (amount > 0) userData.totalEarned += amount;
            if (amount < 0) userData.totalSpent += Math.abs(amount);
            await saveUserData();
            updateCreditDisplay();
            if (reason) showToast(reason);
            
            // Give 5% commission to referrer
            if (amount > 0 && userData.referredBy) {
                const referrerRef = doc(db, 'users', userData.referredBy);
                const commission = amount * 0.05;
                try {
                    await runTransaction(db, async (transaction) => {
                        const referrerSnap = await transaction.get(referrerRef);
                        if (referrerSnap.exists()) {
                            transaction.update(referrerRef, {
                                credits: increment(commission),
                                referralEarnings: increment(commission),
                                totalEarned: increment(commission)
                            });
                        }
                    });
                } catch (e) {
                    console.error('Commission error:', e);
                }
            }
            return true;
        }
        
        function updateCreditDisplay() {
            const el = document.getElementById('creditBalance');
            if (el) el.textContent = Math.floor(userData?.credits || 0);
        }
        
        // Daily Bonus
        async function claimDailyBonus() {
            if (!userData) return;
            const lastBonus = userData.lastDailyBonus ? new Date(userData.lastDailyBonus) : null;
            const today = new Date();
            
            if (lastBonus && lastBonus.toDateString() === today.toDateString()) {
                showToast('Already claimed today! Come back tomorrow.');
                return;
            }
            
            await updateCredits(75, '🎁 Daily bonus! +75 credits');
            userData.lastDailyBonus = today.toISOString();
            await saveUserData();
        }
        
        // YouTube Sign In
        async function signInWithYouTube() {
            try {
                showToast('Connecting to YouTube...');
                const result = await signInWithPopup(auth, provider);
                const credential = GoogleAuthProvider.credentialFromResult(result);
                youtubeAccessToken = credential.accessToken;
                
                // Initialize YouTube API
                const initSuccess = await initYouTubeAPI(youtubeAccessToken);
                if (!initSuccess) {
                    throw new Error('Failed to initialize YouTube API');
                }
                
                // Get channel info
                youtubeChannel = await getYouTubeChannel();
                
                if (youtubeChannel) {
                    userData.youtubeConnected = true;
                    userData.youtubeChannel = youtubeChannel;
                    await saveUserData();
                    
                    showToast(`✅ Successfully connected to ${youtubeChannel.title}`);
                    await updateYouTubeDisplay();
                } else {
                    throw new Error('Could not fetch channel information');
                }
                
                return result.user;
            } catch (error) {
                console.error('YouTube sign in error:', error);
                let errorMessage = 'Failed to connect to YouTube. ';
                if (error.message.includes('popup')) {
                    errorMessage += 'Please allow popups for this site.';
                } else if (error.message.includes('network')) {
                    errorMessage += 'Check your internet connection.';
                } else {
                    errorMessage += error.message;
                }
                showToast(errorMessage);
                return null;
            }
        }
        
        async function updateYouTubeDisplay() {
            const container = document.getElementById('youtubeContent');
            if (!container) return;
            
            if (!youtubeChannel) {
                container.innerHTML = `
                    <button class="btn btn-youtube" id="connectYouTubeBtn">
                        🔴 Connect YouTube Channel
                    </button>
                    <div class="permission-badge">
                        ⚡ Full access needed: Subscribe, Like, Comment
                    </div>
                `;
                document.getElementById('connectYouTubeBtn')?.addEventListener('click', signInWithYouTube);
                return;
            }
            
            container.innerHTML = `
                <div class="channel-info">
                    <img src="${youtubeChannel.thumbnail}" class="channel-avatar" onerror="this.src='https://via.placeholder.com/50'">
                    <div>
                        <strong>${escapeHtml(youtubeChannel.title)}</strong>
                        <div style="font-size: 0.7rem; color: #4ade80;">✓ Connected & Authorized</div>
                    </div>
                </div>
                <div class="youtube-stats">
                    <div class="stat-box">
                        <div class="stat-number">${formatNumber(youtubeChannel.subscriberCount)}</div>
                        <div class="stat-label">Subscribers</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number">${formatNumber(youtubeChannel.videoCount)}</div>
                        <div class="stat-label">Videos</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number">${formatNumber(youtubeChannel.viewCount)}</div>
                        <div class="stat-label">Views</div>
                    </div>
                </div>
                <div class="permission-badge">
                    ✅ Full access granted • Can Subscribe • Like • Comment
                </div>
                <button class="btn btn-youtube" id="refreshYouTubeBtn" style="margin-top: 10px; background: #333;">🔄 Refresh Channel</button>
            `;
            
            document.getElementById('refreshYouTubeBtn')?.addEventListener('click', async () => {
                showToast('Refreshing channel data...');
                const refreshed = await getYouTubeChannel();
                if (refreshed) {
                    youtubeChannel = refreshed;
                    userData.youtubeChannel = refreshed;
                    await saveUserData();
                    await updateYouTubeDisplay();
                    showToast('Channel data refreshed!');
                }
            });
        }
        
        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }
        
        // Campaign Functions
        async function createCampaign(title, url, targets) {
            let totalCost = 0;
            const actions = [];
            
            for (const [type, target] of Object.entries(targets)) {
                if (target > 0 && selectedActions.has(type)) {
                    const cost = target * ACTION_TYPES[type].baseCost;
                    totalCost += cost;
                    actions.push({ type, target, reward: ACTION_TYPES[type].reward, cost });
                }
            }
            
            if (totalCost === 0) {
                showToast('Select at least one action');
                return false;
            }
            
            if (userData.credits < totalCost) {
                showToast(`Need ${totalCost} credits!`);
                return false;
            }
            
            await updateCredits(-totalCost, `💰 Spent ${totalCost} credits on campaign`);
            
            const campaign = {
                id: Date.now(),
                title,
                url,
                videoId: extractVideoId(url),
                channelId: extractChannelId(url),
                actions,
                progress: Object.fromEntries(actions.map(a => [a.type, 0])),
                createdAt: new Date().toISOString(),
                completed: false
            };
            
            userData.campaigns.push(campaign);
            await saveUserData();
            showToast(`✅ Campaign created! Spent ${totalCost} credits`);
            return true;
        }
        
        // Render Functions
        function renderHome() {
            const activeCampaigns = userData?.campaigns?.filter(c => !c.completed).length || 0;
            return `
                <div class="card">
                    <h2>📊 Dashboard</h2>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                        <div style="background: rgba(139,92,246,0.1); border-radius: 20px; padding: 16px; text-align: center;">
                            <div style="font-size: 1.8rem; font-weight: bold;">${userData?.campaigns?.length || 0}</div>
                            <div style="font-size: 0.7rem;">Total Campaigns</div>
                        </div>
                        <div style="background: rgba(139,92,246,0.1); border-radius: 20px; padding: 16px; text-align: center;">
                            <div style="font-size: 1.8rem; font-weight: bold;">${activeCampaigns}</div>
                            <div style="font-size: 0.7rem;">Active</div>
                        </div>
                        <div style="background: rgba(139,92,246,0.1); border-radius: 20px; padding: 16px; text-align: center;">
                            <div style="font-size: 1.8rem; font-weight: bold;">${userData?.totalEarned || 0}</div>
                            <div style="font-size: 0.7rem;">Earned</div>
                        </div>
                        <div style="background: rgba(139,92,246,0.1); border-radius: 20px; padding: 16px; text-align: center;">
                            <div style="font-size: 1.8rem; font-weight: bold;">${userData?.referralEarnings?.toFixed(0) || 0}</div>
                            <div style="font-size: 0.7rem;">Referral Income</div>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <h2>🚀 Quick Actions</h2>
                    <button class="btn btn-primary" onclick="window.switchToCampaign()">Create Campaign</button>
                    <button class="btn btn-success" style="margin-top: 10px;" onclick="window.switchToEarn()">Earn Credits</button>
                </div>
                ${!youtubeChannel ? `
                    <div class="card" style="border-color: var(--youtube);">
                        <h2>🔴 YouTube Required</h2>
                        <p style="margin-bottom: 12px;">Connect your YouTube account to start earning and growing!</p>
                        <button class="btn btn-youtube" onclick="window.signInWithYouTube()">Connect YouTube Now</button>
                    </div>
                ` : ''}
            `;
        }
        
        function renderCampaign() {
            return `
                <div class="card">
                    <h2>🎯 Create Campaign</h2>
                    <input type="text" id="campaignTitle" placeholder="Campaign title (e.g., My Awesome Video)">
                    <input type="url" id="campaignUrl" placeholder="YouTube Video or Channel URL">
                    
                    <div class="action-grid" id="actionGrid">
                        ${Object.entries(ACTION_TYPES).map(([key, type]) => `
                            <div class="action-card" data-action="${key}" onclick="window.toggleAction('${key}')">
                                <div class="action-emoji">${type.emoji}</div>
                                <div class="action-name">${type.name}</div>
                                <div class="action-price">💰 ${type.baseCost}</div>
                            </div>
                        `).join('')}
                    </div>
                    
                    <div id="targetControls"></div>
                    
                    <div class="cost-display">
                        <div class="cost-label">Total Cost</div>
                        <div class="cost-amount" id="totalCost">0</div>
                    </div>
                    
                    <button class="btn btn-primary" onclick="window.submitCampaign()">Launch Campaign</button>
                </div>
                
                <div class="card">
                    <h2>📊 Active Campaigns</h2>
                    ${userData?.campaigns?.filter(c => !c.completed).map(c => `
                        <div class="campaign-item">
                            <div class="campaign-title">${escapeHtml(c.title)}</div>
                            <div class="campaign-url">${escapeHtml(c.url)}</div>
                            <div class="badge-group">
                                ${c.actions.map(a => `
                                    <span class="badge">${ACTION_TYPES[a.type].emoji} ${c.progress[a.type] || 0}/${a.target}</span>
                                `).join('')}
                            </div>
                            ${c.actions.map(a => `
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${((c.progress[a.type] || 0) / a.target) * 100}%"></div>
                                </div>
                            `).join('')}
                        </div>
                    `).join('') || '<div class="empty-state">No active campaigns</div>'}
                </div>
            `;
        }
        
        function renderEarn() {
            return `
                <div class="card">
                    <h2>👁️ Earn Credits</h2>
                    <p style="margin-bottom: 16px; color: var(--gray-400);">Complete actions to earn credits. Your referrer gets 5% commission!</p>
                    ${!youtubeChannel ? `
                        <div style="background: rgba(255,0,0,0.2); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 16px;">
                            <div style="font-size: 2rem; margin-bottom: 8px;">🔴</div>
                            <div style="font-weight: bold;">YouTube Connection Required</div>
                            <div style="font-size: 0.8rem; margin-top: 8px;">Connect your YouTube account to start earning credits</div>
                            <button class="btn btn-youtube" style="margin-top: 12px;" onclick="window.signInWithYouTube()">Connect YouTube</button>
                        </div>
                    ` : `
                        <div class="empty-state">
                            🎬 Actions will appear when users create campaigns
                            <div style="margin-top: 12px; font-size: 0.8rem;">Create a campaign to get started!</div>
                        </div>
                    `}
                </div>
            `;
        }
        
        function renderReferral() {
            return `
                <div class="card">
                    <h2>🤝 Referral Program</h2>
                    <div style="background: linear-gradient(135deg, var(--warning), #ea580c); border-radius: 20px; padding: 16px; text-align: center; margin-bottom: 16px;">
                        <div>🎁 5% Commission on all referral earnings!</div>
                        <div style="font-size: 0.7rem; margin-top: 4px;">Your referrals keep 100% • You earn 5% extra</div>
                    </div>
                    
                    <div style="background: rgba(139,92,246,0.1); border-radius: 20px; padding: 20px; text-align: center;">
                        <div style="font-size: 0.7rem; color: var(--gray-400);">Your Referral Code</div>
                        <div class="referral-code-box" id="referralCodeDisplay">${userData?.referralCode || ''}</div>
                        <button class="btn btn-primary" onclick="window.copyReferralCode()">📋 Copy Code</button>
                    </div>
                    
                    <div style="background: rgba(139,92,246,0.1); border-radius: 20px; padding: 20px; text-align: center; margin-top: 12px;">
                        <div style="font-size: 0.7rem; color: var(--gray-400);">Commission Earned</div>
                        <div style="font-size: 2rem; font-weight: bold; color: var(--primary);">${(userData?.referralEarnings || 0).toFixed(2)}</div>
                        <div style="font-size: 0.7rem;">credits from referrals</div>
                    </div>
                </div>
            `;
        }
        
        function renderHelp() {
            return `
                <div class="card">
                    <h2>❓ How ViewSwap Works</h2>
                    <div style="line-height: 1.8;">
                        <p><strong>1️⃣ Sign in with YouTube</strong> - Full access required for Subscribe, Like, Comment</p>
                        <p><strong>2️⃣ Connect YouTube</strong> - Grant permissions to verify engagement</p>
                        <p><strong>3️⃣ Earn Credits</strong> - Complete actions from other users</p>
                        <p><strong>4️⃣ Create Campaigns</strong> - Spend credits on views/subs/likes/comments</p>
                        <p><strong>5️⃣ Referral Commission</strong> - Earn 5% of all referral earnings forever!</p>
                    </div>
                </div>
                
                <div class="card">
                    <h2>💰 Credit Values</h2>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div>👁️ Views: 1 credit</div>
                        <div>🔔 Subscribers: 5 credits</div>
                        <div>❤️ Likes: 1 credit</div>
                        <div>💬 Comments: 3 credits</div>
                        <div>⭐ Comment Likes: 1 credit</div>
                    </div>
                </div>
                
                <div class="card">
                    <h2>🔐 YouTube Permissions</h2>
                    <div style="line-height: 1.8;">
                        <p>This app requires full YouTube access to:</p>
                        <ul style="margin-left: 20px; margin-top: 8px;">
                            <li>✓ Subscribe to channels</li>
                            <li>✓ Like videos</li>
                            <li>✓ Post comments</li>
                            <li>✓ Like comments</li>
                            <li>✓ View channel statistics</li>
                        </ul>
                        <p style="margin-top: 12px; color: var(--gray-400); font-size: 0.8rem;">We never post without your permission!</p>
                    </div>
                </div>
            `;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        async function renderCurrentPage() {
            const container = document.getElementById('contentArea');
            if (!container) return;
            
            switch(currentPage) {
                case 'home': container.innerHTML = renderHome(); break;
                case 'campaign': container.innerHTML = renderCampaign(); setTimeout(updateTargetControls, 100); break;
                case 'earn': container.innerHTML = renderEarn(); break;
                case 'referral': container.innerHTML = renderReferral(); break;
                case 'help': container.innerHTML = renderHelp(); break;
            }
        }
        
        // Campaign UI Helpers
        window.toggleAction = function(actionKey) {
            const el = document.querySelector(`.action-card[data-action="${actionKey}"]`);
            if (selectedActions.has(actionKey)) {
                selectedActions.delete(actionKey);
                el?.classList.remove('selected');
                campaignTargets[actionKey] = 0;
            } else {
                selectedActions.add(actionKey);
                el?.classList.add('selected');
                if (campaignTargets[actionKey] === 0) campaignTargets[actionKey] = 10;
            }
            updateTargetControls();
        };
        
        function updateTargetControls() {
            const container = document.getElementById('targetControls');
            if (!container) return;
            
            if (selectedActions.size === 0) {
                container.innerHTML = '<div class="empty-state">Select actions above to set targets</div>';
                const costEl = document.getElementById('totalCost');
                if (costEl) costEl.textContent = '0';
                return;
            }
            
            container.innerHTML = Array.from(selectedActions).map(key => `
                <div class="slider-control">
                    <label>${ACTION_TYPES[key].emoji} ${ACTION_TYPES[key].name} (${ACTION_TYPES[key].baseCost} credits each)</label>
                    <input type="range" min="0" max="100" value="${campaignTargets[key] || 10}" onchange="window.updateTarget('${key}', this.value)">
                    <div class="slider-value" id="value_${key}">${campaignTargets[key] || 10}</div>
                </div>
            `).join('');
            
            updateTotalCost();
        }
        
        window.updateTarget = function(key, value) {
            campaignTargets[key] = parseInt(value);
            const valueDiv = document.getElementById(`value_${key}`);
            if (valueDiv) valueDiv.textContent = value;
            updateTotalCost();
        };
        
        function updateTotalCost() {
            let total = 0;
            for (const [key, target] of Object.entries(campaignTargets)) {
                if (selectedActions.has(key) && target > 0) {
                    total += target * ACTION_TYPES[key].baseCost;
                }
            }
            const costEl = document.getElementById('totalCost');
            if (costEl) costEl.textContent = total;
        }
        
        window.submitCampaign = async function() {
            const title = document.getElementById('campaignTitle')?.value;
            const url = document.getElementById('campaignUrl')?.value;
            if (!title || !url) {
                showToast('Please enter title and URL');
                return;
            }
            
            const targets = {};
            for (const action of selectedActions) {
                targets[action] = campaignTargets[action] || 0;
            }
            
            await createCampaign(title, url, targets);
            
            document.getElementById('campaignTitle').value = '';
            document.getElementById('campaignUrl').value = '';
            selectedActions.clear();
            document.querySelectorAll('.action-card').forEach(c => c.classList.remove('selected'));
            campaignTargets = { view: 10, subscriber: 0, like: 0, comment: 0, commentLike: 0 };
            updateTargetControls();
            renderCurrentPage();
        };
        
        window.copyReferralCode = function() {
            navigator.clipboard.writeText(userData.referralCode);
            showToast('Referral code copied!');
        };
        
        window.switchToCampaign = function() {
            document.querySelector('[data-page="campaign"]')?.click();
        };
        
        window.switchToEarn = function() {
            document.querySelector('[data-page="earn"]')?.click();
        };
        
        window.signInWithYouTube = signInWithYouTube;
        
        // Navigation
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', async () => {
                const page = btn.dataset.page;
                currentPage = page;
                document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                await renderCurrentPage();
            });
        });
        
        // Daily Bonus
        document.getElementById('dailyBonusBtn')?.addEventListener('click', async () => {
            await claimDailyBonus();
            await renderCurrentPage();
        });
        
        // Auth State
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await loadUserData(user.uid);
                
                // Try to restore YouTube connection
                if (userData.youtubeConnected && userData.youtubeChannel) {
                    youtubeChannel = userData.youtubeChannel;
                    // Try to refresh token
                    try {
                        const token = await user.getIdToken();
                        const initSuccess = await initYouTubeAPI(token);
                        if (initSuccess) {
                            const refreshed = await getYouTubeChannel();
                            if (refreshed) {
                                youtubeChannel = refreshed;
                                userData.youtubeChannel = refreshed;
                                await saveUserData();
                            }
                        }
                    } catch (e) {
                        console.log('YouTube reconnection failed, will reconnect on sign in');
                        youtubeChannel = null;
                        userData.youtubeConnected = false;
                        await saveUserData();
                    }
                }
                
                await updateYouTubeDisplay();
                
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('appContent').classList.remove('hidden');
                document.getElementById('bottomNav').classList.remove('hidden');
                
                document.getElementById('userAvatar').src = user.photoURL || '';
                document.getElementById('userName').textContent = user.displayName;
                document.getElementById('userEmail').textContent = user.email;
                document.getElementById('authContent').classList.remove('hidden');
                document.getElementById('unauthContent').classList.add('hidden');
                
                await renderCurrentPage();
            } else {
                document.getElementById('authSection').style.display = 'block';
                document.getElementById('appContent').classList.add('hidden');
                document.getElementById('bottomNav').classList.add('hidden');
                document.getElementById('authContent').classList.add('hidden');
                document.getElementById('unauthContent').classList.remove('hidden');
                currentUser = null;
                userData = null;
                youtubeChannel = null;
            }
        });
        
        // YouTube Sign In Button
        document.getElementById('youtubeSignInBtn')?.addEventListener('click', signInWithYouTube);
        
        // Sign Out
        document.getElementById('signOutBtn')?.addEventListener('click', async () => {
            await signOut(auth);
            showToast('Signed out successfully');
        });
        
        // Create Particles
        for (let i = 0; i < 40; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.width = Math.random() * 5 + 2 + 'px';
            p.style.height = p.style.width;
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = Math.random() * 15 + 8 + 's';
            p.style.animationDelay = Math.random() * 10 + 's';
            document.getElementById('particles').appendChild(p);
        }
        
        // Initial YouTube display
        updateYouTubeDisplay();
    </script>
</body>
