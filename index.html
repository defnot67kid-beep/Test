    <!-- Firebase SDKs -->
    <script type="module">

        window.firebaseModules = {

    <!-- QR Scanner Library -->

    <style>

        input, textarea {

        /* FULLSCREEN QR MODAL */
        .qr-modal-fullscreen {
            position: fixed;

        #qr-reader-full {

            transform: scale(0.98);

    </style>
</head>
<body>
    <div class="signin-overlay" id="signinOverlay">
        <div class="signin-card">
            <div style="font-size: 3.5rem;">🏆</div>
            <h2>ViewSwap</h2>
            <p>Earn • Streaks • QR Referrals</p>
            <button class="google-signin-btn" id="signInBtn">🟢 Sign in with Google</button>
            <button class="qr-signin-btn" id="qrSignInBtn">📷 Scan QR Code to Refer</button>
        </div>
    </div>

    <div id="mainAppContent">
        <div class="bg-particles" id="particles"></div>
        <div class="container">
            <div class="header">
                <h1>🏆 ViewSwap</h1>
                <p>QR Referrals • 5% Forever</p>
                <div class="online-badge" id="onlineCountBadge">👥 Loading...</div>
            </div>
            <div id="pageContent"></div>
        </div>
        <div class="bottom-nav">
            <button class="nav-item active" data-page="home"><div class="nav-icon">🏠</div><div class="nav-label">Home</div></button>
            <button class="nav-item" data-page="campaign"><div class="nav-icon">📢</div><div class="nav-label">Campaign</div></button>
            <button class="nav-item" data-page="rewards"><div class="nav-icon">🎁</div><div class="nav-label">Rewards</div></button>
            <button class="nav-item" data-page="account"><div class="nav-icon">👤</div><div class="nav-label">Account</div></button>
            <button class="nav-item" data-page="refer"><div class="nav-icon">🤝</div><div class="nav-label">Refer</div></button>
        </div>
    </div>

    <script type="module">
        const { initializeApp } = window.firebaseModules;
        const { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } = window.firebaseModules;
        const { getFirestore, doc, setDoc, getDoc, collection, query, getDocs, increment, runTransaction, arrayUnion, updateDoc, onSnapshot, serverTimestamp, where } = window.firebaseModules;
        
        const firebaseConfig = {
            apiKey: "AIzaSyAupBkllyicDPD9O6CmX4mS4sF5z96mqxc",
            authDomain: "vertexpaste.firebaseapp.com",
            projectId: "vertexpaste",
            storageBucket: "vertexpaste.firebasestorage.app",
            messagingSenderId: "255275350380",
            appId: "1:255275350380:web:7be4e8add2cb5b04045b49"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        
        let currentUser = null;
        let userData = null;
        let currentPage = 'home';
        let pendingReferralCode = null;
        
        const ACHIEVEMENTS = {
            streak1: { name: "🔥 1 Day Streak", desc: "Claim daily bonus", icon: "🔥", reward: 15, requirement: 1 },
            streak3: { name: "⚡ 3 Day Streak", desc: "3 days in a row", icon: "⚡", reward: 30, requirement: 3 },
            streak7: { name: "🌟 7 Day Streak", desc: "Full week!", icon: "🌟", reward: 60, requirement: 7 },
            streak30: { name: "👑 30 Day Master", desc: "30 day streak", icon: "👑", reward: 200, requirement: 30 },
            campaign1: { name: "📢 First Campaign", desc: "Create a campaign", icon: "📢", reward: 20, requirement: 1 },
            campaign5: { name: "🚀 Campaign Creator", desc: "5 campaigns", icon: "🚀", reward: 50, requirement: 5 },
            campaign10: { name: "🎬 Master Creator", desc: "10 campaigns", icon: "🎬", reward: 100, requirement: 10 },
            watcher10: { name: "👁️ Active Watcher", desc: "Watch 10 videos", icon: "👁️", reward: 20, requirement: 10 },
            watcher50: { name: "🎥 Video Enthusiast", desc: "Watch 50 videos", icon: "🎥", reward: 80, requirement: 50 },
            refer1: { name: "🤝 First Referral", desc: "Get a referral", icon: "🤝", reward: 25, requirement: 1 },
            refer5: { name: "👥 Community Leader", desc: "5 referrals", icon: "👥", reward: 100, requirement: 5 }
        };
        
        function showToast(msg, isWarning = false) {
            const t = document.createElement('div');
            t.className = 'toast';
            if (isWarning) t.style.background = 'rgba(239,68,68,0.95)';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
        
        function extractVideoId(url) {
            const regex = /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/;
            const match = url.match(regex);
            return match ? match[1] : null;
        }
        
        function generateQRCodeURL(data) {
            return `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(data)}`;
        }
        
        async function loadUserData(uid) {
            const ref = doc(db, 'viewswap_users', uid);
            const snap = await getDoc(ref);
            if (snap.exists()) {
                userData = snap.data();
                userData.achievements = userData.achievements || {};
                userData.streak = userData.streak || { current: 0, lastClaim: null, highest: 0 };
                userData.campaigns = userData.campaigns || [];
                userData.watchedVideos = userData.watchedVideos || [];
                userData.referrals = userData.referrals || [];
                userData.referralEarnings = userData.referralEarnings || 0;
            } else {
                userData = {
                    uid, email: currentUser.email, displayName: currentUser.displayName,
                    photoURL: currentUser.photoURL, credits: 50,
                    referralCode: 'REF' + uid.substring(0,8).toUpperCase(),
                    referredBy: null, referralEarnings: 0, totalEarned: 0,
                    watchedVideos: [], campaigns: [],
                    achievements: {}, streak: { current: 0, lastClaim: null, highest: 0 },
                    lastDailyBonus: null, createdAt: new Date().toISOString()
                };
                await setDoc(ref, userData);
            }
            return userData;
        }
        
        async function saveUserData() {
            if(currentUser) await setDoc(doc(db, 'viewswap_users', currentUser.uid), userData, { merge: true });
        }
        
        async function updateCredits(amount, source = 'generic') {
            userData.credits += amount;
            if(amount > 0) userData.totalEarned += amount;
            await saveUserData();
            return true;
        }
        
        async function addReferralCommission(referredUserId, earnedAmount) {
            if (earnedAmount <= 0) return;
            const commission = Math.floor(earnedAmount * 0.05);
            if (commission <= 0) return;
            const referrerSnap = await getDoc(doc(db, 'viewswap_users', referredUserId));
            if (referrerSnap.exists()) {
                const referrerData = referrerSnap.data();
                if (referrerData.referredBy) {
                    const uplineRef = doc(db, 'viewswap_users', referrerData.referredBy);
                    await runTransaction(db, async (transaction) => {
                        const uplineSnap = await transaction.get(uplineRef);
                        if (uplineSnap.exists()) {
                            transaction.update(uplineRef, { 
                                referralEarnings: increment(commission),
                                credits: increment(commission),
                                totalEarned: increment(commission)
                            });
                        }
                    });
                    showToast(`🎁 Referrer earned ${commission} credits (5% commission!)`);
                }
            }
        }
        
        // PROCESS REFERRAL: core fix - ensures referral is saved after login
        async function processQRReferral(referrerCode) {
            if (!currentUser) {
                pendingReferralCode = referrerCode;
                sessionStorage.setItem('pendingViewSwapRef', referrerCode);
                return false;
            }
            if (userData.referredBy) {
                showToast("You already have a referrer!", true);
                return false;
            }
            const usersRef = collection(db, 'viewswap_users');
            const q = query(usersRef, where('referralCode', '==', referrerCode));
            const snapshot = await getDocs(q);
            if (!snapshot.empty) {
                const referrerDoc = snapshot.docs[0];
                const referrerId = referrerDoc.id;
                if (referrerId !== currentUser.uid) {
                    userData.referredBy = referrerId;
                    await saveUserData();
                    const referrerRef = doc(db, 'viewswap_users', referrerId);
                    await updateDoc(referrerRef, { referrals: arrayUnion(currentUser.uid) });
                    await updateCredits(10, 'welcome');
                    await addReferralCommission(currentUser.uid, 10);
                    await checkAchievements();
                    showToast(`🎉 Referral activated! +10 welcome credits & referrer gets 5% forever!`);
                    return true;
                }
            }
            showToast("Invalid referral code", true);
            return false;
        }
        
        async function checkAchievements() {
            let unlockedAny = false;
            const campaignCount = userData.campaigns?.length || 0;
            const watchedCount = userData.watchedVideos?.length || 0;
            const referralCount = userData.referrals?.length || 0;
            const streak = userData.streak?.current || 0;
            const checks = {
                streak1: streak >= 1, streak3: streak >= 3, streak7: streak >= 7, streak30: streak >= 30,
                campaign1: campaignCount >= 1, campaign5: campaignCount >= 5, campaign10: campaignCount >= 10,
                watcher10: watchedCount >= 10, watcher50: watchedCount >= 50,
                refer1: referralCount >= 1, refer5: referralCount >= 5
            };
            for (const [key, achieved] of Object.entries(checks)) {
                if (achieved && !userData.achievements[key]) {
                    userData.achievements[key] = { unlockedAt: new Date().toISOString() };
                    unlockedAny = true;
                    const reward = ACHIEVEMENTS[key].reward;
                    showToast(`🏆 ${ACHIEVEMENTS[key].name} +${reward} credits`);
                    await updateCredits(reward, 'achievement');
                    if (userData.referredBy) await addReferralCommission(currentUser.uid, reward);
                }
            }
            if (unlockedAny) await saveUserData();
        }
        
        async function claimDailyBonus() {
            const lastClaim = userData.streak?.lastClaim ? new Date(userData.streak.lastClaim) : null;
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            let newStreak = 1;
            if (lastClaim) {
                if (lastClaim.toDateString() === yesterday.toDateString()) newStreak = (userData.streak.current || 0) + 1;
                else if (lastClaim.toDateString() === today.toDateString()) { showToast('Already claimed today!'); return; }
                else { newStreak = 1; showToast('Streak reset! Start fresh today.', true); }
            }
            const bonusAmount = 25 + Math.floor(newStreak / 7) * 10;
            await updateCredits(bonusAmount, 'daily');
            userData.streak = { current: newStreak, lastClaim: today.toISOString(), highest: Math.max(newStreak, userData.streak?.highest || 0) };
            await saveUserData();
            if (userData.referredBy && bonusAmount > 0) await addReferralCommission(currentUser.uid, bonusAmount);
            await checkAchievements();
            showToast(`🎁 Daily: +${bonusAmount} credits | Streak: ${newStreak} days`);
            renderCurrentPage();
        }
        
        async function createCampaign(title, url) {
            const videoId = extractVideoId(url);
            if (!videoId) { showToast('Invalid YouTube URL', true); return false; }
            if (userData.credits < 5) { showToast('Need 5 credits', true); return false; }
            await updateCredits(-5, 'create_campaign');
            const campaign = {
                id: Date.now().toString(), title, url, videoId, creatorId: currentUser.uid,
                creatorName: userData.displayName, createdAt: new Date().toISOString(),
                views: 0, watchers: [], likes: 0, comments: 0, watchTimeSec: 0
            };
            userData.campaigns = userData.campaigns || [];
            userData.campaigns.push(campaign);
            await saveUserData();
            const campaignRef = doc(db, 'viewswap_campaigns', campaign.id);
            await setDoc(campaignRef, campaign);
            await checkAchievements();
            showToast(`✅ Campaign created! -5 credits`);
            renderCurrentPage();
        }
        
        async function watchCampaign(campaign) {
            if (userData.watchedVideos?.includes(campaign.videoId)) { showToast('Already watched', true); return; }
            if (campaign.creatorId === currentUser.uid) { showToast("Can't watch own", true); return; }
            window.open(campaign.url, '_blank');
            const reward = 3;
            await updateCredits(reward, 'watch');
            userData.watchedVideos = userData.watchedVideos || [];
            userData.watchedVideos.push(campaign.videoId);
            await saveUserData();
            if (userData.referredBy && reward > 0) await addReferralCommission(currentUser.uid, reward);
            const campaignRef = doc(db, 'viewswap_campaigns', campaign.id);
            await updateDoc(campaignRef, { views: increment(1), watchers: arrayUnion(currentUser.uid), watchTimeSec: increment(30) });
            await checkAchievements();
            renderCurrentPage();
        }
        
        window.watchCampaign = watchCampaign;
        
        // FULLSCREEN QR SCANNER
        let fullscreenScanner = null;
        function showFullscreenQRScanner(onScanCallback) {
            const modal = document.createElement('div');
            modal.className = 'qr-modal-fullscreen';
            modal.innerHTML = `
                <div class="qr-fullscreen-container">
                    <div class="qr-header-full">🔍 Scan Referral QR Code</div>
                    <div id="qr-reader-full" style="width:100%; height:100%;"></div>
                    <button class="close-qr-full">✖ Close Scanner</button>
                </div>
            `;
            document.body.appendChild(modal);
            const scannerDiv = document.getElementById('qr-reader-full');
            if (fullscreenScanner && fullscreenScanner.isScanning) fullscreenScanner.stop().catch(()=>{});
            fullscreenScanner = new Html5Qrcode("qr-reader-full");
            const config = { fps: 12, qrbox: { width: 280, height: 280 } };
            fullscreenScanner.start({ facingMode: "environment" }, config, (decodedText) => {
                if (fullscreenScanner) fullscreenScanner.stop().catch(()=>{});
                onScanCallback(decodedText);
                modal.remove();
                fullscreenScanner = null;
            }, (err) => {});
            modal.querySelector('.close-qr-full').onclick = () => {
                if (fullscreenScanner && fullscreenScanner.isScanning) fullscreenScanner.stop().catch(()=>{});
                modal.remove();
                fullscreenScanner = null;
            };
        }
        
        async function handleScanAndRefer(code) {
            if (code.startsWith('VIEWSWAP_REF:')) {
                const refCode = code.split(':')[1];
                const success = await processQRReferral(refCode);
                if (success) showToast('✅ Referral applied! Welcome bonus credited.');
                else showToast('❌ Invalid or already referred', true);
            } else {
                showToast('Invalid QR format (must start with VIEWSWAP_REF:)', true);
            }
        }
        
        // Render functions
        async function renderHome() {
            const campaignsQuery = query(collection(db, 'viewswap_campaigns'));
            const snapshot = await getDocs(campaignsQuery);
            const allCampaigns = [];
            snapshot.forEach(doc => allCampaigns.push({ ...doc.data(), docId: doc.id }));
            const available = allCampaigns.filter(c => c.creatorId !== currentUser?.uid && !userData?.watchedVideos?.includes(c.videoId));
            return `
                <div class="streak-card">
                    <div>🔥 Current Streak</div>
                    <div class="streak-number">${userData?.streak?.current || 0} days</div>
                    <div>Highest: ${userData?.streak?.highest || 0}</div>
                    <button class="daily-bonus-btn" id="dailyBonusBtn">🎁 Claim Daily Bonus</button>
                </div>
                <div class="card">
                    <h2>🎬 Watch & Earn (3 credits each)</h2>
                    ${available.length === 0 ? '<div class="empty-state">No videos available. Create a campaign!</div>' : 
                        available.map(c => `
                            <div class="campaign-item">
                                <div style="font-weight: bold;">${escapeHtml(c.title)}</div>
                                <div style="font-size: 0.7rem; color: gray;">${escapeHtml(c.url)}</div>
                                <div class="badge">👁️ ${c.views || 0} views</div>
                                <button class="btn-primary" onclick="window.watchCampaign(${JSON.stringify(c).replace(/"/g, '&quot;')})">▶️ Watch +3 credits</button>
                            </div>
                        `).join('')
                    }
                </div>
            `;
        }
        
        function renderCampaignPage() {
            return `<div class="card"><h2>📢 Create Campaign (5 credits)</h2><input id="campaignTitle" placeholder="Campaign title"><input id="campaignUrl" placeholder="YouTube URL"><button class="btn-primary" id="createCampaignBtn">🚀 Launch</button></div><div class="card"><h2>📊 My Campaigns</h2><div id="myCampaignsList"></div></div>`;
        }
        
        async function renderMyCampaigns() {
            const container = document.getElementById('myCampaignsList');
            if(!container) return;
            const my = userData?.campaigns || [];
            if(my.length===0) container.innerHTML='<div class="empty-state">No campaigns yet</div>';
            else container.innerHTML = my.map(c => `<div class="campaign-item"><strong>${escapeHtml(c.title)}</strong><div class="badge">👁️ ${c.views||0} views</div></div>`).join('');
        }
        
        function renderRewardsPage() {
            const streak = userData?.streak?.current||0, campCount=userData?.campaigns?.length||0, watched=userData?.watchedVideos?.length||0, referralCount=userData?.referrals?.length||0;
            return `<div class="streak-card"><div>🔥 Streak</div><div class="streak-number">${streak} days</div></div>
            <div class="card"><h2>🏆 Achievements</h2><div class="achievement-grid">${Object.entries(ACHIEVEMENTS).map(([key,ach])=>{
                let unlocked=false;
                if(key.includes('streak')) unlocked=streak>=ach.requirement;
                else if(key.includes('campaign')) unlocked=campCount>=ach.requirement;
                else if(key.includes('watcher')) unlocked=watched>=ach.requirement;
                else if(key.includes('refer')) unlocked=referralCount>=ach.requirement;
                return `<div class="achievement-card ${unlocked?'unlocked':''}"><div class="achievement-icon">${ach.icon}</div><div class="achievement-name">${ach.name}</div><div class="achievement-desc">${ach.desc}</div><div class="achievement-reward">+${ach.reward}</div>${!unlocked?'<div class="locked-badge">🔒</div>':'<div class="locked-badge" style="background:var(--success);">✓</div>'}</div>`;
            }).join('')}</div></div>
            <div class="card"><h2>📊 Stats</h2><div class="stat-row"><span>📢 Campaigns:</span><span>${campCount}</span></div><div class="stat-row"><span>👀 Videos watched:</span><span>${watched}</span></div><div class="stat-row"><span>🤝 Referrals:</span><span>${referralCount}</span></div><div class="stat-row"><span>💰 Total Earned:</span><span>${Math.floor(userData?.totalEarned||0)}</span></div></div>`;
        }
        
        function renderAccountPage() {
            const qrUrl = generateQRCodeURL(`VIEWSWAP_REF:${userData?.referralCode}`);
            return `<div class="card"><div class="account-info"><img src="${currentUser?.photoURL}" class="account-avatar"><div style="font-weight:bold;">${escapeHtml(currentUser?.displayName)}</div><div>${currentUser?.email}</div></div></div>
            <div class="card"><h2>💰 Credits</h2><div class="stat-row"><span>💎 Balance:</span><span style="font-size:1.5rem;color:var(--primary);">${Math.floor(userData?.credits||0)}</span></div><div class="stat-row"><span>🏆 Total Earned:</span><span>${Math.floor(userData?.totalEarned||0)}</span></div><div class="stat-row"><span>🔥 Streak:</span><span>${userData?.streak?.current||0} days</span></div></div>
            <div class="card"><h2>🔗 Your QR Code</h2><div class="qr-code-display qr-clickable" id="fullscreenQrTrigger"><img src="${qrUrl}" width="140" height="140"></div><div class="referral-code-box" id="refCode">${userData?.referralCode}</div><button class="btn-primary" id="copyRefBtn">📋 Copy Code</button></div>
            <button class="signout-btn-lg" id="signOutBtnAccount">🚪 Sign Out</button>`;
        }
        
        function renderReferPage() {
            const qrUrl = generateQRCodeURL(`VIEWSWAP_REF:${userData?.referralCode}`);
            return `<div class="card"><h2>🤝 Referral Program</h2><div style="background:linear-gradient(135deg,var(--warning),#ea580c);border-radius:20px;padding:12px;text-align:center;margin-bottom:12px;">🎁 5% commission on everything your referrals earn!</div>
            <div class="qr-code-display qr-clickable" id="fullscreenQrTriggerRefer"><img src="${qrUrl}" width="160" height="160"></div>
            <div class="referral-code-box" id="refLink">${userData?.referralCode}</div>
            <button class="btn-primary" id="copyRefLink">📋 Copy Code</button>
            <button class="btn-secondary" id="scanQrBtn">📷 Scan QR (Fullscreen)</button>
            <div class="stat-row" style="margin-top:12px;"><span>💰 Commission Earned:</span><span style="color:gold;">${Math.floor(userData?.referralEarnings||0)} credits</span></div></div>`;
        }
        
        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
        
        async function renderCurrentPage() {
            const container = document.getElementById('pageContent');
            if(!container) return;
            if(currentPage==='home'){ container.innerHTML = await renderHome(); document.getElementById('dailyBonusBtn')?.addEventListener('click',claimDailyBonus); }
            else if(currentPage==='campaign'){ container.innerHTML = renderCampaignPage(); document.getElementById('createCampaignBtn')?.addEventListener('click',async()=>{ const title=document.getElementById('campaignTitle')?.value, url=document.getElementById('campaignUrl')?.value; if(title&&url) await createCampaign(title,url); else showToast('Title & URL required', true); await renderMyCampaigns(); }); await renderMyCampaigns(); }
            else if(currentPage==='rewards') container.innerHTML = renderRewardsPage();
            else if(currentPage==='account'){ container.innerHTML = renderAccountPage(); document.getElementById('copyRefBtn')?.addEventListener('click',()=>{ navigator.clipboard.writeText(userData?.referralCode); showToast('Copied!'); }); document.getElementById('fullscreenQrTrigger')?.addEventListener('click',()=>{ const bigQr = generateQRCodeURL(`VIEWSWAP_REF:${userData?.referralCode}`); window.open(bigQr, '_blank'); }); document.getElementById('signOutBtnAccount')?.addEventListener('click',async()=>await signOut(auth)); }
            else if(currentPage==='refer'){ container.innerHTML = renderReferPage(); document.getElementById('copyRefLink')?.addEventListener('click',()=>{ navigator.clipboard.writeText(userData?.referralCode); showToast('Referral code copied'); }); document.getElementById('scanQrBtn')?.addEventListener('click',()=>{ showFullscreenQRScanner(async (code) => { await handleScanAndRefer(code); }); }); document.getElementById('fullscreenQrTriggerRefer')?.addEventListener('click',()=>{ const bigQr = generateQRCodeURL(`VIEWSWAP_REF:${userData?.referralCode}`); window.open(bigQr, '_blank'); }); }
        }
        
        document.querySelectorAll('.nav-item').forEach(btn=>btn.addEventListener('click',()=>{ currentPage=btn.dataset.page; document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderCurrentPage(); }));
        
        function initOnlineTracking() {
            const onlineQuery = query(collection(db, 'viewswap_online'), where('isOnline','==',true));
            onSnapshot(onlineQuery,(snap)=>{ document.getElementById('onlineCountBadge').innerHTML=`👥 ${snap.size} active`; });
            const statusRef=doc(db,'viewswap_online',currentUser?.uid);
            const update=async()=>{ if(currentUser) await setDoc(statusRef,{uid:currentUser.uid,isOnline:true,lastSeen:serverTimestamp()},{merge:true}); };
            update(); setInterval(update,30000); window.addEventListener('beforeunload',()=>setDoc(statusRef,{isOnline:false},{merge:true}));
        }
        
        onAuthStateChanged(auth, async(user)=>{
            if(user){ currentUser=user; await loadUserData(user.uid); document.body.classList.add('authenticated'); initOnlineTracking(); 
                const pending = sessionStorage.getItem('pendingViewSwapRef');
                if(pending && !userData.referredBy) {
                    await processQRReferral(pending);
                    sessionStorage.removeItem('pendingViewSwapRef');
                }
                renderCurrentPage(); 
            }
            else{ document.body.classList.remove('authenticated'); currentUser=null; userData=null; }
        });
        document.getElementById('signInBtn').addEventListener('click',()=>signInWithPopup(auth,provider));
        document.getElementById('qrSignInBtn').addEventListener('click',()=>{
            showFullscreenQRScanner(async (code) => {
                await handleScanAndRefer(code);
            });
        });
        
        for(let i=0;i<35;i++){ const p=document.createElement('div'); p.className='particle'; p.style.width=Math.random()*4+2+'px'; p.style.height=p.style.width; p.style.left=Math.random()*100+'%'; p.style.animationDuration=Math.random()*12+6+'s'; p.style.animationDelay=Math.random()*8+'s'; document.getElementById('particles')?.appendChild(p); }
    </script>
</body>
</html>
